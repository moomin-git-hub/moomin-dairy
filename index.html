/* ============================================================= PIN LOCK ===== */
const PIN_LEN=4;
let pinBuf="", pinMode="unlock", pinTemp="";
function getPin(){ return S.pinHash || ""; }
function setPinStore(h){ S.pinHash=h; Store.set("momin:pin", h); }
function clearPinStore(){ S.pinHash=""; Store.del("momin:pin"); }
function pinHash(p){ let h=5381; for(let i=0;i<p.length;i++){ h=((h<<5)+h+p.charCodeAt(i))>>>0; } return "h"+h; }
function pinIsSet(){ return !!getPin(); }
function exitSVG(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M14 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"/></svg>`; }
function backSVG(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 5H8.5L3 12l5.5 7H21a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z"/><path d="M11.5 9.5l5 5M16.5 9.5l-5 5"/></svg>`; }
function pinTitleFor(){ return pinMode==="unlock" ? ("Salom, "+(S.settings.name||"Mo'min")+"!") : (pinMode==="set" ? "Yangi PIN" : "Tasdiqlang"); }
function pinSubFor(){ return pinMode==="unlock" ? "PIN kodni kiriting" : (pinMode==="set" ? "4 raqamli PIN o'ylab toping" : "PIN ni qayta kiriting"); }
function renderPinScreen(err){
  const el=$("#pinScreen"); if(!el) return;
  const caps = Array.from({length:PIN_LEN},(_,i)=>`<div class="pin-cap c${i} ${i<pinBuf.length?'fill':''}"></div>`).join("");
  const keys = [1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" data-act="pinDigit" data-d="${n}">${n}</button>`).join("");
  el.innerHTML = `
    <div class="pin-bg">${uzSkyline()}<div class="pin-orn">${uzOrnament()}</div></div>
    <div class="pin-fg">
      <div class="pin-head"><span>Xavfsizlik</span><button class="pin-exit" data-act="pinForgot" aria-label="Chiqish">${exitSVG()}</button></div>
      <div class="pin-greet">
        <h2 class="pin-h">${escd(pinTitleFor())}</h2>
        <div class="pin-sub ${err?'err':''}">${escd(err||pinSubFor())}</div>
      </div>
      <div class="pin-caps ${err?'shake':''}">${caps}</div>
      <button class="pin-forgot" data-act="pinForgot">${pinMode==="unlock"?"PIN esdan chiqdimi?":"Hozircha kerak emas"}</button>
      <div class="pin-pad">
        ${keys}
        <span class="pin-key-empty"></span>
        <button class="pin-key" data-act="pinDigit" data-d="0">0</button>
        <button class="pin-key pin-back" data-act="pinBack" aria-label="O'chirish">${backSVG()}</button>
      </div>
    </div>`;
  el.removeAttribute("hidden");
}
function lockApp(){ pinMode="unlock"; pinBuf=""; pinTemp=""; renderPinScreen(); }
function startSetPin(){ pinMode="set"; pinBuf=""; pinTemp=""; renderPinScreen(); }
function unlockApp(){ const el=$("#pinScreen"); if(el){ el.setAttribute("hidden",""); el.innerHTML=""; } pinBuf=""; pinMode="unlock"; }
function updatePinCaps(){ for(let i=0;i<PIN_LEN;i++){ const c=$(".pin-cap.c"+i); if(c){ if(i<pinBuf.length) c.classList.add("fill"); else c.classList.remove("fill"); } } }
function pinDigit(d){ if(pinBuf.length>=PIN_LEN) return; pinBuf+=String(d); updatePinCaps(); if(pinBuf.length===PIN_LEN){ if(typeof setTimeout==="function") setTimeout(pinSubmit,140); } }
function pinBack(){ pinBuf=pinBuf.slice(0,-1); updatePinCaps(); }
function pinSubmit(){
  if(pinMode==="unlock"){
    if(pinHash(pinBuf)===getPin()) unlockApp();
    else { pinBuf=""; renderPinScreen("Noto'g'ri PIN. Qayta urinib ko'ring."); }
  } else if(pinMode==="set"){
    pinTemp=pinBuf; pinBuf=""; pinMode="confirm"; renderPinScreen();
  } else if(pinMode==="confirm"){
    if(pinBuf===pinTemp){ setPinStore(pinHash(pinBuf)); unlockApp(); if(typeof toast==="function") toast("🔒 PIN o'rnatildi"); if(S.view==="sozlama"&&typeof renderSozlama==="function") renderSozlama(); }
    else { pinTemp=""; pinBuf=""; pinMode="set"; renderPinScreen("Mos kelmadi. Yangidan o'ylang."); }
  }
}
function pinForgot(){
  if(pinMode==="unlock"){
    if(confirm("PIN ni o'chirib, qulfsiz davom etasizmi? Ma'lumotingiz saqlanadi.")){ clearPinStore(); unlockApp(); if(S.view==="sozlama"&&typeof renderSozlama==="function") renderSozlama(); }
  } else { setPinSkipped(); unlockApp(); }
}
function disablePin(){ if(confirm("Ilova qulfini o'chirasizmi?")){ clearPinStore(); if(S.view==="sozlama"&&typeof renderSozlama==="function") renderSozlama(); if(typeof toast==="function") toast("Qulf o'chirildi"); } }
function pinSkipped(){ try{ return localStorage.getItem("momin_pinskip")==="1"; }catch(e){ return false; } }
function setPinSkipped(){ try{ localStorage.setItem("momin_pinskip","1"); }catch(e){} }
async function autoPin(){
  if(pinIsSet()){ lockApp(); return; }
  if(pinSkipped()) return;
  let onbDone=true; try{ onbDone = !!(await Store.get("momin:onboarded")); }catch(e){}
  if(!onbDone) return;          // onboarding ketyapti — keyingi safar so'raymiz
  startSetPin();
}

let aiBusy=false;
function aiGetKey(){ try{ return localStorage.getItem("momin_aikey")||""; }catch(e){ return ""; } }
function aiSaveKeyStore(k){ try{ if(k) localStorage.setItem("momin_aikey",k); else localStorage.removeItem("momin_aikey"); }catch(e){} }

function sendSVG(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>`; }

function aiFmt(t){ return escd(String(t||"")).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>"); }
function aiSystemPrompt(){
  const ai=ahdInfo();
  const goals=(S.goals||[]).map(g=>g.title+" ("+goalPct(g)+"%)").join("; ");
  const rp=routinePct();
  return `Sen "Mo'min" ilovasidagi dono, mehribon va dadil ruhiy-intizom yo'ldoshisan. Foydalanuvchi o'z ustida ishlamoqda — "Normo'min"dan "Mo'min"ga aylanish ahdini tutgan.
Foydalanuvchi: ${S.settings.name||"Mo'min"}. Ahd: ${ai.n}-kun. Bugungi tartib: ${rp}% bajarilgan. Maqsadlar: ${goals||"hali kiritilmagan"}.
Vazifang: ilhom va motivatsiya berish; erinchoqlikni yengishga yordam (asosiy g'oya: "erinchoqlik — nega'ni bilmaslikdan"); kun rejasini tuzish; sabr, intizom va axloq bo'yicha amaliy maslahat; islomiy qadriyatlarga mos o'z-o'zini rivojlantirish.
Uslub: DOIM o'zbek tilida (lotin), qisqa va samimiy (2-6 jumla), do'st kabi — lekin halol va talabchan. Keraksiz uzun va'z qilma. Aniq, amaliy qadamlar ber. Tibbiy yoki qat'iy diniy fatvo berma; umumiy, ilhomlantiruvchi yo'l-yo'riq ber.`;
}
async function aiCall(messages){
  const key=aiGetKey();
  const headers={"Content-Type":"application/json"};
  if(key){ headers["x-api-key"]=key; headers["anthropic-version"]="2023-06-01"; headers["anthropic-dangerous-direct-browser-access"]="true"; }
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers,
    body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1024, system:aiSystemPrompt(), messages:messages.map(m=>({role:m.role,content:m.content})) })
  });
  if(!res.ok){ const t=await res.text().catch(()=>""); throw new Error("HTTP "+res.status+" "+t.slice(0,120)); }
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  return text||"(bo'sh javob)";
}
async function aiSend(q){
  if(aiBusy) return;
  const ta=$("#aiInput");
  const text=(q!=null? String(q) : (ta?ta.value:"")||"").trim();
  if(!text) return;
  if(ta) ta.value="";
  S.chat=S.chat||[]; S.chat.push({role:"user",content:text}); saveChat();
  aiBusy=true; renderAI();
  let reply;
  try{ reply=await aiCall(S.chat.slice(-16)); }
  catch(e){ reply = aiHasKey()
      ? "Kechirasiz, hozir javob bera olmadim. Internet yoki API kalitni tekshiring."
      : "Bu yerda (saytingizda) AI ishlashi uchun API kalit kerak. Pastdagi “API kalit” panelidan o'z kalitingizni qo'ying — yoki Claude.ai ichida bemalol sinab ko'ring."; }
  S.chat.push({role:"assistant",content:reply}); aiBusy=false; saveChat(); renderAI();
}

/* ===================================================== BUGUN: ILHOM OQIMI ==== */
function clip(s,n){ s=String(s||""); return s.length>n ? s.slice(0,n-1)+"…" : s; }
let rotTimer=null;
let rotIx={};
function ilhomSources(){ return [
  {k:"ayah", label:"Oyat", go:"ibodat", add:"Ibodat", pool:()=>S.ayahs, item:it=>`<div class="il-text">${escd(clip(it.text,140))}</div>${it.ref?`<div class="il-ref">${escd(it.ref)}</div>`:""}`},
  {k:"hadith", label:"Hadis", go:"hadis", add:"Hadislar", pool:()=>S.hadith, item:it=>`<div class="il-text">${escd(clip(it.text,140))}</div>${it.source?`<div class="il-ref">${escd(it.source)}</div>`:""}`},
  {k:"book", label:"Iqtibos", go:"kitob", add:"Kitob", pool:()=>S.books, item:it=>`<div class="il-text">“${escd(clip(it.text,140))}”</div>${(it.book||it.author)?`<div class="il-ref">${escd([it.book,it.author].filter(Boolean).join(" — "))}</div>`:""}`},
  {k:"poem", label:"She'r", go:"sheriyat", add:"She'riyat", pool:()=>S.coll.sheriyat, item:it=>`<div class="il-text">${escd(clip(it.text,150))}</div>${it.author?`<div class="il-ref">— ${escd(it.author)}</div>`:""}`},
  {k:"lang", label:"Til", go:"tillar", add:"Tillar", pool:()=>S.langwords, item:it=>`<div class="il-text"><b>${escd(it.word)}</b> — ${escd(it.tr)}</div><div class="il-ref">${escd(langName(it.lang))}</div>`},
  {k:"fact", label:"Fakt", go:"ensiklopediya", add:"Ensiklopediya", pool:()=>S.coll.ensiklopediya, item:it=>`<div class="il-text">${escd(clip(it.text,150))}</div>${it.source?`<div class="il-ref">${escd(it.source)}</div>`:""}`},
  {k:"history", label:"Tarix", go:"tarixkun", add:"Kun tarixi", pool:()=>S.history, item:it=>`<div class="il-text">${it.year?`<b>${escd(String(it.year))}</b> · `:""}${escd(clip(it.text,160))}</div>`},
  {k:"asma", label:"Ism", go:"ibodat", add:"Asma", pool:()=>{ const a=asmaToday(); return a?[a]:[]; }, item:it=>`<div class="il-text"><b>${escd(it.name)}</b> — ${escd(it.mean)}</div><div class="il-ref">Asma ul-Husna · ${it.i+1}/99</div>`},
  {k:"memory", label:"Xotira", go:"tarix", add:"Kundalik", pool:()=>memoryPool(), item:it=>`<div class="il-text">${it.y?`<b>${escd(it.y)}</b> · `:""}${escd(clip(it.text,150))}</div>`}
]; }
const ilhomSrc=(k)=>ilhomSources().find(s=>s.k===k);
const ilhomPool=(k)=>{ const s=ilhomSrc(k); return (s&&s.pool()||[]); };
function ilhomCardHTML(s){
  const pool=s.pool()||[]; if(rotIx[s.k]==null) rotIx[s.k]=0;
  const body = pool.length ? s.item(pool[rotIx[s.k]%pool.length]) : `<div class="il-empty" data-go="${s.go}">“${s.add}” bo'limidan qo'shing →</div>`;
  return `<div class="ilhom il-${s.k}"><div class="il-head">${naqshMini()}<span>${s.label}</span>${pool.length>1?`<button class="il-next" data-act="ilhomNext" data-t="${s.k}" aria-label="Keyingisi">↻</button>`:""}</div><div class="il-body" id="ilhom-${s.k}">${body}</div></div>`;
}
function ilhomStripHTML(){
  return `<div class="ilhom-wrap"><div class="il-title">${naqshMini()} Bugungi ilhom oqimi</div>
    <div class="ilhom-grid">${ilhomSources().map(ilhomCardHTML).join("")}</div></div>`;
}
function rndIx(k){ const n=ilhomPool(k).length; return n?Math.floor(Math.random()*n):0; }
function nextIx(k){ const n=ilhomPool(k).length; if(n<=1) return rotIx[k]||0; let x; do{ x=Math.floor(Math.random()*n);}while(x===rotIx[k]); return x; }
function setIlhomByKey(k){ const s=ilhomSrc(k); if(!s) return; const el=document.querySelector("#ilhom-"+k); const pool=s.pool()||[]; if(el && pool.length){ el.innerHTML=`<div class="fadeSwap">${s.item(pool[(rotIx[k]||0)%pool.length])}</div>`; } }
function ilhomNext(k){ rotIx[k]=nextIx(k); setIlhomByKey(k); }
function rotateIlhom(){ ilhomSources().forEach(s=>{ if((s.pool()||[]).length>1){ rotIx[s.k]=nextIx(s.k); setIlhomByKey(s.k); } }); }
function startIlhomRotation(){
  if(rotTimer){ clearInterval(rotTimer); rotTimer=null; }
  if(typeof setInterval==="function" && S.view==="bugun"){ rotTimer=setInterval(rotateIlhom, 6500); }
}

/* ===================================================== LIST VIRTUALIZATION == */
/* Katta ro'yxatlarni tez ushlab turish: faqat cheklangan qismi chiziladi + qidiruv */
const LIST_CAP = 300;
let listState = {};
let listTypeTimer = null;
function lst(v){ if(!listState[v]) listState[v]={q:"",cap:LIST_CAP}; return listState[v]; }
function listFilterView(view, items, textOf){
  const st=lst(view); const q=(st.q||"").trim().toLowerCase();
  const arr = items.slice().reverse();                 // eng yangisi yuqorida
  const filtered = q ? arr.filter(it=>String(textOf(it)).toLowerCase().includes(q)) : arr;
  return { shown: filtered.slice(0, st.cap), total: items.length, matched: filtered.length, more: Math.max(0, filtered.length - st.cap) };
}
function listSearchHTML(view, ph){
  const st=lst(view);
  return `<div class="list-search"><span class="ls-ic">⌕</span><input class="inp" id="lsearch-${view}" placeholder="${escq(ph||'Qidirish…')}" value="${escq(st.q||'')}" autocomplete="off">${st.q?`<button class="ls-clear" data-act="listClear" data-v="${view}" title="Tozalash">×</button>`:''}</div>`;
}
function listMoreHTML(view, more){
  if(more<=0) return "";
  const st=lst(view); const total=st.cap+more;
  return `<div class="list-more-wrap">
    <button class="btn btn-ghost list-more" data-act="listMore" data-v="${view}">↓ Yana ${Math.min(more,LIST_CAP)} ta</button>
    <button class="btn btn-ghost list-more" data-act="listAll" data-v="${view}">Hammasini (${total})</button>
  </div>`;
}
function reRenderView(view){
  if(COLL_CFG[view]) return renderColl(view);
  return ({sr:renderSR, tillar:renderTillar, hadis:renderHadis, kitob:renderKitob, ibodat:renderIbodat}[view]||render)();
}
function listType(view, val){
  const st=lst(view); st.q=val; st.cap=LIST_CAP;
  if(listTypeTimer) clearTimeout(listTypeTimer);
  listTypeTimer=setTimeout(()=>{ reRenderView(view); const i=document.querySelector("#lsearch-"+view); if(i){ try{ i.focus(); const v=i.value; if(i.setSelectionRange) i.setSelectionRange(v.length,v.length);}catch(e){} } }, 200);
}
function listMore(view){ lst(view).cap += LIST_CAP; reRenderView(view); }
function listAll(view){ lst(view).cap = Number.MAX_SAFE_INTEGER; reRenderView(view); }
function listClear(view){ const s=lst(view); s.q=""; s.cap=LIST_CAP; reRenderView(view); }

/* ===================================================== GENERIC COLLECTIONS === */
function collCard(cfg, it){
  const main=cfg.fields[0];
  const meta = cfg.fields.slice(1).filter(f=>it[f.k]).map(f=>{
    if(f.k==="url"||f.k==="link"){ const u=it[f.k]; return u?`<a class="nc-link" href="${escq(u)}" target="_blank" rel="noopener">${escd(clip(u,42))}</a>`:""; }
    if(f.k==="status") return `<span class="nc-badge">${escd(it[f.k])}</span>`;
    return escd(it[f.k]);
  }).filter(Boolean).join(" · ");
  const q = cfg.view==="sheriyat";
  return `<div class="naqsh-card coll-card" style="border-left-color:${cfg.accent}">
    ${q?`<div class="nc-quote">”</div>`:`<div class="nc-orn">${naqshMini()}</div>`}
    <div class="nc-text${q?' poem-text':''}">${escd(it[main.k])}</div>
    ${meta?`<div class="nc-ref">${meta}</div>`:""}
    ${(cfg.view==="qarorlar"&&it.at&&((parseDK(todayKey())-parseDK(it.at))/86400000)>=(parseInt(String(it.rev||"").replace(/\D/g,""))||90))?`<div class="nc-badge" style="display:inline-block;margin-top:8px;background:rgba(231,180,92,.14);border:1px solid rgba(231,180,92,.45);color:var(--dawn)">⏳ Qayta ko'rish vaqti — kutganingiz ro'yobga chiqdimi?</div>`:""}
    <div class="nc-acts"><button class="nc-mini" data-act="toCard" data-f="${escq(clip(String(it[main.k]),60))}" data-b="${escq(String(it[main.k]).replace(/\n/g,' '))}" data-d="${escq(cfg.title)}">🗂</button><button class="nc-mini" data-act="shareCard" data-t="${escq(String(it[main.k]).replace(/\n/g,' '))}" data-r="${escq(cfg.view==='sheriyat'?(it.author||''):cfg.title)}">📤</button></div>
    <button class="nc-del" data-act="collDel" data-c="${cfg.view}" data-id="${it.id}" title="O'chirish">×</button>
  </div>`;
}
function renderColl(key){
  const cfg=COLL_CFG[key]; if(!cfg) return;
  const arr=S.coll[key]||[];
  const r=listFilterView(key, arr, it=>cfg.fields.map(f=>it[f.k]).join(" "));
  const rows = r.shown.length
    ? r.shown.map(it=>collCard(cfg,it)).join("")
    : (arr.length ? `<div class="empty"><div class="serif">Topilmadi</div><div>“${escd(lst(key).q)}” bo'yicha mos kelmadi.</div></div>`
                  : `<div class="empty"><div class="serif">Hali bo'sh</div><div>Quyidan birinchisini qo'shing.</div></div>`);
  const inputs = cfg.fields.map(f=> f.ta
    ? `<textarea class="inp" id="cf-${key}-${f.k}" rows="2" placeholder="${escq(f.ph)}"${f===cfg.fields[0]?"":" style=\"margin-top:8px\""}></textarea>`
    : `<input class="inp" id="cf-${key}-${f.k}" placeholder="${escq(f.ph)}"${f===cfg.fields[0]?"":" style=\"margin-top:8px\""}>`
  ).join("");
  $("#v-"+key).innerHTML = `
    <div class="eyebrow">${cfg.eyebrow}</div>
    <h1 class="page-h">${cfg.title}</h1>
    ${naqshDivider()}
    <p class="page-sub">${cfg.sub}</p>
    ${arr.length>12?listSearchHTML(key, cfg.title+" ichida qidirish…"):""}
    <div class="naqsh-list">${rows}</div>
    ${listMoreHTML(key, r.more)}
    <div class="card add-card">
      <div class="set-dh">${naqshMini()} Yangi qo'shish</div>
      ${inputs}
      <button class="btn btn-gold" data-act="collAdd" data-c="${key}" style="margin-top:10px">+ Qo'shish</button>
    </div>`;
}
function collAdd(key){
  const cfg=COLL_CFG[key]; if(!cfg) return;
  const obj={id:uid(), at:todayKey()}; let ok=true;
  cfg.fields.forEach(f=>{ const el=$("#cf-"+key+"-"+f.k); const v=((el&&el.value)||"").trim(); obj[f.k]=v; if(f.req&&!v) ok=false; });
  if(!ok) return;
  S.coll[key]=S.coll[key]||[]; S.coll[key].push(obj); saveColl(key); renderColl(key);
}
function collDel(key,id){ S.coll[key]=(S.coll[key]||[]).filter(x=>x.id!==id); saveColl(key); renderColl(key); }

/* ===================================================== TILLAR (12 til) ======= */
function setLangTab(k){ S.langTab=k; const s=lst("tillar"); s.q=""; s.cap=LIST_CAP; renderTillar(); }
function renderTillar(){
  const tabs = LANGS.map(l=>{
    const cnt=S.langwords.filter(w=>w.lang===l.k).length;
    return `<button class="lang-tab ${S.langTab===l.k?'on':''}" data-act="langTab" data-k="${l.k}">
      <span class="lt-flag">${l.flag}</span><span class="lt-name">${l.name}</span>
      <span class="lt-meta">${l.level==='0'?'0 dan':l.level} · ${cnt}</span></button>`;
  }).join("");
  const cur=LANGS.find(l=>l.k===S.langTab)||LANGS[0];
  const words=S.langwords.filter(w=>w.lang===S.langTab);
  const rW=listFilterView("tillar", words, w=>w.word+" "+w.tr);
  const rows = rW.shown.length
    ? rW.shown.map(w=>`
    <div class="word-row">
      <div class="wr-w">${escd(w.word)}</div>
      <div class="wr-arrow">→</div>
      <div class="wr-t">${escd(w.tr)}</div>
      <button class="nc-mini wr-card" data-act="toCard" data-f="${escq(w.word)}" data-b="${escq(w.tr)}" data-d="${escq((LANGS.find(l=>l.k===w.lang)||{}).name||'Til')}">🗂</button>
      <button class="nc-del" data-act="langDel" data-id="${w.id}" title="O'chirish">×</button>
    </div>`).join("")
    : (words.length? `<div class="empty"><div class="serif">Topilmadi</div></div>` : `<div class="empty"><div class="serif">So'z yo'q</div><div>Quyidan ${cur.name} tilida so'z qo'shing.</div></div>`);
  $("#v-tillar").innerHTML = `
    <div class="eyebrow">Ta'lim · 12 til</div>
    <h1 class="page-h">Tillar</h1>
    ${naqshDivider()}

let histLoading=false;
async function fetchHistory(force){
  const now=new Date(), mm=pad(now.getMonth()+1), dd=pad(now.getDate());
  const cacheKey="momin:history:"+mm+dd;
  if(!force){
    try{ const c=await Store.get(cacheKey); if(c){ const arr=J(c); if(arr&&arr.length){ S.history=arr; if(S.view==="tarixkun") renderTarixKun(); setIlhomByKey("history"); return; } } }catch(e){}
  }
  if(histLoading) return; histLoading=true;
  if(S.view==="tarixkun") renderTarixKun();
  let evts=[];
  for(const lang of ["uz","en"]){
    try{
      const res=await fetch(`https://${lang}.wikipedia.org/api/rest_v1/feed/onthisday/events/${mm}/${dd}`);
      if(res.ok){ const d=await res.json(); evts=(d.events||[]).map(e=>({year:e.year, text:(e.text||"").trim()})).filter(e=>e.text); if(evts.length){ break; } }
    }catch(e){}
  }
  evts.sort((a,b)=>(b.year||0)-(a.year||0));
  S.history=evts; histLoading=false;
  try{ if(evts.length) Store.set(cacheKey, JSON.stringify(evts)); }catch(e){}
  if(S.view==="tarixkun") renderTarixKun();
  setIlhomByKey("history");
}

let srReviewing=false, srQueue=[], srShow=false;
const todayISO=()=> new Date().toISOString().slice(0,10);
function srDue(){ const t=todayISO(); return S.cards.filter(c=>!c.due || c.due<=t); }
function srStats(){
  const t=todayISO();
  return {
    total:S.cards.length,
    due:S.cards.filter(c=>!c.due||c.due<=t).length,
    neww:S.cards.filter(c=>!c.reps).length,
    young:S.cards.filter(c=>c.reps&&(c.interval||0)<21).length,
    mature:S.cards.filter(c=>(c.interval||0)>=21).length
  };
}
function srPrevInterval(card,q){
  const reps=card.reps||0, ef=card.ef||2.5, interval=card.interval||0;
  if(q<3) return 1;
  if(reps===0) return q===5?4:1;
  if(reps===1) return q===5?8:6;
  const mult=q===3?1.2:(q===5?ef*1.3:ef);
  return Math.max(1,Math.round(interval*mult));
}
function srSchedule(card,q){
  card.reps=card.reps||0; card.ef=card.ef||2.5; card.interval=card.interval||0;
  if(q<3){
    card.reps=0; card.lapses=(card.lapses||0)+1; card.interval=1; card.ef=Math.max(1.3,card.ef-0.2);
  } else {
    card.interval=srPrevInterval(card,q); card.reps+=1;
    card.ef=card.ef+(0.1-(5-q)*(0.08+(5-q)*0.02)); if(card.ef<1.3) card.ef=1.3;
  }
  const d=new Date(); d.setDate(d.getDate()+card.interval);
  card.due=d.toISOString().slice(0,10); card.last=todayISO();
}
function startSR(){ srQueue=srDue().map(c=>c.id); srShow=false; srReviewing=srQueue.length>0; renderSR(); }
function srReveal(){ srShow=true; renderSR(); }
function srRate(q){
  const id=srQueue[0]; const c=S.cards.find(x=>x.id===id);
  if(c){ srSchedule(c,q); saveCards(); }
  srQueue.shift();
  if(q<3 && id) srQueue.push(id);   // shu sessiyada qayta mashq
  srShow=false;
  if(!srQueue.length) srReviewing=false;
  renderSR();
}
function srEnd(){ srReviewing=false; srQueue=[]; srShow=false; renderSR(); }

/* ============================================================= DATE UTIL ==== */
const pad = n => String(n).padStart(2,"0");
const calKey = (d) => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
/* Ahd kuni yarim tunda emas, UYG'ONISH vaqtida almashadi.
   Uyg'onishdan oldin (masalan 02:00) hali kechagi ahd kuni hisoblanadi. */
const todayKey = () => {
  const d = new Date();
  const mins = d.getHours()*60 + d.getMinutes();
  if(mins < wakeMins()) d.setDate(d.getDate()-1);
  return calKey(d);
};
function dayNumber(startISO){
  const s = new Date(startISO+"T00:00:00");
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.floor((n - s)/86400000) + 1;
}
/* Ahd sanasi mustahkamlangan — o'zgartirib bo'lmaydi */
const AHD_DATE = "2026-06-26";
const AHD_PRETTY = "26.06.2026";
const AHD_SHORT = "26.06.26";
function ahdInfo(){
  const dn = dayNumber(AHD_DATE);          // boshlangan kunda 1
  if(dn >= 1) return {started:true, n:dn, top:"Mo'minning kuni", sub:AHD_SHORT+" dan beri"};
  return {started:false, n:(1-dn), top:"Ahd boshlanadi", sub:"kun qoldi"};
}
const UZ_MON = ["yanvar","fevral","mart","aprel","may","iyun","iyul","avgust","sentabr","oktabr","noyabr","dekabr"];
const UZ_DOW = ["yakshanba","dushanba","seshanba","chorshanba","payshanba","juma","shanba"];
function prettyDate(){ const d=new Date(); return `${d.getDate()}-${UZ_MON[d.getMonth()]}, ${UZ_DOW[d.getDay()]}`; }
function fmtSum(n){ return new Intl.NumberFormat("uz-UZ").format(Math.round(n)); }
function hms(sec){ const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=Math.floor(sec%60); return (h>0?h+":":"")+pad(m)+":"+pad(s); }
function hShort(sec){ const h=Math.floor(sec/3600), m=Math.floor(sec%3600/60); return (h>0?h+"s ":"")+m+"d"; }
function dKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function parseDK(k){ const [y,m,dd]=k.split("-").map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
const UZ_MON_F = ["Yanvar","Fevral","Mart","Aprel","May","Iyun","Iyul","Avgust","Sentabr","Oktabr","Noyabr","Dekabr"];

/* ---------- HISTORY (reads all saved days) ---------- */
let HIST = null; // {days:{date:dayObj}, fin:{date:[items]}, time:{date:[items]}}
async function loadHistory(){
  const out = {days:{}, fin:{}, time:{}};
  const dayKeys  = await Store.list("momin:day:");
  const finKeys  = await Store.list("momin:fin:");
  const timeKeys = await Store.list("momin:time:");
  for(const k of dayKeys){ const v=J(await Store.get(k)); if(v) out.days[k.slice(10)]=v; }
  for(const k of finKeys){ const v=J(await Store.get(k)); if(v&&v.items) out.fin[k.slice(10)]=v.items; }
  for(const k of timeKeys){ const v=J(await Store.get(k)); if(v&&v.items) out.time[k.slice(11)]=v.items; }
  // ensure today's in-memory state is reflected even if not yet flushed
  out.days[todayKey()] = S.day;
  if(S.fin&&S.fin.items) out.fin[todayKey()] = S.fin.items;
  if(S.time&&S.time.items) out.time[todayKey()] = S.time.items;
  HIST = out;
  return out;
}
// completion % for a stored day object (routine only)
function dayRoutinePct(dayObj){
  if(!dayObj||!dayObj.routine) return 0;
  const ids = S.routine.map(r=>r.id);
  if(!ids.length) return 0;
  const done = ids.filter(id=>dayObj.routine[id]).length;
  return Math.round(done/ids.length*100);
}
function dayWoke(dayObj){ return !!(dayObj && dayObj.woke); }
// streak of consecutive woke-days ending today or yesterday
function computeStreak(){
  if(!HIST) return {current:0, best:0, totalDays:0, wokeDays:0};
  const dates = Object.keys(HIST.days).sort();
  const set = new Set(dates.filter(d=>dayWoke(HIST.days[d])));
  // current
  let cur=0; let d=new Date(); d.setHours(0,0,0,0);
  const pass = k => set.has(k) || isMercy(k);
  if(!pass(dKey(d))) d=addDays(d,-1); // allow streak to count up to yesterday if today not yet done
  while(pass(dKey(d))){ cur++; d=addDays(d,-1); }
  // best
  let best=0, run=0, prev=null;
  for(const ds of [...set].sort()){
    const cd=parseDK(ds);
    if(prev && (cd-prev)===86400000) run++; else run=1;
    best=Math.max(best,run); prev=cd;
  }
  const active = dates.filter(dt=>{ const o=HIST.days[dt]; return dayWoke(o)||dayRoutinePct(o)>0 || (o&&(o.zikr||o.note||(o.refl&&(o.refl.a||o.refl.b||o.refl.c)))); });
  return {current:cur, best, totalDays:active.length, wokeDays:set.size};
}

/* ---------- inline SVG bar chart ---------- */
function barChart(bars, opts){
  opts=opts||{}; const W=opts.w||640, H=opts.h||150, pad=24, gap=opts.gap!=null?opts.gap:3;
  const max=Math.max(1, ...bars.map(b=>b.v));
  const n=bars.length, bw=(W-pad*0 - gap*(n-1))/n;
  let rects="", labels="";
  bars.forEach((b,i)=>{
    const h=Math.max(b.v>0?2:0, (b.v/max)*(H-26));
    const x=i*(bw+gap), y=(H-18)-h;
    rects+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2.5" fill="${b.c||'var(--dawn)'}" opacity="${b.o||0.9}"><title>${b.t||''}</title></rect>`;
    if(b.lab) labels+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-5}" text-anchor="middle" font-size="8.5" fill="var(--ink-faint)" font-family="var(--mono)">${b.lab}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">${rects}${labels}</svg>`;
}

/* ---------- ISO week + week dates ---------- */
function isoWeekKey(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3);
  const firstThu=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  const week=1+Math.round(((t-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);
  return t.getUTCFullYear()+"-W"+pad(week);
}
function weekDates(offset){
  const base=parseDK(todayKey()); const dow=(base.getDay()+6)%7;
  const mon=addDays(base, -dow + (offset||0)*7);
  return Array.from({length:7},(_,i)=>dKey(addDays(mon,i)));
}
/* ---------- per-habit streak ---------- */
function habitStreak(rid){
  if(!HIST) return 0;
  const done=k=>{ const o=HIST.days[k]; return !!(o&&o.routine&&o.routine[rid]); };
  let d=parseDK(todayKey());
  if(!done(dKey(d))) d=addDays(d,-1);
  let n=0; while(done(dKey(d))){ n++; d=addDays(d,-1); } return n;
}
/* ---------- weekly aggregate ---------- */
function weekAgg(offset){
  const dates=weekDates(offset); const today=todayKey();
  let woke=0,rtSum=0,rtDays=0,salah=0,journal=0,timeSec=0,kir=0,chq=0,zikr=0;
  dates.forEach(k=>{ if(k>today) return; const o=HIST.days[k];
    if(o){ if(dayWoke(o)) woke++; const p=dayRoutinePct(o); if(p>0){rtSum+=p;rtDays++;}
      salah+=SALAH.filter(x=>o.salah&&o.salah[x.id]).length;
      if(o.note||(o.refl&&(o.refl.a||o.refl.b||o.refl.c))) journal++; zikr+=o.zikr||0; }
    (HIST.time[k]||[]).forEach(it=>timeSec+=it.sec);
    (HIST.fin[k]||[]).forEach(it=>{ if(it.kind==='kirim') kir+=it.amount; else chq+=it.amount; });
  });
  return {woke, adher:rtDays?Math.round(rtSum/rtDays):0, salah, journal, timeSec, kir, chq, savings:kir-chq, zikr};
}
/* ---------- goals ---------- */
function goalCur(g){
  if(g.auto==="sura") return S.surah.filter(s=>s.ok).length;
  if(g.auto==="jamgarma") return Math.max(0,(S.totals.kirim||0)-(S.totals.chiqim||0));
  return g.cur||0;
}
function goalPct(g){ const c=goalCur(g), t=g.target||1; return Math.max(0,Math.min(100,Math.round(c/t*100))); }
function daysLeft(deadline){ if(!deadline) return null; return Math.round((parseDK(deadline)-parseDK(todayKey()))/86400000); }
/* ---------- moon phase: 0=new(dark) .. 1=full(bright) ---------- */
function moonPhaseSVG(frac, size){
  frac=Math.max(0,Math.min(1,frac)); const r=size/2-1.5, cx=size/2, cy=size/2;
  const darkCx = cx - 2*r*frac;
  const id="mc"+size+"_"+Math.round(frac*1000);
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" aria-hidden="true">
    <defs><clipPath id="${id}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--moon-bright,#E7B45C)"/>
    <circle cx="${darkCx}" cy="${cy}" r="${r}" fill="var(--moon-dark,#0E1424)" clip-path="url(#${id})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--gold-line)" stroke-width="1.2"/>
  </svg>`;
}

}

function ring(pct, size, sw, id){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="bg" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${sw}"/>
    <circle class="fg" ${id?`id="${id}"`:""} cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${sw}"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
}

/* ============================================================= DAWN SKY ===== */
function wakeMins(){
  const parts=String(S.settings.wake||"04:00").split(":");
  const h=parseInt(parts[0],10)||0, m=parseInt(parts[1],10)||0;
  return ((h*60+m)%1440+1440)%1440;
}
function sunProgress(){
  const d=new Date(); const mins=d.getHours()*60+d.getMinutes();
  let p=(mins-wakeMins())/(24*60); // uyg'onish vaqti = 0 ; to'liq sutka
  if(p<0) p+=1; if(p>1) p-=1;
  return p;
}
function dayPhaseLabel(){
  const now=new Date(); const cur=now.getHours()*60+now.getMinutes();
  const tm=s=>{ s=String(s||""); const h=+s.slice(0,2), m=+s.slice(3,5); return (isFinite(h)&&isFinite(m))?h*60+m:null; };
  if(typeof PRAY!=="undefined" && PRAY){
    const fajr=tm(PRAY.Fajr), sun=tm(PRAY.Sunrise), dhuhr=tm(PRAY.Dhuhr), asr=tm(PRAY.Asr), mag=tm(PRAY.Maghrib), isha=tm(PRAY.Isha);
    if([fajr,sun,dhuhr,asr,mag,isha].every(x=>x!=null)){
      if(cur>=fajr && cur<sun)    return "Bomdod";
      if(cur>=sun  && cur<dhuhr)  return "Ertalab";
      if(cur>=dhuhr&& cur<asr)    return "Peshin";
      if(cur>=asr  && cur<mag)    return "Asr";
      if(cur>=mag  && cur<isha)   return "Shom";
      if(cur>=isha)               return "Xufton";   // Xufton — yarim tungacha
      return "Tun";                                   // yarim tundan Bomdodgacha
    }
  }
  // namoz vaqtlari hali yuklanmagan bo'lsa — taxminiy (Toshkent)
  if(cur>=240 && cur<360)   return "Bomdod";   // 04:00–05:59
  if(cur>=360 && cur<720)   return "Ertalab";  // 06:00–11:59
  if(cur>=720 && cur<930)   return "Peshin";   // 12:00–15:29
  if(cur>=930 && cur<1110)  return "Asr";      // 15:30–18:29
  if(cur>=1110&& cur<1200)  return "Shom";     // 18:30–19:59
  if(cur>=1200)             return "Xufton";   // 20:00–23:59
  return "Tun";                                 // 00:00–03:59
}
function phaseLabel(p){
  if(p<0.06) return "Tong sahari";
  if(p<0.30) return "Ertalab";
  if(p<0.52) return "Tushgacha";
  if(p<0.70) return "Tushdan keyin";
  if(p<0.84) return "Kechki payt";
  return "Tun";
}
function skySVG(){
  const W=800,H=240, cx=W/2, cy=H+30, rx=W*0.46, ry=H*0.74;
  const p=sunProgress(); const a=Math.PI*(1-p);
  const sx=cx+rx*Math.cos(a), sy=cy-ry*Math.sin(a);
  const horizon=H-46;
  const stars=[[90,40],[150,70],[230,38],[300,64],[360,30],[470,52],[560,36],[640,70],[700,44],[120,100],[680,96],[420,80]]
    .map(([x,y])=>`<circle cx="${x}" cy="${y}" r="${(Math.random()*0.9+0.5).toFixed(1)}" fill="#fff" opacity="${(0.15+Math.random()*0.35).toFixed(2)}"/>`).join("");
  // arc path (sun path)
  const lx=cx-rx, rxp=cx+rx;
  const lift = Math.max(0, Math.sin(a)); // 0..1 how high sun is -> light intensity
  return `<svg class="sky" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="skyg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#070b17"/>
        <stop offset="0.55" stop-color="#0c1326"/>
        <stop offset="1" stop-color="${lift>0.15?"#1a1c2e":"#0c1124"}"/>
      </linearGradient>
      <radialGradient id="glowg" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#ffd98c" stop-opacity="${(0.8*lift+0.2).toFixed(2)}"/>
        <stop offset="0.4" stop-color="#e7b45c" stop-opacity="${(0.5*lift+0.1).toFixed(2)}"/>
        <stop offset="1" stop-color="#e7b45c" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="horg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#3a2a14" stop-opacity="0.0"/>
        <stop offset="${(p*100).toFixed(0)}%" stop-color="#e7b45c" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#5e688a" stop-opacity="0.0"/>
      </linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#skyg)"/>
    <g opacity="${(1-lift*0.9).toFixed(2)}">${stars}</g>
    <path d="M${lx} ${cy-0} A ${rx} ${ry} 0 0 1 ${rxp} ${cy}" fill="none" stroke="var(--line)" stroke-width="1" stroke-dasharray="3 7" opacity="0.5"/>
    <ellipse cx="${sx}" cy="${sy}" rx="60" ry="60" fill="url(#glowg)" class="sun-glow"/>
    <circle cx="${sx}" cy="${sy}" r="11" fill="#ffdf9e"/>
    <circle cx="${sx}" cy="${sy}" r="11" fill="none" stroke="#fff3d6" stroke-opacity="0.6"/>
    <rect x="0" y="${horizon}" width="${W}" height="3" fill="url(#horg)"/>
    <rect x="0" y="${horizon+3}" width="${W}" height="${H-horizon}" fill="#06090f" opacity="0.6"/>
  </svg>`;
}

function countUp(el, target, ms){
  if(!el) return; target=Math.round(+target||0);
  if(typeof requestAnimationFrame!=="function" || target<=0){ el.textContent=String(target); return; }
  const dur=ms||680, t0=(performance&&performance.now)?performance.now():Date.now();
  el.textContent="0";
  const step=(t)=>{ const now=t|| ((performance&&performance.now)?performance.now():Date.now());
    const p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3);
    el.textContent=String(Math.round(e*target)); if(p<1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

  return "Tun — kunni sarhisob qil";
}

const escd = v => String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function prettyDK(k){ const d=parseDK(k); return `${d.getDate()}-${UZ_MON[d.getMonth()]}`; }

function renderIbodat(){

  const surahRows = S.surah.map(s=>{
    const pct = s.ok?100:(s.ayah?Math.round(Math.min(s.done||0,s.ayah)/s.ayah*100):0);

    const due = s.ok && (s.rev==null || days>=7);
    const revBlock = s.ok ? `<div class="su-rev">

        <div class="su-top"><span class="su-name">${escd(s.name)}</span><span class="su-meta">${s.ok?('takror ×'+(s.revs||0)):((s.done||0)+' / '+s.ayah+' oyat')}</span></div>

      ${s.ok?'':`<div class="su-ctrl"><button class="su-mini" data-act="surahMinus" data-id="${s.id}">−</button><button class="su-mini" data-act="surahPlus" data-id="${s.id}">+</button></div>`}
      <button class="row-del" data-act="delSurah" data-id="${s.id}" title="O'chirish">×</button>
    </div>`;
  }).join("") || `<div class="empty"><div class="serif">Reja bo'sh</div><div>Quyidan sura qo'sh.</div></div>`;
  const dueCount = S.surah.filter(s=>s.ok && (s.rev==null || Math.floor((Date.now()-new Date(s.rev).getTime())/86400000)>=7)).length;

  const rAyah=listFilterView("ibodat", S.ayahs||[], a=>a.text+" "+(a.ref||""));

      <div class="zikr-btns">
        <button class="zikr-tap" data-act="zikrTap">Tasbeh +1</button>
        <button class="zikr-reset" data-act="zikrReset">Nolla</button>
      </div>
    </div>

    <div class="sec-head"><h2>Qur'on yodlash</h2><div class="pc"><b>${memo}</b> sura · ${suPct}%${dueCount?` · <span class="due-badge">${dueCount} takror</span>`:''}</div></div>
    <div class="su-wrap">${surahRows}</div>
    <div class="add-panel two">

    <p class="page-sub" style="margin-top:-4px">Yodda saqlamoqchi bo'lgan oyatlarni yozib boring — Bugun bo'limida tasodifiy aylanib turadi.</p>

      </div>`).join("") : ((S.ayahs||[]).length? `<div class="empty"><div class="serif">Topilmadi</div></div>` : `<div class="empty"><div class="serif">Hali oyat yo'q</div><div>Quyidan birinchi oyatni qo'shing.</div></div>`)}</div>

function togglePrayer(id){ S.day.salah[id]=!S.day.salah[id]; saveDay(); renderIbodat(); }
function zikrTap(){ S.day.zikr=(S.day.zikr||0)+1; buzz(S.day.zikr%99===0?[40,60,40,60,90]:(S.day.zikr%33===0?[30,50,60]:10)); scheduleSaveDay(); const n=$("#zikrNum"); if(n) n.textContent=S.day.zikr; }

function addSurah(){ const name=($("#addSuName").value||"").trim(); if(!name) return; const ayah=parseInt(($("#addSuAyah").value||"0").replace(/[^\d]/g,""),10)||1; S.surah.push({id:uid(),name,ayah,done:0,ok:false,rev:null,revs:0}); saveSurah(); renderIbodat(); }
function surahPlus(id){ const s=S.surah.find(x=>x.id===id); if(s){ const was=s.ok; s.done=Math.min((s.done||0)+1, s.ayah); if(s.done>=s.ayah) s.ok=true; saveSurah(); renderIbodat(); if(s.ok&&!was) celebrate("surah-"+s.id, escd(s.name)+" yodlandi ✓", "Yana bir sura qalbingga ko'chdi. Endi takrorlab tur."); } }
function surahMinus(id){ const s=S.surah.find(x=>x.id===id); if(s){ s.done=Math.max((s.done||0)-1,0); s.ok=false; saveSurah(); renderIbodat(); } }
function surahOk(id){ const s=S.surah.find(x=>x.id===id); if(s){ const was=s.ok; s.ok=!s.ok; if(s.ok){ s.done=s.ayah; if(s.rev==null) s.rev=null; } saveSurah(); renderIbodat(); if(s.ok&&!was) celebrate("surah-"+s.id, escd(s.name)+" yodlandi ✓", "Yana bir sura qalbingga ko'chdi. Endi takrorlab tur."); } }
function reviewSurah(id){ const s=S.surah.find(x=>x.id===id); if(s){ s.rev=new Date().toISOString().slice(0,10); s.revs=(s.revs||0)+1; saveSurah(); renderIbodat(); toast("🔁 "+escd(s.name)+" — takror belgilandi"); } }
function delSurah(id){ S.surah=S.surah.filter(x=>x.id!==id); saveSurah(); renderIbodat(); }

function renderMaqsad(){

      <div class="ap-hint">Yangi maqsad</div>
      <input class="inp" id="goalTitle" placeholder="Maqsad (masalan: 10 kitob o'qish)">
      <div class="goal-add-row">
        <input class="inp" id="goalTarget" inputmode="numeric" placeholder="Nishon (son)" style="flex:1">

    <p class="muted" style="font-size:12px;margin-top:14px">“Yodlangan suralar” va “jamg'arma” maqsadlari o'zi yangilanadi — Ibodat va Moliya bilan bog'liq.</p>`;
}
function addGoal(){
  const title=($("#goalTitle").value||"").trim(); if(!title) return;
  const target=parseInt(($("#goalTarget").value||"0").replace(/[^\d]/g,""),10)||100;
  const unit=($("#goalUnit").value||"").trim();
  const deadline=$("#goalDeadline").value||"";
  S.goals.push({id:uid(), title, auto:null, target, cur:0, unit, deadline, stage:""});
  saveGoals(); renderMaqsad();
}
function goalInc(id){ const g=S.goals.find(x=>x.id===id); if(g&&!g.auto){ g.cur=Math.min((g.cur||0)+1, g.target); saveGoals(); checkGoalDone(g); renderMaqsad(); } }
function goalDec(id){ const g=S.goals.find(x=>x.id===id); if(g&&!g.auto){ g.cur=Math.max((g.cur||0)-1,0); saveGoals(); renderMaqsad(); } }
function delGoal(id){ S.goals=S.goals.filter(x=>x.id!==id); saveGoals(); renderMaqsad(); }
function checkGoalDone(g){ if(goalPct(g)>=100) celebrate("goal-"+g.id, "Maqsadga yetding! 🎯", escd(g.title)+" — bajarildi."); }

async function fillJournalPast(){
  if(!HIST) await loadHistory();
  const dates=Object.keys(HIST.days).filter(d=>{ const o=HIST.days[d]; return d!==todayKey() && o && (o.note || (o.refl&&(o.refl.a||o.refl.b||o.refl.c))); }).sort().reverse();

  if(cnt) cnt.textContent = dates.length+" yozuv";

  if(!dates.length){ box.innerHTML=`<div class="empty"><div class="serif">Hali o'tgan yozuvlar yo'q</div><div>Bugundan boshla.</div></div>`; return; }

function drawTarix(){

  const body=$("#tarixBody"); if(!body) return;
  body.innerHTML = `
    <div class="streak-grid">

    <div id="dayDetail"></div>`;

function calendarHTML(){
  const mref=new Date(S.histMonth);
  const first=startOfMonth(mref);
  const dim=new Date(mref.getFullYear(), mref.getMonth()+1, 0).getDate();
  let startDow=(first.getDay()+6)%7; // Monday=0
  const dows=["Du","Se","Ch","Pa","Ju","Sh","Ya"];
  const tkey=todayKey(); const endToday=new Date(new Date().setHours(23,59,59,999));
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell ph"></div>`;
  for(let day=1; day<=dim; day++){
    const d=new Date(mref.getFullYear(), mref.getMonth(), day);
    const key=dKey(d), o=HIST.days[key];
    const pct=dayRoutinePct(o), woke=dayWoke(o), future=d>endToday;
    const intensity = pct>0? (0.14+pct/100*0.78).toFixed(2):0;
    const isToday=key===tkey, sel=key===S.histPick;
    cells+=`<button class="cal-cell ${isToday?'today':''} ${sel?'sel':''} ${future?'fut':''}" data-act="histDay" data-id="${key}" ${future?'disabled':''} style="${pct>0?`background:rgba(98,162,133,${intensity});border-color:rgba(98,162,133,.45)`:''}"><span class="cd">${day}</span>${woke?'<span class="wdot"></span>':''}</button>`;
  }

async function exportData(){

  for(const k of keys){ data[k]=await Store.get(k); }
  data["momin:settings"]=JSON.stringify(S.settings);
  data[dayK()]=JSON.stringify(S.day);
  if(S.fin) data[finK()]=JSON.stringify(S.fin);
  if(S.time) data[timeK()]=JSON.stringify(S.time);
  const txt=JSON.stringify({app:"momin", v:1, exported:new Date().toISOString(), data});
  const ta=$("#expText"); if(ta){ ta.value=txt; ta.removeAttribute("hidden"); }
  try{
    const blob=new Blob([txt],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="momin-zaxira-"+todayKey()+".json";
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(e){}

function backupNoteHTML(){
  const age=backupAgeDays();
  if(age==null) return `<span class="bk-warn">Hali biror marta zaxira qilinmagan. Ma'lumotni yo'qotmaslik uchun vaqti-vaqti bilan eksport qiling.</span>`;
  const txt = age===0?"bugun":(age+" kun oldin");
  return age>=14 ? `<span class="bk-warn">Oxirgi zaxira: ${txt} — eslatma: yangilab qo'ying.</span>` : `Oxirgi zaxira: <b>${txt}</b>`;
}
function copyExport(){
  const ta=$("#expText"); if(!ta||!ta.value){ const s=$("#expMsg"); if(s) s.textContent="Avval “Eksport” ni bosing"; return; }
  ta.removeAttribute("hidden");
  try{ ta.select(); }catch(e){}
  let done=false;
  try{ if(navigator.clipboard){ navigator.clipboard.writeText(ta.value); done=true; } }catch(e){}
  if(!done){ try{ document.execCommand("copy"); done=true; }catch(e){} }
  const s=$("#expMsg"); if(s) s.textContent=done?"Nusxa olindi ✓":"Nusxa olib bo'lmadi — qo'lda belgilang";

async function importData(){
  const ta=$("#impText"); const raw=(ta&&ta.value||"").trim();
  const msg=$("#impMsg");
  if(!raw){ if(msg) msg.textContent="Matn maydoniga zaxira JSON'ini joylang"; return; }
  let p; try{ p=JSON.parse(raw); }catch(e){ if(msg) msg.textContent="Xato: bu JSON emas"; return; }
  const data=p.data||p;
  if(!data||typeof data!=="object"){ if(msg) msg.textContent="Xato format"; return; }
  const keys=Object.keys(data).filter(k=>k.indexOf("momin:")===0);
  if(!keys.length){ if(msg) msg.textContent="Ichida momin ma'lumoti topilmadi"; return; }
  if(!confirm("Hozirgi ma'lumot ustiga "+keys.length+" yozuv yoziladi. Davom etamizmi?")) return;
  for(const k of keys){ await Store.set(k, typeof data[k]==="string"?data[k]:JSON.stringify(data[k])); }
  await loadAll(); HIST=null;
  if(msg) msg.textContent="Yuklandi ✓";
  render();
}

let remindTimer=null;
function scheduleReminder(){
  if(remindTimer){ clearTimeout(remindTimer); remindTimer=null; }
  if(!S.settings.remind) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const now=new Date(); const parts=String(S.settings.wake||"04:00").split(":");
  const next=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(parts[0])||0,parseInt(parts[1])||0,0,0);
  if(next<=now) next.setDate(next.getDate()+1);
  const ms=Math.min(next-now, 2147483647);
  remindTimer=setTimeout(()=>{
    try{ new Notification("Mo'min — Ahd vaqti", {body:(S.settings.wake||"04:00")+" — tur. Bugun ham 99%."}); }catch(e){}
    scheduleReminder();
  }, ms);
}
async function toggleReminder(){
  const msg=$("#remMsg");
  if(S.settings.remind){ S.settings.remind=false; saveSet(); if(remindTimer){clearTimeout(remindTimer);remindTimer=null;} renderSozlama(); return; }
  if(!("Notification" in window)){ if(msg) msg.textContent="Bu brauzer eslatmani qo'llab-quvvatlamaydi"; return; }
  let perm=Notification.permission;
  if(perm!=="granted"){ try{ perm=await Notification.requestPermission(); }catch(e){} }
  if(perm==="granted"){ S.settings.remind=true; saveSet(); scheduleReminder(); renderSozlama(); }
  else { if(msg) msg.textContent="Ruxsat berilmadi. Brauzer sozlamasidan ruxsat bering."; }
}

function setupPWA(){
  try{
    const mk=(sz)=>{ const c=document.createElement("canvas"); c.width=c.height=sz; const x=c.getContext("2d");
      x.fillStyle="#0A0F1E"; x.fillRect(0,0,sz,sz);
      const cx=sz*0.53, cy=sz*0.5, r=sz*0.3;
      x.fillStyle="#E7B45C"; x.beginPath(); x.arc(cx,cy,r,0,Math.PI*2); x.fill();
      x.fillStyle="#0A0F1E"; x.beginPath(); x.arc(cx+r*0.42,cy-r*0.2,r*0.92,0,Math.PI*2); x.fill();
      x.fillStyle="#E7B45C"; x.beginPath(); x.arc(cx+r*0.95,cy-r*0.62,r*0.12,0,Math.PI*2); x.fill();
      return c.toDataURL("image/png");
    };
    const i180=mk(180), i512=mk(512);
    const l=document.createElement("link"); l.rel="apple-touch-icon"; l.href=i180; document.head.appendChild(l);
    const man={name:"Mo'min — Kun tartibi", short_name:"Mo'min", display:"standalone", orientation:"portrait", background_color:"#0A0F1E", theme_color:"#0A0F1E", start_url:".", icons:[{src:i180,sizes:"180x180",type:"image/png",purpose:"any maskable"},{src:i512,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
    const blob=new Blob([JSON.stringify(man)],{type:"application/manifest+json"});
    const m=document.createElement("link"); m.rel="manifest"; m.href=URL.createObjectURL(blob); document.head.appendChild(m);
  }catch(e){}
}

/* keyboard toggle for check rows */
document.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    const inp=e.target.closest(".add-panel, .add-row");
    if(inp && e.target.tagName==="INPUT"){
      e.preventDefault();
      const btn=inp.querySelector("button[data-act]");
      if(btn) btn.click();
      return;
    }
  }
  if((e.key===" "||e.key==="Enter")){
    const el=e.target.closest("[data-act='toggleR'],[data-act='toggleS']");
    if(el){ e.preventDefault(); el.click(); }
  }
});

function toggleRoutine(id){
  S.day.routine[id]=!S.day.routine[id];
  if(id==="wake"&&S.day.routine[id]) S.day.woke=true;
  saveDay();
  const rp=routinePct();
  // update in place for snappiness
  const row=document.querySelector(`[data-act='toggleR'][data-id='${id}']`);
  if(row){ row.classList.toggle("done", S.day.routine[id]); row.setAttribute("aria-checked", S.day.routine[id]); }
  const pc=document.querySelector("#v-tartib .pc"); if(pc) pc.innerHTML=`<b>${rp}%</b> · ${S.routine.filter(r=>S.day.routine[r.id]).length}/${S.routine.length}`;
  const allDone = S.routine.length>0 && S.routine.every(r=>S.day.routine[r.id]);
  const db=$("#tartibDone"); if(db) db.classList.toggle("show", allDone);
  if(HIST){ HIST.days[todayKey()]=S.day; } // keep history live
  fillHabitStreaks();
  if(id==="wake") checkStreakMilestone();
}
function toggleStd(key){
  S.day.std[key]=!S.day.std[key]; saveDay();
  const row=document.querySelector(`[data-act='toggleS'][data-id='${key}']`);
  if(row){ row.classList.toggle("done", S.day.std[key]); row.setAttribute("aria-checked", S.day.std[key]); }
  // update category bar + counts + header
  const cid=key.split(":")[0]; const cat=S.standards.find(c=>c.id===cid); const ct=catTotals(cat);
  const head=document.querySelector(`[data-act='toggleCat'][data-id='${cid}']`);
  if(head){ const pr=head.querySelector(".std-prog"); pr.innerHTML=`<b>${ct.done}</b>/${ct.all}`;
    const bar=head.parentElement.querySelector(".std-bar i"); if(bar) bar.style.width=ct.pct+"%"; }
  const sp=stdTotals(); const pc=document.querySelector("#v-standart .pc"); if(pc) pc.innerHTML=`<b>${sp.pct}%</b> · ${sp.done}/${sp.all}`;
}

/* editable lists: add / delete */
function addRoutine(){
  const lab=($("#addRLab").value||"").trim(); if(!lab) return;
  const det=($("#addRDet").value||"").trim();
  const why=($("#addRWhy").value||"").trim();
  S.routine.push({id:uid(), lab, det, why});
  saveRoutine(); renderTartib();
  const el=$("#addRLab"); if(el) el.focus();
}
function delRoutine(id){
  S.routine=S.routine.filter(r=>r.id!==id);
  delete S.day.routine[id];
  saveRoutine(); saveDay(); renderTartib();
}
function addStd(cid){
  const el=$("#addS-"+cid); const t=((el&&el.value)||"").trim(); if(!t) return;
  const cat=S.standards.find(c=>c.id===cid); if(!cat) return;
  cat.items.push({id:uid(), t});
  S.openCat=cid;
  saveStandards(); renderStandart();
  const n=$("#addS-"+cid); if(n) n.focus();
}
function delStd(key){
  const cid=key.split(":")[0], iid=key.slice(cid.length+1);
  const cat=S.standards.find(c=>c.id===cid); if(cat) cat.items=cat.items.filter(i=>i.id!==iid);
  delete S.day.std[key];
  saveStandards(); saveDay(); renderStandart();
}

/* finance */
function addFin(){
  const amtEl=$("#finAmt"), noteEl=$("#finNote");
  let raw=(amtEl.value||"").replace(/[^\d]/g,"");
  const amount=parseInt(raw||"0",10);
  const note=(noteEl.value||"").trim();
  const it={kind:S.finKind, amount:isNaN(amount)?0:amount, note, t:new Date().toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"})};
  S.fin.items.unshift(it);
  if(it.kind==="kirim") S.totals.kirim+=it.amount; else S.totals.chiqim+=it.amount;
  saveFin(); saveTot(); renderMoliya();
  const a=$("#finAmt"); if(a) a.focus();
}
function delFin(idx){
  const it=S.fin.items[idx]; if(!it) return;
  if(it.kind==="kirim") S.totals.kirim-=it.amount; else S.totals.chiqim-=it.amount;
  S.fin.items.splice(idx,1); saveFin(); saveTot(); renderMoliya();
}

/* stopwatch */
function swToggle(){
  if(SW.running){ SW.base=swElapsed(); SW.running=false; if(SW.raf){cancelAnimationFrame(SW.raf);SW.raf=null;} }
  else { SW.start=performance.now(); SW.running=true; tickSW(); }
  const b=$("#swBtn"); if(b) b.textContent=SW.running?"To'xtatish":"Boshlash";
  const t=$("#swTime"); if(t) t.classList.toggle("run",SW.running);
}
function swSave(){
  const sec=Math.round(swElapsed()/1000); if(sec<1) return;
  const label=($("#swLabel").value||"").trim();
  S.time.items.unshift({label, sec, t:new Date().toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"})});
  saveTime();
  SW={running:false,base:0,start:0,raf:null};
  renderVaqt();
}
function swReset(){ if(SW.raf){cancelAnimationFrame(SW.raf);SW.raf=null;} SW={running:false,base:0,start:0,raf:null}; renderVaqt(); }
function delTime(idx){ S.time.items.splice(idx,1); saveTime(); renderVaqt(); }
