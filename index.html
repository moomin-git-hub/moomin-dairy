<script>
"use strict";
/* ============================================================= STORAGE ===== */
/* Backends, in priority order:
   1) window.storage  — Claude.ai artifact storage (only inside Claude)
   2) localStorage    — normal browsers incl. GitHub Pages (persists on device)
   3) in-memory Map   — last resort (lost on reload) */
const mem = new Map();
const hasWS = (()=>{ try{ return !!(typeof window!=="undefined" && window.storage && window.storage.get); }catch(e){ return false; } })();
const hasLS = (()=>{ try{ const t="__momin_t"; localStorage.setItem(t,"1"); localStorage.removeItem(t); return true; }catch(e){ return false; } })();
const Store = {
  async get(k){
    if(hasWS){ try{ const r = await window.storage.get(k); if(r) return r.value; }catch(e){} }
    if(hasLS){ try{ const v = localStorage.getItem(k); if(v!==null) return v; }catch(e){} }
    return mem.has(k) ? mem.get(k) : null;
  },
  async set(k,v){
    mem.set(k,v);
    if(hasLS){ try{ localStorage.setItem(k,v); }catch(e){} }
    if(hasWS){ try{ await window.storage.set(k,v); }catch(e){} }
    try{ fbPush(k,v); }catch(e){}
  },
  async del(k){
    mem.delete(k);
    if(hasLS){ try{ localStorage.removeItem(k); }catch(e){} }
    if(hasWS){ try{ await window.storage.delete(k); }catch(e){} }
  },
  async list(prefix){
    const keys = new Set();
    if(hasWS){ try{ const r = await window.storage.list(prefix); if(r&&r.keys) r.keys.forEach(x=>keys.add(x)); }catch(e){} }
    if(hasLS){ try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(prefix)===0) keys.add(k); } }catch(e){} }
    for(const k of mem.keys()){ if(k.indexOf(prefix)===0) keys.add(k); }
    return [...keys];
  }
};
const J  = s => { try{return JSON.parse(s);}catch(e){return null;} };

/* ============================================================= FIREBASE SYNC =
   Ixtiyoriy bulutli sinxron. Foydalanuvchi o'z Firebase loyihasi
   konfiguratsiyasini joylaydi → email bilan kiradi → barcha "momin:*"
   kalitlari Realtime Database'ga jonli sinxron bo'ladi (qurilmalararo).
   Konfiguratsiya bo'lmasa — bu blok hech narsa qilmaydi, ilova avvalgidek. */
const FB = { libs:null, app:null, auth:null, db:null, user:null, ready:false, connected:false, unsub:null, _applying:false };
function fbGetConfig(){ try{ const t=localStorage.getItem("momin_fbcfg"); return t?JSON.parse(t):null; }catch(e){ return null; } }
function fbSaveConfig(c){ try{ localStorage.setItem("momin_fbcfg", JSON.stringify(c)); }catch(e){} }
function fbClearConfig(){ try{ localStorage.removeItem("momin_fbcfg"); }catch(e){} }
function fbSetStatus(s){ S.fbStatus=s||""; ["#fbStatus","#loginStatus"].forEach(sel=>{ const el=document.querySelector(sel); if(el) el.textContent=S.fbStatus; }); }
function fbAuthErr(e){
  const c=(e&&e.code)||""; 
  if(c.includes("email-already-in-use")) return "Bu email allaqachon ro'yxatda — “Kirish”ni bosing.";
  if(c.includes("invalid-email")) return "Email noto'g'ri.";
  if(c.includes("weak-password")) return "Parol juda zaif (kamida 6 belgi).";
  if(c.includes("wrong-password")||c.includes("invalid-credential")) return "Email yoki parol noto'g'ri.";
  if(c.includes("user-not-found")) return "Bunday foydalanuvchi yo'q — “Ro'yxatdan o'tish”ni bosing.";
  if(c.includes("network")) return "Internet bilan aloqa yo'q.";
  return "Xato: "+((e&&e.message)||c||e);
}
async function fbLoad(){
  if(FB.libs) return FB.libs;
  const v="10.12.0", base="https://www.gstatic.com/firebasejs/"+v+"/";
  const [appM,authM,dbM]=await Promise.all([
    import(base+"firebase-app.js"),
    import(base+"firebase-auth.js"),
    import(base+"firebase-database.js")
  ]);
  FB.libs={appM,authM,dbM};
  return FB.libs;
}
async function fbInit(cfg){
  try{
    const {appM,authM,dbM}=await fbLoad();
    FB.app=appM.initializeApp(cfg);
    FB.auth=authM.getAuth(FB.app);
    FB.db=dbM.getDatabase(FB.app, cfg.databaseURL);
    FB.ready=true;
    authM.onAuthStateChanged(FB.auth, async (user)=>{
      FB.user=user||null;
      if(user){ fbSetStatus("Sinxron yoqilmoqda…"); await fbStartSync(); fbSetStatus(""); closeLogin(); }
      else { fbStopSync(); }
      if(S.view==="sozlama" && typeof renderSozlama==="function") renderSozlama();
      updateSyncBadge();
    });
  }catch(e){ fbSetStatus("Firebase yuklanmadi: "+((e&&e.message)||e)); }
}
function fbPush(k,v){
  if(!FB.connected||!FB.user||FB._applying||!FB.libs) return;
  if(String(k).indexOf("momin:")!==0) return;
  try{ const {dbM}=FB.libs; dbM.set(dbM.ref(FB.db,"users/"+FB.user.uid+"/"+k), v); S.fbLastSync=Date.now(); updateSyncBadge(); }catch(e){}
}
async function reloadFromLocal(){ await loadAll(); HIST=null; if(typeof render==="function") render(); updateSyncBadge(); }
async function fbStartSync(){
  if(!FB.libs||!FB.user) return;
  persistCoreState(); // joriy seed/holatni mahalliy bazaga yozib qo'yamiz
  const {dbM}=FB.libs; const uid=FB.user.uid; const r=dbM.ref(FB.db,"users/"+uid);
  let remote=null;
  try{ const snap=await dbM.get(r); remote=snap.exists()?snap.val():null; }
  catch(e){ fbSetStatus("Bulutga ulanib bo'lmadi: "+((e&&e.message)||e)); return; }
  FB.connected=true;
  const localKeys=await Store.list("momin:");
  if(remote){
    FB._applying=true;
    for(const key in remote){ if(key.indexOf("momin:")===0) await Store.set(key, remote[key]); }
    FB._applying=false;
    const rk=new Set(Object.keys(remote));
    for(const k of localKeys){ if(!rk.has(k)){ const val=await Store.get(k); if(val!=null){ try{ dbM.set(dbM.ref(FB.db,"users/"+uid+"/"+k), val); }catch(e){} } } }
    await reloadFromLocal();
  } else {
    for(const k of localKeys){ const val=await Store.get(k); if(val!=null){ try{ dbM.set(dbM.ref(FB.db,"users/"+uid+"/"+k), val); }catch(e){} } }
  }
  // jonli tinglovchi — butun shoxni diff bilan qo'llaydi (o'z yozuvi takror render qilmaydi)
  FB.unsub = dbM.onValue(r, async (snap)=>{
    if(FB._applying) return;
    const val=snap.val(); if(!val) return;
    let changed=false; FB._applying=true;
    try{
      for(const key in val){ if(key.indexOf("momin:")!==0) continue;
        const cur=await Store.get(key);
        if(cur!==val[key]){ await Store.set(key, val[key]); changed=true; } }
    } finally { FB._applying=false; }
    if(changed) await reloadFromLocal();
  });
  S.fbLastSync=Date.now(); fbSetStatus(""); updateSyncBadge();
}
function fbStopSync(){ try{ if(FB.unsub) FB.unsub(); }catch(e){} FB.unsub=null; FB.connected=false; updateSyncBadge(); }
async function fbClearRemote(){ try{ if(FB.connected&&FB.user&&FB.libs){ const {dbM}=FB.libs; await dbM.remove(dbM.ref(FB.db,"users/"+FB.user.uid)); } }catch(e){} }
function updateSyncBadge(){
  const el=document.querySelector("#syncBadge"); if(!el) return;
  if(FB.connected&&FB.user){ el.textContent="☁ sinxron"; el.className="sync-badge on"; }
  else if(fbGetConfig()){ el.textContent="☁ ulanmagan"; el.className="sync-badge off"; }
  else { el.textContent=""; el.className="sync-badge"; }
}
function fbMaybeAutoConnect(){ const cfg=fbGetConfig(); if(cfg&&cfg.databaseURL){ fbInit(cfg); } }
/* UI handlers */
function fbParseCfg(txt){
  if(!txt) return null;
  const m = String(txt).match(/\{[\s\S]*\}/); const t = m ? m[0] : txt;
  let cfg=null;
  try{ cfg=JSON.parse(t); }catch(e){ try{ cfg=(new Function("return ("+t+")"))(); }catch(e2){ cfg=null; } }
  return cfg;
}
function fbSaveCfg(){
  const txt=((document.querySelector("#fbConfig")||{}).value||"").trim();
  const dbUrl=((document.querySelector("#fbDbUrl")||{}).value||"").trim();
  if(!txt){ fbSetStatus("Konfiguratsiya bo'sh."); return; }
  const cfg=fbParseCfg(txt);
  if(!cfg||!cfg.apiKey||!cfg.projectId){ fbSetStatus("Config o'qilmadi — faqat { ... } qismini joylang (ichida apiKey va projectId bo'lsin)."); return; }
  if(!cfg.databaseURL && dbUrl) cfg.databaseURL = dbUrl;

async function fbAuth(mode){

  if(!FB.ready){ fbSetStatus("Avval konfiguratsiyani saqlang."); return; }
  const email=((document.querySelector("#fbEmail")||{}).value||"").trim();

  if(!email||pw.length<6){ fbSetStatus("Email va kamida 6 belgili parol kiriting."); return; }

/* ============================================================= THEME ======== */
function getTheme(){ try{ return localStorage.getItem("momin_theme")||"dark"; }catch(e){ return "dark"; } }
function applyTheme(mode){
  mode = mode || getTheme();
  try{ localStorage.setItem("momin_theme", mode); }catch(e){}
  let t = mode;
  if(mode==="auto"){ t = (typeof window!=="undefined" && window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark"; }
  try{ const el=document.documentElement; if(el){ if(t==="light") el.setAttribute("data-theme","light"); else el.removeAttribute("data-theme"); } }catch(e){}
  try{ const m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute("content", t==="light"?"#F4EFE4":"#0A0F1E"); }catch(e){}
  return t;
}
function setTheme(mode){ applyTheme(mode); if(S.view==="sozlama" && typeof renderSozlama==="function") renderSozlama(); if(S.view==="bugun" && typeof renderBugun==="function") renderBugun(); }
function initThemeWatch(){
  try{ if(typeof window!=="undefined" && window.matchMedia){
    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", ()=>{ if(getTheme()==="auto") applyTheme("auto"); });
  } }catch(e){}
}

const PIN_LEN=4;
let pinBuf="", pinMode="unlock", pinTemp="";
function getPin(){ return S.pinHash || ""; }
function setPinStore(h){ S.pinHash=h; Store.set("momin:pin", h); }
function clearPinStore(){ S.pinHash=""; Store.del("momin:pin"); }
function pinHash(p){ let h=5381; for(let i=0;i<p.length;i++){ h=((h<<5)+h+p.charCodeAt(i))>>>0; } return "h"+h; }
function pinIsSet(){ return !!getPin(); }
function exitSVG(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M14 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"/></svg>`; }

function pinTitleFor(){ return pinMode==="unlock" ? ("Salom, "+(S.settings.name||"Mo'min")+"!") : (pinMode==="set" ? "Yangi PIN" : "Tasdiqlang"); }
function pinSubFor(){ return pinMode==="unlock" ? "PIN kodni kiriting" : (pinMode==="set" ? "4 raqamli PIN o'ylab toping" : "PIN ni qayta kiriting"); }
function renderPinScreen(err){
  const el=$("#pinScreen"); if(!el) return;
  const caps = Array.from({length:PIN_LEN},(_,i)=>`<div class="pin-cap c${i} ${i<pinBuf.length?'fill':''}"></div>`).join("");
  const keys = [1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" data-act="pinDigit" data-d="${n}">${n}</button>`).join("");
  el.innerHTML = `

      <div class="pin-greet">
        <h2 class="pin-h">${escd(pinTitleFor())}</h2>

      </div>
      <div class="pin-caps ${err?'shake':''}">${caps}</div>
      <button class="pin-forgot" data-act="pinForgot">${pinMode==="unlock"?"PIN esdan chiqdimi?":"Hozircha kerak emas"}</button>

        <span class="pin-key-empty"></span>
        <button class="pin-key" data-act="pinDigit" data-d="0">0</button>

      </div>

  el.removeAttribute("hidden");
}
function lockApp(){ pinMode="unlock"; pinBuf=""; pinTemp=""; renderPinScreen(); }
function startSetPin(){ pinMode="set"; pinBuf=""; pinTemp=""; renderPinScreen(); }
function unlockApp(){ const el=$("#pinScreen"); if(el){ el.setAttribute("hidden",""); el.innerHTML=""; } pinBuf=""; pinMode="unlock"; }
function updatePinCaps(){ for(let i=0;i<PIN_LEN;i++){ const c=$(".pin-cap.c"+i); if(c){ if(i<pinBuf.length) c.classList.add("fill"); else c.classList.remove("fill"); } } }
function pinDigit(d){ if(pinBuf.length>=PIN_LEN) return; pinBuf+=String(d); updatePinCaps(); if(pinBuf.length===PIN_LEN){ if(typeof setTimeout==="function") setTimeout(pinSubmit,140); } }
function pinBack(){ pinBuf=pinBuf.slice(0,-1); updatePinCaps(); }
function pinSubmit(){
  if(pinMode==="unlock"){
    if(pinHash(pinBuf)===getPin()) unlockApp();
    else { pinBuf=""; renderPinScreen("Noto'g'ri PIN. Qayta urinib ko'ring."); }
  } else if(pinMode==="set"){
    pinTemp=pinBuf; pinBuf=""; pinMode="confirm"; renderPinScreen();
  } else if(pinMode==="confirm"){
    if(pinBuf===pinTemp){ setPinStore(pinHash(pinBuf)); unlockApp(); if(typeof toast==="function") toast("🔒 PIN o'rnatildi"); if(S.view==="sozlama"&&typeof renderSozlama==="function") renderSozlama(); }
    else { pinTemp=""; pinBuf=""; pinMode="set"; renderPinScreen("Mos kelmadi. Yangidan o'ylang."); }
  }
}
function pinForgot(){
  if(pinMode==="unlock"){
    if(confirm("PIN ni o'chirib, qulfsiz davom etasizmi? Ma'lumotingiz saqlanadi.")){ clearPinStore(); unlockApp(); if(S.view==="sozlama"&&typeof renderSozlama==="function") renderSozlama(); }
  } else { setPinSkipped(); unlockApp(); }
}
function disablePin(){ if(confirm("Ilova qulfini o'chirasizmi?")){ clearPinStore(); if(S.view==="sozlama"&&typeof renderSozlama==="function") renderSozlama(); if(typeof toast==="function") toast("Qulf o'chirildi"); } }
function pinSkipped(){ try{ return localStorage.getItem("momin_pinskip")==="1"; }catch(e){ return false; } }
function setPinSkipped(){ try{ localStorage.setItem("momin_pinskip","1"); }catch(e){} }
async function autoPin(){
  if(pinIsSet()){ lockApp(); return; }
  if(pinSkipped()) return;
  let onbDone=true; try{ onbDone = !!(await Store.get("momin:onboarded")); }catch(e){}
  if(!onbDone) return;          // onboarding ketyapti — keyingi safar so'raymiz
  startSetPin();
}

async function aiCall(messages){
  const key=aiGetKey();
  const headers={"Content-Type":"application/json"};
  if(key){ headers["x-api-key"]=key; headers["anthropic-version"]="2023-06-01"; headers["anthropic-dangerous-direct-browser-access"]="true"; }
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers,
    body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1024, system:aiSystemPrompt(), messages:messages.map(m=>({role:m.role,content:m.content})) })
  });
  if(!res.ok){ const t=await res.text().catch(()=>""); throw new Error("HTTP "+res.status+" "+t.slice(0,120)); }
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  return text||"(bo'sh javob)";

/* ---------- HISTORY (reads all saved days) ---------- */
let HIST = null; // {days:{date:dayObj}, fin:{date:[items]}, time:{date:[items]}}
async function loadHistory(){
  const out = {days:{}, fin:{}, time:{}};
  const dayKeys  = await Store.list("momin:day:");
  const finKeys  = await Store.list("momin:fin:");
  const timeKeys = await Store.list("momin:time:");
  for(const k of dayKeys){ const v=J(await Store.get(k)); if(v) out.days[k.slice(10)]=v; }
  for(const k of finKeys){ const v=J(await Store.get(k)); if(v&&v.items) out.fin[k.slice(10)]=v.items; }
  for(const k of timeKeys){ const v=J(await Store.get(k)); if(v&&v.items) out.time[k.slice(11)]=v.items; }
  // ensure today's in-memory state is reflected even if not yet flushed
  out.days[todayKey()] = S.day;
  if(S.fin&&S.fin.items) out.fin[todayKey()] = S.fin.items;
  if(S.time&&S.time.items) out.time[todayKey()] = S.time.items;
  HIST = out;
  return out;
}
// completion % for a stored day object (routine only)
function dayRoutinePct(dayObj){
  if(!dayObj||!dayObj.routine) return 0;
  const ids = S.routine.map(r=>r.id);
  if(!ids.length) return 0;
  const done = ids.filter(id=>dayObj.routine[id]).length;
  return Math.round(done/ids.length*100);
}
function dayWoke(dayObj){ return !!(dayObj && dayObj.woke); }
// streak of consecutive woke-days ending today or yesterday
function computeStreak(){
  if(!HIST) return {current:0, best:0, totalDays:0, wokeDays:0};
  const dates = Object.keys(HIST.days).sort();
  const set = new Set(dates.filter(d=>dayWoke(HIST.days[d])));
  // current
  let cur=0; let d=new Date(); d.setHours(0,0,0,0);
  if(!set.has(dKey(d))) d=addDays(d,-1); // allow streak to count up to yesterday if today not yet done
  while(set.has(dKey(d))){ cur++; d=addDays(d,-1); }
  // best
  let best=0, run=0, prev=null;
  for(const ds of [...set].sort()){
    const cd=parseDK(ds);
    if(prev && (cd-prev)===86400000) run++; else run=1;
    best=Math.max(best,run); prev=cd;
  }
  const active = dates.filter(dt=>{ const o=HIST.days[dt]; return dayWoke(o)||dayRoutinePct(o)>0 || (o&&(o.zikr||o.note||(o.refl&&(o.refl.a||o.refl.b||o.refl.c)))); });
  return {current:cur, best, totalDays:active.length, wokeDays:set.size};
}

/* ---------- inline SVG bar chart ---------- */
function barChart(bars, opts){
  opts=opts||{}; const W=opts.w||640, H=opts.h||150, pad=24, gap=opts.gap!=null?opts.gap:3;
  const max=Math.max(1, ...bars.map(b=>b.v));
  const n=bars.length, bw=(W-pad*0 - gap*(n-1))/n;
  let rects="", labels="";
  bars.forEach((b,i)=>{
    const h=Math.max(b.v>0?2:0, (b.v/max)*(H-26));
    const x=i*(bw+gap), y=(H-18)-h;
    rects+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2.5" fill="${b.c||'var(--dawn)'}" opacity="${b.o||0.9}"><title>${b.t||''}</title></rect>`;
    if(b.lab) labels+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-5}" text-anchor="middle" font-size="8.5" fill="var(--ink-faint)" font-family="var(--mono)">${b.lab}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">${rects}${labels}</svg>`;
}

/* ---------- ISO week + week dates ---------- */
function isoWeekKey(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3);
  const firstThu=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  const week=1+Math.round(((t-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);
  return t.getUTCFullYear()+"-W"+pad(week);
}
function weekDates(offset){
  const base=parseDK(todayKey()); const dow=(base.getDay()+6)%7;
  const mon=addDays(base, -dow + (offset||0)*7);
  return Array.from({length:7},(_,i)=>dKey(addDays(mon,i)));
}
/* ---------- per-habit streak ---------- */
function habitStreak(rid){
  if(!HIST) return 0;
  const done=k=>{ const o=HIST.days[k]; return !!(o&&o.routine&&o.routine[rid]); };
  let d=parseDK(todayKey());
  if(!done(dKey(d))) d=addDays(d,-1);
  let n=0; while(done(dKey(d))){ n++; d=addDays(d,-1); } return n;
}
/* ---------- weekly aggregate ---------- */
function weekAgg(offset){
  const dates=weekDates(offset); const today=todayKey();
  let woke=0,rtSum=0,rtDays=0,salah=0,journal=0,timeSec=0,kir=0,chq=0,zikr=0;
  dates.forEach(k=>{ if(k>today) return; const o=HIST.days[k];
    if(o){ if(dayWoke(o)) woke++; const p=dayRoutinePct(o); if(p>0){rtSum+=p;rtDays++;}
      salah+=SALAH.filter(x=>o.salah&&o.salah[x.id]).length;
      if(o.note||(o.refl&&(o.refl.a||o.refl.b||o.refl.c))) journal++; zikr+=o.zikr||0; }
    (HIST.time[k]||[]).forEach(it=>timeSec+=it.sec);
    (HIST.fin[k]||[]).forEach(it=>{ if(it.kind==='kirim') kir+=it.amount; else chq+=it.amount; });
  });
  return {woke, adher:rtDays?Math.round(rtSum/rtDays):0, salah, journal, timeSec, kir, chq, savings:kir-chq, zikr};
}

function daysLeft(deadline){ if(!deadline) return null; return Math.round((parseDK(deadline)-parseDK(todayKey()))/86400000); }
/* ---------- moon phase: 0=new(dark) .. 1=full(bright) ---------- */
function moonPhaseSVG(frac, size){
  frac=Math.max(0,Math.min(1,frac)); const r=size/2-1.5, cx=size/2, cy=size/2;
  const darkCx = cx - 2*r*frac;
  const id="mc"+size+"_"+Math.round(frac*1000);
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" aria-hidden="true">
    <defs><clipPath id="${id}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--moon-bright,#E7B45C)"/>
    <circle cx="${darkCx}" cy="${cy}" r="${r}" fill="var(--moon-dark,#0E1424)" clip-path="url(#${id})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--gold-line)" stroke-width="1.2"/>
  </svg>`;
}

/* ============================================================= RING SVG ===== */
function ring(pct, size, sw, id){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="bg" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${sw}"/>
    <circle class="fg" ${id?`id="${id}"`:""} cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${sw}"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
}

/* ============================================================= DAWN SKY ===== */
function wakeMins(){
  const parts=String(S.settings.wake||"04:00").split(":");
  const h=parseInt(parts[0],10)||0, m=parseInt(parts[1],10)||0;
  return ((h*60+m)%1440+1440)%1440;
}
function sunProgress(){
  const d=new Date(); const mins=d.getHours()*60+d.getMinutes();
  let p=(mins-wakeMins())/(24*60); // uyg'onish vaqti = 0 ; to'liq sutka
  if(p<0) p+=1; if(p>1) p-=1;
  return p;
}
function phaseLabel(p){
  if(p<0.06) return "Tong sahari";
  if(p<0.30) return "Ertalab";
  if(p<0.52) return "Tushgacha";
  if(p<0.70) return "Tushdan keyin";
  if(p<0.84) return "Kechki payt";
  return "Tun";
}
function skySVG(){
  const W=800,H=240, cx=W/2, cy=H+30, rx=W*0.46, ry=H*0.74;
  const p=sunProgress(); const a=Math.PI*(1-p);
  const sx=cx+rx*Math.cos(a), sy=cy-ry*Math.sin(a);
  const horizon=H-46;
  const stars=[[90,40],[150,70],[230,38],[300,64],[360,30],[470,52],[560,36],[640,70],[700,44],[120,100],[680,96],[420,80]]
    .map(([x,y])=>`<circle cx="${x}" cy="${y}" r="${(Math.random()*0.9+0.5).toFixed(1)}" fill="#fff" opacity="${(0.15+Math.random()*0.35).toFixed(2)}"/>`).join("");
  // arc path (sun path)
  const lx=cx-rx, rxp=cx+rx;
  const lift = Math.max(0, Math.sin(a)); // 0..1 how high sun is -> light intensity
  return `<svg class="sky" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="skyg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#070b17"/>
        <stop offset="0.55" stop-color="#0c1326"/>
        <stop offset="1" stop-color="${lift>0.15?"#1a1c2e":"#0c1124"}"/>
      </linearGradient>
      <radialGradient id="glowg" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#ffd98c" stop-opacity="${(0.8*lift+0.2).toFixed(2)}"/>
        <stop offset="0.4" stop-color="#e7b45c" stop-opacity="${(0.5*lift+0.1).toFixed(2)}"/>
        <stop offset="1" stop-color="#e7b45c" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="horg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#3a2a14" stop-opacity="0.0"/>
        <stop offset="${(p*100).toFixed(0)}%" stop-color="#e7b45c" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#5e688a" stop-opacity="0.0"/>
      </linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#skyg)"/>
    <g opacity="${(1-lift*0.9).toFixed(2)}">${stars}</g>
    <path d="M${lx} ${cy-0} A ${rx} ${ry} 0 0 1 ${rxp} ${cy}" fill="none" stroke="var(--line)" stroke-width="1" stroke-dasharray="3 7" opacity="0.5"/>
    <ellipse cx="${sx}" cy="${sy}" rx="60" ry="60" fill="url(#glowg)" class="sun-glow"/>
    <circle cx="${sx}" cy="${sy}" r="11" fill="#ffdf9e"/>
    <circle cx="${sx}" cy="${sy}" r="11" fill="none" stroke="#fff3d6" stroke-opacity="0.6"/>
    <rect x="0" y="${horizon}" width="${W}" height="3" fill="url(#horg)"/>
    <rect x="0" y="${horizon+3}" width="${W}" height="${H-horizon}" fill="#06090f" opacity="0.6"/>
  </svg>`;
}

function countUp(el, target, ms){
  if(!el) return; target=Math.round(+target||0);
  if(typeof requestAnimationFrame!=="function" || target<=0){ el.textContent=String(target); return; }
  const dur=ms||680, t0=(performance&&performance.now)?performance.now():Date.now();
  el.textContent="0";
  const step=(t)=>{ const now=t|| ((performance&&performance.now)?performance.now():Date.now());
    const p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3);
    el.textContent=String(Math.round(e*target)); if(p<1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

  if(h<20) return "Kun yakuniga yaqin";
  return "Tun — kunni sarhisob qil";
}

async function fillBugunStreak(){
  if(!HIST) await loadHistory();
  const st=computeStreak(); const cur=st.current;
  const sb=$("#streakBig"); if(sb) sb.textContent=cur;
  const mo=$("#constiMoon"); if(mo) mo.innerHTML=moonPhaseSVG(moonFrac(cur),108);
  const ln=$("#moonLine"); if(ln){ ln.innerHTML = cur>=30 ? "Oy to'lib yondi — 30+ kunlik sobitlik. Sen Mo'minga aylanmoqdasan." : `Oy <b>30 kun</b>da to'liq yonadi — yana <b>${30-cur}</b> kun.`; }
}
function makeRemind(){
  const R=S.reframes, W=S.wisdom, tot=R.length+W.length;
  if(!tot){
    return `<div class="remind"><div class="lbl">Bugungi eslatma · O'zimga so'z</div>
      <div class="one faint">Hozircha so'z yo'q. “Yo'l xaritasi” bo'limidan o'zingga eslatma qo'sh.</div></div>`;
  }
  let i = ((S.remindIdx % tot) + tot) % tot;
  let inner;
  if(i < R.length){
    const r = R[i];
    inner = `<div class="swap">
        <div class="neg">${r.from}</div>
        <div><span class="arrow">→</span> <span class="pos">${r.to}</span></div>
      </div>`;
  } else {
    inner = `<div class="one">“${W[i-R.length]}”</div>`;
  }
  return `<div class="remind">
      <button class="btn btn-ghost next" data-act="nextRemind" style="padding:7px 12px">Keyingisi →</button>
      <div class="lbl">Bugungi eslatma · O'zimga so'z</div>
      ${inner}
    </div>`;
}

function calendarHTML(){

  let startDow=(first.getDay()+6)%7; // Monday=0
  const dows=["Du","Se","Ch","Pa","Ju","Sh","Ya"];
  const tkey=todayKey(); const endToday=new Date(new Date().setHours(23,59,59,999));

  for(let day=1; day<=dim; day++){

    const key=dKey(d), o=HIST.days[key];

    const isToday=key===tkey, sel=key===S.histPick;

  }
  const atCurrent = startOfMonth(mref).getTime() >= startOfMonth(new Date()).getTime();
  return `<div class="cal">

      <button class="cal-nav" data-act="histPrev">‹</button>
      <div class="cal-title">${UZ_MON_F[mref.getMonth()]} ${mref.getFullYear()}</div>

    <div class="cal-grid">${cells}</div>
    <div class="cal-legend"><span><i class="wdot"></i> 04:00 da turilgan</span><span>Yashil to'qligi — bajarilish %</span></div>
  </div>`;

async function fillMoliyaStats(){

  const kb=$("#moKir"); if(kb) kb.textContent=fmtSum(mkir);
  const cb=$("#moChq"); if(cb) cb.textContent=fmtSum(mchq);
  // 21 kunlik diagramma
  const bars=[];
  for(let i=20;i>=0;i--){ const d=addDays(now,-i); const k=dKey(d); const items=HIST.fin[k]||[];

  }
  box.innerHTML=`
    <div class="an-row">

}
async function fillVaqtStats(){
  if(!HIST) await loadHistory();
  const box=$("#vaqtStats"); if(!box) return;
  const now=new Date(); const bars=[]; let weekSec=0;
  const weekStart=new Date(addDays(now,-6).setHours(0,0,0,0)); const byLabel={};
  for(let i=20;i>=0;i--){ const d=addDays(now,-i); const k=dKey(d); const items=HIST.time[k]||[];
    const sec=items.reduce((a,b)=>a+b.sec,0);
    bars.push({v:Math.round(sec/60), c:'var(--dawn)', o:0.9, lab:(i%5===0?String(d.getDate()):''), t:prettyDK(k)+": "+hShort(sec)});
    if(d>=weekStart){ weekSec+=sec; items.forEach(it=>{ const L=(it.label||'Sessiya'); byLabel[L]=(byLabel[L]||0)+it.sec; }); }
  }

}

async function exportData(){

  for(const k of keys){ data[k]=await Store.get(k); }
  data["momin:settings"]=JSON.stringify(S.settings);
  data[dayK()]=JSON.stringify(S.day);
  if(S.fin) data[finK()]=JSON.stringify(S.fin);
  if(S.time) data[timeK()]=JSON.stringify(S.time);
  const txt=JSON.stringify({app:"momin", v:1, exported:new Date().toISOString(), data});
  const ta=$("#expText"); if(ta){ ta.value=txt; ta.removeAttribute("hidden"); }
  try{
    const blob=new Blob([txt],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="momin-zaxira-"+todayKey()+".json";
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(e){}
  S.lastBackup=new Date().toISOString(); Store.set("momin:lastbackup", JSON.stringify(S.lastBackup));
  const s=$("#expMsg"); if(s) s.textContent="Tayyor — faylni saqlang yoki matnni nusxa oling";

function backupNoteHTML(){
  const age=backupAgeDays();
  if(age==null) return `<span class="bk-warn">Hali biror marta zaxira qilinmagan. Ma'lumotni yo'qotmaslik uchun vaqti-vaqti bilan eksport qiling.</span>`;
  const txt = age===0?"bugun":(age+" kun oldin");
  return age>=14 ? `<span class="bk-warn">Oxirgi zaxira: ${txt} — eslatma: yangilab qo'ying.</span>` : `Oxirgi zaxira: <b>${txt}</b>`;
}
function copyExport(){
  const ta=$("#expText"); if(!ta||!ta.value){ const s=$("#expMsg"); if(s) s.textContent="Avval “Eksport” ni bosing"; return; }
  ta.removeAttribute("hidden");
  try{ ta.select(); }catch(e){}
  let done=false;
  try{ if(navigator.clipboard){ navigator.clipboard.writeText(ta.value); done=true; } }catch(e){}
  if(!done){ try{ document.execCommand("copy"); done=true; }catch(e){} }
  const s=$("#expMsg"); if(s) s.textContent=done?"Nusxa olindi ✓":"Nusxa olib bo'lmadi — qo'lda belgilang";
}
async function importData(){
  const ta=$("#impText"); const raw=(ta&&ta.value||"").trim();
  const msg=$("#impMsg");
  if(!raw){ if(msg) msg.textContent="Matn maydoniga zaxira JSON'ini joylang"; return; }
  let p; try{ p=JSON.parse(raw); }catch(e){ if(msg) msg.textContent="Xato: bu JSON emas"; return; }
  const data=p.data||p;
  if(!data||typeof data!=="object"){ if(msg) msg.textContent="Xato format"; return; }
  const keys=Object.keys(data).filter(k=>k.indexOf("momin:")===0);
  if(!keys.length){ if(msg) msg.textContent="Ichida momin ma'lumoti topilmadi"; return; }
  if(!confirm("Hozirgi ma'lumot ustiga "+keys.length+" yozuv yoziladi. Davom etamizmi?")) return;
  for(const k of keys){ await Store.set(k, typeof data[k]==="string"?data[k]:JSON.stringify(data[k])); }
  await loadAll(); HIST=null;
  if(msg) msg.textContent="Yuklandi ✓";
  render();
}

let remindTimer=null;
function scheduleReminder(){
  if(remindTimer){ clearTimeout(remindTimer); remindTimer=null; }
  if(!S.settings.remind) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const now=new Date(); const parts=String(S.settings.wake||"04:00").split(":");
  const next=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(parts[0])||0,parseInt(parts[1])||0,0,0);
  if(next<=now) next.setDate(next.getDate()+1);
  const ms=Math.min(next-now, 2147483647);
  remindTimer=setTimeout(()=>{
    try{ new Notification("Mo'min — Ahd vaqti", {body:(S.settings.wake||"04:00")+" — tur. Bugun ham 99%."}); }catch(e){}
    scheduleReminder();
  }, ms);
}
async function toggleReminder(){
  const msg=$("#remMsg");
  if(S.settings.remind){ S.settings.remind=false; saveSet(); if(remindTimer){clearTimeout(remindTimer);remindTimer=null;} renderSozlama(); return; }
  if(!("Notification" in window)){ if(msg) msg.textContent="Bu brauzer eslatmani qo'llab-quvvatlamaydi"; return; }
  let perm=Notification.permission;
  if(perm!=="granted"){ try{ perm=await Notification.requestPermission(); }catch(e){} }
  if(perm==="granted"){ S.settings.remind=true; saveSet(); scheduleReminder(); renderSozlama(); }
  else { if(msg) msg.textContent="Ruxsat berilmadi. Brauzer sozlamasidan ruxsat bering."; }
}

let pwaInstallEvt=null;

  // manifest.json va icons/* fayllar orqali ulanadi (index.html <head> ichida).

function toggleRoutine(id){
  S.day.routine[id]=!S.day.routine[id];
  if(id==="wake"&&S.day.routine[id]) S.day.woke=true;
  saveDay();
  const rp=routinePct();
  // update in place for snappiness
  const row=document.querySelector(`[data-act='toggleR'][data-id='${id}']`);
  if(row){ row.classList.toggle("done", S.day.routine[id]); row.setAttribute("aria-checked", S.day.routine[id]); }
  const pc=document.querySelector("#v-tartib .pc"); if(pc) pc.innerHTML=`<b>${rp}%</b> · ${S.routine.filter(r=>S.day.routine[r.id]).length}/${S.routine.length}`;
  const allDone = S.routine.length>0 && S.routine.every(r=>S.day.routine[r.id]);
  const db=$("#tartibDone"); if(db) db.classList.toggle("show", allDone);
  if(HIST){ HIST.days[todayKey()]=S.day; } // keep history live
  fillHabitStreaks();
  if(id==="wake") checkStreakMilestone();
}
function toggleStd(key){
  S.day.std[key]=!S.day.std[key]; saveDay();

  if(row){ row.classList.toggle("done", S.day.std[key]); row.setAttribute("aria-checked", S.day.std[key]); }
  // update category bar + counts + header
  const cid=key.split(":")[0]; const cat=S.standards.find(c=>c.id===cid); const ct=catTotals(cat);
  const head=document.querySelector(`[data-act='toggleCat'][data-id='${cid}']`);
  if(head){ const pr=head.querySelector(".std-prog"); pr.innerHTML=`<b>${ct.done}</b>/${ct.all}`;

      <button class="btn btn-gold" data-act="fbSaveCfg" style="margin-top:10px">Saqlash</button>`;
  }
  return `<div class="card exp-card fb-card">
    <div class="set-dh">☁ Bulutli sinxron (Firebase)</div>
    <p class="muted" style="font-size:12.5px;margin:6px 0 12px">Ma'lumotni qurilmalararo jonli sinxron qiladi — telefon va kompyuterda bir vaqtda.</p>
    ${body}
    <div class="fb-status" id="fbStatus">${escd(status)}</div>
    <details class="fb-guide">
      <summary>Qanday ulanadi? (bir martalik, ~10 daqiqa)</summary>
      <ol>
        <li><b>console.firebase.google.com</b> ga kiring → <b>Add project</b> → nom bering (masalan “momin”) → yarating.</li>
        <li>Chap menyu: <b>Build → Realtime Database → Create Database</b> → joy tanlang → <b>Start in locked mode</b>.</li>
        <li><b>Build → Authentication → Get started → Email/Password → Enable</b>.</li>
        <li><b>⚙ → Project settings → Your apps → Web (&lt;/&gt;)</b> → ilova qo'shing → ko'rsatilgan <b>firebaseConfig</b> obyektini ({ ... } qismini) nusxalab yuqoridagi katta maydonga joylang.</li>
        <li>Agar config'da <b>databaseURL</b> bo'lmasa — Realtime Database sahifasi tepasidagi <b>https://...firebasedatabase.app</b> manzilini nusxalab, alohida (pastki) maydonga joylang.</li>
        <li>“Saqlash” → email/parol bilan “Ro'yxatdan o'tish”. Boshqa qurilmada xuddi shu config + shu email bilan kiring.</li>
        <li>Xavfsizlik — Realtime Database → <b>Rules</b>: <code>{ "rules": { "users": { "$u": { ".read": "$u===auth.uid", ".write": "$u===auth.uid" } } } }</code></li>
      </ol>
    </details>
  </div>`;
}
function renderSozlama(){
  const ai = ahdInfo();
  const stdCount = S.standards.reduce((n,c)=>n+c.items.length,0);
  $("#v-sozlama").innerHTML = `
    <div class="eyebrow">Sozlamalar · Shaxsiy</div>
    <h1 class="page-h">Sozlamalar</h1>
    <p class="page-sub">Identitet va uyg'onish vaqtini sozla. Ahd sanasi mustahkamlangan — unga tegmaydi.</p>

    <div class="card exp-card">
      <div class="set-dh">Ilovani o'rnatish</div>
      <p class="muted" style="font-size:12.5px;margin:6px 0 12px">Kompyuter yoki telefonda Chrome orqali ilova sifatida o'rnat — bosh ekranda ikonka bo'lib, alohida oynada ochiladi.</p>
      <button class="btn btn-gold" id="pwaInstallBtn" data-act="pwaInstall" ${pwaInstallEvt?'':'hidden'}>⬇ O'rnatish</button>
      <div class="set-hint" style="margin-top:10px">Tugma ko'rinmasa: Chrome manzil satridagi ⬇/⊕ belgisi yoki menyu (⋮) → "Ilova sifatida o'rnatish"ni bosing.</div>
    </div>

    <div class="card exp-card">
      <div class="set-dh">Ko'rinish</div>
      <p class="muted" style="font-size:12.5px;margin:6px 0 12px">Tungi (sahar) yoki yorug' (tong) ko'rinish. “Avto” — qurilma sozlamasiga moslashadi.</p>
      <div class="seg theme-seg">
        <button data-act="theme" data-m="dark" class="${getTheme()==='dark'?'on':''}">🌙 Tungi</button>
        <button data-act="theme" data-m="light" class="${getTheme()==='light'?'on':''}">☀️ Yorug'</button>
        <button data-act="theme" data-m="auto" class="${getTheme()==='auto'?'on':''}">⚙ Avto</button>
      </div>
    </div>

    <div class="set-card locked">
      <div class="set-lock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      </div>
      <div class="set-lk-body">
        <div class="set-lk-h">Ahd sanasi — mustahkamlangan</div>
        <div class="set-lk-date">${AHD_PRETTY}</div>
        <div class="set-lk-sub">${ai.started? `Bugun — <b>${ai.n}</b>-kun. Bu sana o'zgartirilmaydi.` : `Ahd boshlanishiga <b>${ai.n}</b> kun qoldi. Bu sana o'zgartirilmaydi.`}</div>
      </div>
    </div>

    <div class="card set-form">
      <div class="set-field">
        <label>Ism / Identitet</label>
        <input class="inp" id="setName" type="text" value="${(S.settings.name||'').replace(/"/g,'&quot;')}">
      </div>
      <div class="set-field">
        <label>Uyg'onish vaqti</label>
        <input class="inp" id="setWake" type="time" value="${S.settings.wake||'04:00'}">
        <div class="set-hint">Tonggi osmon va “turdingmi?” savoli shu vaqtga moslashadi.</div>
      </div>
      <button class="btn btn-gold" data-act="saveSettings">Saqlash</button>
      <span class="set-saved" id="setSaved"></span>
    </div>

    <div class="card rem-card">
      <div class="rem-top">
        <div>
          <div class="rem-h">Kunlik eslatma</div>
          <div class="rem-sub">${S.settings.remind?`Yoqilgan — har kuni ${S.settings.wake||'04:00'} da`:"Uyg'onish vaqtida bildirishnoma yuboradi"}</div>
        </div>
        <button class="toggle ${S.settings.remind?'on':''}" data-act="toggleReminder"><span class="kn"></span></button>
      </div>
      <div class="rem-note">Eslatma ilova ochiq turganda yoki bosh ekranga o'rnatilganda ishlaydi. Kafolatli budilnik uchun telefon soatidan ham foydalan.</div>
      <span class="set-saved" id="remMsg"></span>
    </div>

    <div class="set-meta">
      <div><span class="k">Kun tartibi</span><span class="v">${S.routine.length} ish</span></div>
      <div><span class="k">Standartlar</span><span class="v">${stdCount} mezon · ${S.standards.length} yo'nalish</span></div>
      <div><span class="k">So'zlar</span><span class="v">${S.reframes.length + S.wisdom.length} eslatma</span></div>
    </div>

    <div class="card exp-card">
      <div class="set-dh">Zaxira — ma'lumotni saqlash</div>
      <p class="muted" style="font-size:12.5px;margin:6px 0 12px">Barcha ma'lumotni bitta JSON'ga chiqar. Yangi qurilmaga o'tganda yoki yo'qotmaslik uchun saqlab qo'y.</p>
      <div class="backup-note" id="backupNote">${backupNoteHTML()}</div>
      <div class="exp-btns">
        <button class="btn btn-gold" data-act="exportData">Eksport</button>
        <button class="btn btn-ghost" data-act="copyExport">Nusxa ol</button>
      </div>
      <textarea class="inp exp-ta" id="expText" rows="3" readonly hidden></textarea>
      <span class="set-saved" id="expMsg"></span>
      <div class="exp-div"></div>
      <div class="set-dh" style="font-size:13.5px">Import — zaxiradan tiklash</div>
      <p class="muted" style="font-size:12.5px;margin:6px 0 10px">Saqlangan JSON'ni shu yerga joyla va “Yuklash”ni bos.</p>
      <textarea class="inp imp-ta" id="impText" rows="3" placeholder='{"app":"momin", ...}'></textarea>
      <button class="btn btn-ghost" data-act="importData" style="margin-top:10px">Yuklash</button>
      <span class="set-saved" id="impMsg" style="color:var(--dawn)"></span>
    </div>

    ${fbCardHTML()}

    <div class="set-danger">
      <div class="set-dh">Ro'yxatlarni boshlang'ich holatga tiklash</div>
      <p>Kun tartibi, standartlar va so'zlarni dastlabki ko'rinishiga qaytaradi. Bajarilgan belgilaringiz va moliya/vaqt yozuvlaringiz saqlanadi.</p>
      <button class="btn btn-ghost danger-btn" data-act="resetDefaults">Tiklash</button>
    </div>

    <div class="set-arc">Normo'min → <b>Mo'min</b></div>`;
}
function saveSettings(){
  S.settings.name=($("#setName").value||"Mo'min").trim();
  S.settings.wake=$("#setWake").value||"04:00";
  saveSet();
  const s=$("#setSaved"); if(s){ s.textContent="Saqlandi ✓"; }
  // refresh sidebar + today (sky uses wake time) but keep user on this view
  const ai=ahdInfo();
  $("#navDay").innerHTML = ai.started ? `Ahd: <b>${ai.n}</b>-kun` : `Ahd: <b>${ai.n}</b> kun qoldi`;
}
function resetDefaults(){
  if(!confirm("Kun tartibi, standartlar va so'zlar boshlang'ich holatga qaytadi. Davom etamizmi?")) return;
  S.routine=clone(ROUTINE_SEED); S.standards=clone(STANDARDS_SEED);
  S.reframes=clone(REFRAMES_SEED); S.wisdom=clone(WISDOM_SEED);
  S.openCat=null;
  saveRoutine(); saveStandards(); saveReframes(); saveWisdom();
  renderSozlama();
}

/* ============================================================= BOOT ========= */
(async function init(){
  try{ applyTheme(); initThemeWatch(); }catch(e){}
  setupPWA();
  try{ await loadAll(); }catch(e){}
  render();
  scheduleReminder();
  maybeOnboard();
  try{ const cl=document.querySelector("#cityline"); if(cl) cl.innerHTML=uzSkyline(); }catch(e){}
  try{ fbMaybeAutoConnect(); }catch(e){}
  try{ await autoPin(); }catch(e){}
})();
</script>
