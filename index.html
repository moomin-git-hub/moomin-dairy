<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0F1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mo'min">
<title>Mo'min — Kun tartibi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============ TOKENS ============ */
:root{
  --night:#0A0F1E;          /* deepest pre-dawn sky */
  --night-2:#0F1628;        /* panel */
  --surface:#141C32;        /* card */
  --surface-2:#1A2440;      /* raised card */
  --ink:#ECE6D4;            /* warm parchment text */
  --ink-soft:#9AA3BD;       /* muted body */
  --ink-faint:#5E688A;      /* faint labels */
  --dawn:#E7B45C;          /* first light — hero accent */
  --dawn-deep:#C88A38;     /* deeper amber */
  --dawn-glow:rgba(231,180,92,.22);
  --sage:#62A285;          /* growth / done */
  --sage-soft:rgba(98,162,133,.16);
  --ember:#C9614A;         /* expense / caution */
  --line:rgba(236,230,212,.09);
  --line-2:rgba(236,230,212,.05);
  --gold-line:rgba(231,180,92,.32);
  --shadow:0 18px 50px -24px rgba(0,0,0,.8);
  --r:16px; --r-sm:11px;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --serif:'Spectral',Georgia,serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(1100px 540px at 78% -8%, rgba(231,180,92,.10), transparent 60%),
    radial-gradient(900px 600px at 8% 4%, rgba(98,118,180,.10), transparent 55%),
    var(--night);
  color:var(--ink); font-family:var(--sans);
  -webkit-font-smoothing:antialiased; line-height:1.5;
}
::selection{background:var(--dawn-glow);color:var(--ink)}
button{font-family:inherit;cursor:pointer;color:inherit;background:none;border:none}
input{font-family:inherit}
:focus-visible{outline:2px solid var(--dawn);outline-offset:2px;border-radius:6px}

/* ============ SHELL ============ */
#app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.nav{
  position:sticky;top:0;height:100vh;border-right:1px solid var(--line);
  background:linear-gradient(180deg,var(--night-2),rgba(15,22,40,.4));
  display:flex;flex-direction:column;padding:26px 18px;gap:6px;z-index:20;
  overflow-y:auto;overscroll-behavior:contain;
}
.nav::-webkit-scrollbar{width:7px}
.nav::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:4px}
.nav::-webkit-scrollbar-track{background:transparent}
.brand{display:flex;align-items:center;gap:11px;padding:2px 8px 18px}
.mark{width:38px;height:38px;flex:none}
.brand-tx h1{font-family:var(--serif);font-weight:600;font-size:21px;letter-spacing:.3px;line-height:1}
.brand-tx p{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dawn);margin-top:5px;opacity:.85}
.navlink{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-sm);
  color:var(--ink-soft);font-size:14px;font-weight:500;transition:.18s;position:relative;text-align:left;width:100%;
}
.navlink svg{width:18px;height:18px;flex:none;opacity:.8;transition:.18s}
.navlink:hover{background:var(--line-2);color:var(--ink)}
.navlink.on{background:linear-gradient(90deg,var(--dawn-glow),transparent);color:var(--ink)}
.navlink.on svg{color:var(--dawn);opacity:1}
.navlink.on::before{content:"";position:absolute;left:-18px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:3px;background:var(--dawn);box-shadow:0 0 12px var(--dawn)}
.nav-foot{margin-top:auto;padding:14px 10px 2px;border-top:1px solid var(--line)}
.daycount{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.daycount b{color:var(--dawn);font-size:15px}
.nav-foot .arc{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--ink-faint);margin-top:7px}

.main{min-width:0;padding:34px clamp(18px,4vw,52px) 90px;max-width:1080px;width:100%}
.view{display:none;animation:fade .35s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============ SHARED ============ */
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--dawn);margin-bottom:10px;display:flex;align-items:center;gap:9px}
.eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
.page-h{font-family:var(--serif);font-weight:600;font-size:clamp(28px,4.6vw,40px);letter-spacing:-.01em;line-height:1.05}
.page-sub{color:var(--ink-soft);font-size:14.5px;margin-top:10px;max-width:62ch}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.muted{color:var(--ink-soft)}
.faint{color:var(--ink-faint)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13.5px;transition:.16s;border:1px solid transparent}
.btn-gold{background:linear-gradient(180deg,var(--dawn),var(--dawn-deep));color:#241a06;box-shadow:0 8px 22px -10px var(--dawn-glow)}
.btn-gold:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn-ghost{border-color:var(--line);color:var(--ink-soft)}
.btn-ghost:hover{border-color:var(--gold-line);color:var(--ink)}
.btn[disabled]{opacity:.5;pointer-events:none}

/* progress ring */
.ring{transform:rotate(-90deg)}
.ring .bg{stroke:var(--line);}
.ring .fg{stroke:var(--dawn);stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}

/* check row */
.crow{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-bottom:1px solid var(--line-2);transition:background .15s;cursor:pointer}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--line-2)}
.box{width:23px;height:23px;flex:none;border-radius:7px;border:1.5px solid var(--ink-faint);display:grid;place-items:center;transition:.18s;margin-top:1px}
.box svg{width:13px;height:13px;stroke:#19210f;stroke-width:3.4;opacity:0;transform:scale(.5);transition:.18s}
.crow.done .box{background:var(--sage);border-color:var(--sage)}
.crow.done .box svg{opacity:1;transform:none}
.crow.done .ct{color:var(--ink-faint);text-decoration:line-through;text-decoration-color:var(--line)}
.crow.done .ct .det,.crow.done .ct .aff{text-decoration:none}
.ct{flex:1;min-width:0}
.ct .lab{font-size:14.5px;font-weight:500;transition:.18s}
.ct .det{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
.ct .aff{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--dawn);margin-top:7px;padding:7px 11px;border-left:2px solid var(--gold-line);background:var(--dawn-glow);border-radius:0 8px 8px 0}
.tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--dawn);border:1px solid var(--gold-line);padding:2px 6px;border-radius:5px;text-transform:uppercase;white-space:nowrap;align-self:center}

/* ====== TODAY ====== */
.hero{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);margin-bottom:24px;background:linear-gradient(180deg,#070b16,#0d1426)}
.sky{display:block;width:100%;height:auto}
.hero-info{position:absolute;inset:0;padding:clamp(18px,3vw,30px);display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.bism{font-family:var(--serif);font-size:clamp(15px,2vw,19px);color:var(--dawn);opacity:.92}
.bism .ar{font-size:1.35em;display:block;margin-bottom:2px;direction:rtl}
.clock{font-family:var(--mono);font-size:clamp(26px,5vw,40px);font-weight:500;letter-spacing:.04em;text-align:right;line-height:1}
.clock .sec{color:var(--dawn);font-size:.55em}
.clock-d{font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-align:right;margin-top:6px;letter-spacing:.05em}
.hero-bot{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.daypill{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.daypill b{font-family:var(--serif);font-style:normal;color:var(--ink);font-size:30px;font-weight:600;display:block;line-height:1}
.phase{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dawn);padding:6px 11px;border:1px solid var(--gold-line);border-radius:20px;background:rgba(10,15,30,.4)}

.tdy-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;display:flex;gap:18px;align-items:center}
.stat .rwrap{position:relative;flex:none}
.stat .rpct{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:15px;font-weight:600}
.stat h3{font-size:14px;font-weight:600;margin-bottom:3px}
.stat p{font-size:12.5px;color:var(--ink-soft)}
.stat .mini{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:8px}

.wakecard{background:linear-gradient(110deg,var(--surface-2),var(--surface));border:1px solid var(--gold-line);border-radius:var(--r);padding:22px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.wakecard .wt{font-family:var(--serif);font-size:18px;font-weight:600}
.wakecard .ws{font-size:13px;color:var(--ink-soft);margin-top:4px}
.wakecard.up{border-color:var(--sage);background:linear-gradient(110deg,var(--sage-soft),var(--surface))}

.remind{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:24px 26px;position:relative;overflow:hidden}
.remind::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(var(--dawn),var(--dawn-deep))}
.remind .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dawn);margin-bottom:12px}
.remind .swap{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
.remind .neg{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-faint);text-decoration:line-through;text-decoration-color:var(--ember)}
.remind .pos{font-family:var(--serif);font-size:18px;color:var(--ink);line-height:1.35}
.remind .one{font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.4;color:var(--ink)}
.remind .arrow{color:var(--dawn);font-size:22px}
.remind .next{position:absolute;top:18px;right:18px}

/* generic section head inside views */
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;margin:34px 0 14px}
.sec-head h2{font-family:var(--serif);font-size:21px;font-weight:600}
.sec-head .pc{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
.sec-head .pc b{color:var(--dawn)}

.note-strip{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-soft);background:var(--line-2);border-radius:var(--r-sm);padding:13px 16px;margin-bottom:18px;border:1px solid var(--line)}
.note-strip b{color:var(--dawn);font-style:normal;font-family:var(--mono);font-size:11px}

/* ====== STANDARDS ====== */
.std-cat{margin-bottom:14px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface)}
.std-head{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;user-select:none}
.std-head:hover{background:var(--line-2)}
.std-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none;background:var(--dawn-glow);border:1px solid var(--gold-line)}
.std-ic svg{width:17px;height:17px;color:var(--dawn)}
.std-meta{flex:1;min-width:0}
.std-meta h3{font-family:var(--serif);font-size:16.5px;font-weight:600}
.std-meta p{font-size:12px;color:var(--ink-faint);font-family:var(--mono);margin-top:2px}
.std-prog{font-family:var(--mono);font-size:12px;color:var(--ink-soft);white-space:nowrap}
.std-prog b{color:var(--sage)}
.chev{transition:.25s;color:var(--ink-faint)}
.std-cat.open .chev{transform:rotate(180deg)}
.std-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.std-bar{height:2px;background:var(--line)}
.std-bar i{display:block;height:100%;background:var(--dawn);transition:width .5s}

/* ====== FINANCE ====== */
.fin-top{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:14px;margin-bottom:22px}
.fin-stat{padding:20px;border-radius:var(--r);border:1px solid var(--line);background:var(--surface)}
.fin-stat .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
.fin-stat .v{font-family:var(--mono);font-size:clamp(20px,3vw,28px);font-weight:600;margin-top:8px;letter-spacing:-.01em}
.fin-stat.bal{background:linear-gradient(135deg,var(--surface-2),var(--surface));border-color:var(--gold-line)}
.fin-stat.bal .v{color:var(--dawn)}
.v.pos{color:var(--sage)} .v.neg{color:var(--ember)}
.fin-add{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:18px}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{padding:9px 16px;font-size:13px;font-weight:600;color:var(--ink-soft);transition:.15s}
.seg button.on[data-k="kirim"]{background:var(--sage-soft);color:var(--sage)}
.seg button.on[data-k="chiqim"]{background:rgba(201,97,74,.16);color:var(--ember)}
.inp{background:var(--night);border:1px solid var(--line);border-radius:9px;padding:10px 13px;color:var(--ink);font-size:14px;transition:.15s}
.inp:focus{border-color:var(--gold-line);outline:none}
.inp.amt{width:150px;font-family:var(--mono)}
.inp.nt{flex:1;min-width:140px}
.led{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface)}
.led-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--line-2)}
.led-row:last-child{border:none}
.led-dot{width:9px;height:9px;border-radius:50%;flex:none}
.led-row .lt{flex:1;font-size:14px}
.led-row .lt small{display:block;color:var(--ink-faint);font-size:11px;font-family:var(--mono);margin-top:2px}
.led-amt{font-family:var(--mono);font-weight:600;font-size:14.5px}
.led-del{color:var(--ink-faint);opacity:0;transition:.15s;font-size:18px;line-height:1;padding:2px 6px}
.led-row:hover .led-del{opacity:1}
.led-del:hover{color:var(--ember)}
.empty{padding:40px 24px;text-align:center;color:var(--ink-faint)}
.empty .serif{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink-soft);margin-bottom:6px}

/* ====== TIME ====== */
.sw-wrap{display:grid;grid-template-columns:1fr;gap:18px;margin-bottom:22px}
.sw{background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:var(--r);padding:28px;text-align:center}
.sw-time{font-family:var(--mono);font-size:clamp(44px,11vw,76px);font-weight:500;letter-spacing:.03em;line-height:1;font-variant-numeric:tabular-nums}
.sw-time.run{color:var(--dawn)}
.sw .lblinp{width:min(320px,100%);text-align:center;margin:18px auto 0;display:block}
.sw-ctrl{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.tm-tot{font-family:var(--mono);font-size:13px;color:var(--ink-soft);margin-bottom:14px}
.tm-tot b{color:var(--dawn);font-size:16px}

/* ====== ROADMAP / COVENANT ====== */
.cov{background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--gold-line);border-radius:var(--r);padding:clamp(22px,4vw,36px);margin-bottom:30px;position:relative;overflow:hidden}
.cov .ribbon{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dawn);margin-bottom:18px}
.cov .salam{font-family:var(--serif);font-style:italic;font-size:clamp(18px,2.6vw,24px);color:var(--ink);line-height:1.5}
.cov .body{font-family:var(--serif);font-size:15.5px;color:var(--ink-soft);line-height:1.7;margin-top:16px;max-width:64ch}
.cov .body em{color:var(--dawn);font-style:normal}
.cov .sig{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:22px;letter-spacing:.1em}

.tl{position:relative;margin:0 0 30px;padding-left:0}
.stage{display:grid;grid-template-columns:92px 1fr;gap:20px;padding:18px 0;border-top:1px solid var(--line);align-items:start}
.stage:first-child{border-top:none}
.stage .age{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--dawn);padding-top:2px}
.stage .age small{display:block;color:var(--ink-faint);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;font-weight:500}
.stage h3{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:5px}
.stage p{font-size:13.5px;color:var(--ink-soft);line-height:1.6}
.stage.now{position:relative}
.stage.now .age{color:var(--dawn)}
.stage.now::before{content:"";position:absolute;left:-14px;top:24px;width:6px;height:6px;border-radius:50%;background:var(--dawn);box-shadow:0 0 12px var(--dawn)}

.sabr{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:8px 0 26px}
.sabr-c{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px}
.sabr-c .n{font-family:var(--mono);font-size:11px;color:var(--dawn);letter-spacing:.1em}
.sabr-c h4{font-family:var(--serif);font-size:16px;font-weight:600;margin:8px 0 5px}
.sabr-c p{font-size:12.5px;color:var(--ink-soft)}
.sabr-note{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-soft);text-align:center;margin-bottom:30px}
.sabr-note b{color:var(--dawn);font-style:normal}

.rf-list{display:grid;gap:10px}
.rf{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:15px 18px}
.rf .from{font-family:var(--serif);font-style:italic;color:var(--ink-faint);text-decoration:line-through;text-decoration-color:var(--ember);font-size:14.5px;text-align:right}
.rf .to{font-family:var(--serif);font-size:15.5px;color:var(--ink)}
.rf .ar{color:var(--dawn);font-size:18px;justify-self:center}
.single-list{display:grid;gap:9px;margin-top:8px}
.single{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-soft);padding:13px 18px;border-left:2px solid var(--gold-line);background:var(--line-2);border-radius:0 9px 9px 0}

/* settings */
.gear{position:fixed;top:18px;right:18px;z-index:30;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--night-2);display:grid;place-items:center;color:var(--ink-soft);transition:.18s}
.gear:hover{color:var(--dawn);border-color:var(--gold-line)}
.gear svg{width:18px;height:18px}
.modal{position:fixed;inset:0;background:rgba(5,8,16,.7);backdrop-filter:blur(6px);z-index:40;display:none;place-items:center;padding:20px}
.modal.on{display:grid}
.sheet{width:min(420px,100%);background:var(--surface);border:1px solid var(--gold-line);border-radius:var(--r);padding:26px;box-shadow:var(--shadow)}
.sheet h3{font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:4px}
.sheet .field{margin-top:18px}
.sheet label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px}
.sheet .inp{width:100%}

/* mobile bottom bar */
.tabbar{display:none}

@media(max-width:860px){
  #app{grid-template-columns:1fr}
  .nav{position:fixed;bottom:0;top:auto;height:auto;width:100%;flex-direction:row;border-right:none;border-top:1px solid var(--line);padding:8px 6px env(safe-area-inset-bottom,8px);background:rgba(10,15,30,.96);backdrop-filter:blur(12px);overflow-x:auto;gap:2px;z-index:50}
  .brand,.nav-foot{display:none}
  .navlink{flex-direction:column;gap:4px;padding:7px 12px;font-size:9.5px;min-width:60px;justify-content:center;text-align:center;letter-spacing:.02em}
  .navlink svg{width:20px;height:20px}
  .navlink.on::before{display:none}
  .navlink.on{background:none}
  .navlink.on svg{filter:drop-shadow(0 0 8px var(--dawn))}
  .main{padding:24px 16px 96px}
  .tdy-grid,.fin-top,.sabr,.std-prog{grid-template-columns:1fr}
  .fin-top{grid-template-columns:1fr 1fr}
  .fin-stat.bal{grid-column:1/-1}
  .gear{top:auto;bottom:80px;right:14px}
  .nav-group{display:none}
  .consti{flex-direction:column;text-align:center;align-items:center;gap:12px}
  .consti-nums{justify-content:center}
  .wk-grid{grid-template-columns:1fr 1fr}
  .goal-add .goal-add-row{flex-direction:column}
  .goal-add .goal-add-row .inp{max-width:none!important;width:100%}
}
@media(max-width:560px){
  .rf{grid-template-columns:1fr;gap:8px;text-align:left!important}
  .rf .from,.rf .to{text-align:left}
  .rf .ar{justify-self:start;transform:rotate(90deg)}
  .stage{grid-template-columns:1fr;gap:6px}
  .fin-top{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .sun-glow{animation:none!important}
}
.sun-glow{animation:pulse 3.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.55}50%{opacity:.95}}
/* ====== EDITABLE: add panels & delete ====== */
.add-panel{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px;padding:14px;border:1px dashed var(--gold-line);border-radius:var(--r);background:rgba(231,180,92,.045)}
.add-panel .inp{flex:1;min-width:150px}
.add-panel.two .inp{min-width:135px}
.add-panel .btn{flex:none}
.add-panel .ap-hint{flex-basis:100%;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dawn);opacity:.8;margin-bottom:-2px}
.add-row{display:flex;gap:8px;align-items:center;padding:11px 16px;border-top:1px dashed var(--line);background:rgba(231,180,92,.03)}
.add-row .inp{flex:1;font-size:13.5px;padding:8px 12px}
.btn.sm{padding:8px 13px;font-size:12.5px}
.row-del,.rf-del,.single-del{flex:none;width:27px;height:27px;border-radius:7px;color:var(--ink-faint);font-size:19px;line-height:1;display:grid;place-items:center;transition:.15s;align-self:center;opacity:0}
.crow:hover .row-del{opacity:.65}
.rf{position:relative;padding-right:40px}
.single{position:relative}
.rf-del,.single-del{position:absolute;top:8px;right:8px}
.rf:hover .rf-del,.single:hover .single-del{opacity:.65}
.row-del:hover,.rf-del:hover,.single-del:hover{background:rgba(201,97,74,.16);color:var(--ember);opacity:1}
.single{padding-right:42px}
@media (hover:none){.row-del,.rf-del,.single-del{opacity:.5}}

/* ====== SETTINGS SECTION ====== */
.set-card{display:flex;gap:18px;align-items:center;padding:20px 22px;border-radius:var(--r);margin-bottom:22px}
.set-card.locked{border:1px solid var(--gold-line);background:linear-gradient(110deg,var(--dawn-glow),var(--surface))}
.set-lock{width:46px;height:46px;flex:none;border-radius:12px;display:grid;place-items:center;color:var(--dawn);background:rgba(231,180,92,.12);border:1px solid var(--gold-line)}
.set-lock svg{width:24px;height:24px}
.set-lk-h{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dawn)}
.set-lk-date{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--ink);line-height:1.1;margin:3px 0 4px}
.set-lk-sub{font-size:13px;color:var(--ink-soft)}
.set-lk-sub b{color:var(--dawn)}
.set-form{padding:22px;display:flex;flex-direction:column;gap:16px;margin-bottom:22px}
.set-field{display:flex;flex-direction:column;gap:7px}
.set-field label{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.set-field .inp{width:100%;max-width:340px}
.set-hint{font-size:12px;color:var(--ink-faint)}
.set-form>.btn{align-self:flex-start;margin-top:2px}
.set-saved{font-size:12.5px;color:var(--sage);font-weight:600}
.set-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.set-meta>div{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;display:flex;flex-direction:column;gap:3px}
.set-meta .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
.set-meta .v{font-size:14.5px;color:var(--ink);font-weight:500}
.set-danger{border:1px solid rgba(201,97,74,.4);border-radius:var(--r);padding:18px 20px;margin-bottom:24px}
.set-dh{font-size:14.5px;font-weight:600;color:var(--ink)}
.set-danger p{font-size:12.5px;color:var(--ink-soft);margin:6px 0 13px;max-width:60ch}
.danger-btn{border-color:var(--ember);color:var(--ember)}
.danger-btn:hover{background:rgba(201,97,74,.12);border-color:var(--ember);color:var(--ember)}
.set-arc{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-faint);text-align:center;padding:8px 0 6px}
.set-arc b{color:var(--dawn);font-style:normal}

/* utility */
.pos{color:var(--sage)} .neg{color:var(--ember)}

/* ====== IBODAT ====== */
.pray-row{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.pray{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 6px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);transition:.16s}
.pray:hover{border-color:var(--gold-line)}
.pray-ic{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--ink-faint);display:grid;place-items:center;font-size:14px;color:#19210f;transition:.16s}
.pray-n{font-size:12px;color:var(--ink-soft);font-weight:500}
.pray.on{background:linear-gradient(180deg,var(--sage-soft),var(--surface));border-color:var(--sage)}
.pray.on .pray-ic{background:var(--sage);border-color:var(--sage)}
.pray.on .pray-n{color:var(--ink)}
@media(max-width:520px){.pray-row{grid-template-columns:repeat(5,1fr);gap:5px}.pray{padding:11px 2px}.pray-n{font-size:10.5px}}
.zikr-card{margin-top:22px;border:1px solid var(--gold-line);border-radius:var(--r);background:linear-gradient(160deg,var(--dawn-glow),var(--surface));padding:24px;text-align:center}
.zikr-lab{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--dawn)}
.zikr-num{font-family:var(--mono);font-size:52px;font-weight:600;color:var(--ink);line-height:1.1;margin:6px 0 14px}
.zikr-btns{display:flex;gap:10px;justify-content:center}
.zikr-tap{background:linear-gradient(180deg,var(--dawn),var(--dawn-deep));color:#241a06;font-weight:700;font-size:15px;padding:14px 30px;border-radius:12px;transition:.12s}
.zikr-tap:active{transform:scale(.96)}
.zikr-reset{border:1px solid var(--line);color:var(--ink-soft);padding:14px 18px;border-radius:12px;font-size:13px}
.su-wrap{display:flex;flex-direction:column;gap:9px}
.su{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface)}
.su.ok{border-color:var(--sage);background:linear-gradient(90deg,var(--sage-soft),var(--surface))}
.su-check{flex:none;width:26px;height:26px;border-radius:8px;border:1.5px solid var(--ink-faint);display:grid;place-items:center;font-size:14px;color:#19210f}
.su.ok .su-check{background:var(--sage);border-color:var(--sage)}
.su-body{flex:1;min-width:0}
.su-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.su-name{font-size:14.5px;font-weight:500;color:var(--ink)}
.su-meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);white-space:nowrap}
.su-bar{height:5px;background:var(--line);border-radius:3px;margin-top:8px;overflow:hidden}
.su-bar i{display:block;height:100%;background:var(--dawn);border-radius:3px;transition:width .4s}
.su.ok .su-bar i{background:var(--sage)}
.su-ctrl{display:flex;gap:5px;flex:none}
.su-mini{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);color:var(--ink-soft);font-size:18px;display:grid;place-items:center}
.su-mini:hover{border-color:var(--gold-line);color:var(--ink)}

/* ====== KUNDALIK ====== */
.jr{padding:22px;display:flex;flex-direction:column;gap:15px}
.jr-date{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dawn)}
.jr-q{display:flex;flex-direction:column;gap:7px}
.jr-q label{font-size:13px;font-weight:600;color:var(--ink-soft)}
.jr-ta{font-family:var(--sans);font-size:14px;background:var(--night);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--ink);resize:vertical;line-height:1.5;transition:.15s}
.jr-ta:focus{border-color:var(--gold-line);outline:none}
.jr-save{display:flex;align-items:center;gap:12px}
.jr-past{display:flex;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);margin-bottom:9px}
.jr-past-d{font-family:var(--mono);font-size:11px;color:var(--dawn);min-width:62px;padding-top:2px}
.jr-past-t{font-size:13.5px;color:var(--ink-soft);line-height:1.55}
.jr-past-t b{color:var(--ink-faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}

/* ====== TARIX ====== */
.streak-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:22px}
.streak-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 14px;text-align:center}
.streak-card.big{background:linear-gradient(160deg,var(--dawn-glow),var(--surface));border-color:var(--gold-line);position:relative}
.sk-flame{font-size:18px;margin-bottom:2px}
.sk-n{font-family:var(--serif);font-size:34px;font-weight:600;color:var(--ink);line-height:1}
.streak-card.big .sk-n{color:var(--dawn)}
.sk-l{font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.35}
.sk-l small{color:var(--ink-faint);font-size:10px}
@media(max-width:560px){.streak-grid{grid-template-columns:repeat(2,1fr)}}
.cal{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);padding:16px 16px 12px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink)}
.cal-nav{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);color:var(--ink-soft);font-size:20px;display:grid;place-items:center;line-height:1}
.cal-nav:hover{border-color:var(--gold-line);color:var(--ink)}
.cal-nav.off{opacity:.3;pointer-events:none}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px}
.cal-dows>div{text-align:center;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--ink-faint);text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-cell{position:relative;aspect-ratio:1;border:1px solid var(--line-2);border-radius:8px;background:var(--night-2);display:flex;align-items:flex-start;justify-content:flex-start;padding:5px 6px;transition:.12s;cursor:pointer}
.cal-cell.ph{border:none;background:none;cursor:default}
.cal-cell .cd{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft)}
.cal-cell:hover:not(.ph):not(.fut){border-color:var(--gold-line)}
.cal-cell.today{border-color:var(--dawn);box-shadow:0 0 0 1px var(--dawn) inset}
.cal-cell.sel{outline:2px solid var(--dawn);outline-offset:1px}
.cal-cell.fut{opacity:.3;cursor:default}
.wdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--dawn);position:absolute;bottom:5px;right:5px;box-shadow:0 0 5px var(--dawn)}
.cal-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--ink-faint)}
.cal-legend span{display:flex;align-items:center;gap:6px}
.cal-legend .wdot{position:static;box-shadow:none}
.dd{margin-top:18px;padding:18px 20px}
.dd-h{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink);margin-bottom:14px}
.dd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px 10px}
.dd-grid>div{display:flex;flex-direction:column;gap:3px}
.dd-grid span{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint)}
.dd-grid b{font-size:16px;color:var(--ink);font-weight:600}
@media(max-width:560px){.dd-grid{grid-template-columns:repeat(2,1fr)}}
.dd-note{margin-top:14px;padding-top:13px;border-top:1px solid var(--line);font-size:13.5px;color:var(--ink-soft);font-style:italic;font-family:var(--serif);line-height:1.55}

/* ====== ANALYSIS (Moliya/Vaqt) ====== */
.an-row{display:flex;gap:11px;flex-wrap:wrap;margin-bottom:16px}
.an-card{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px}
.an-k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint)}
.an-v{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--ink);margin-top:5px}
.an-chart{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 8px}
.an-ct{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
.tlist{display:flex;flex-direction:column;gap:7px}
.tl-row{display:flex;align-items:center;gap:11px;padding:10px 14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm)}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--dawn);flex:none}
.tl-n{flex:1;font-size:14px;color:var(--ink)}
.tl-v{font-family:var(--mono);font-size:13px;color:var(--dawn);font-weight:500}

/* ====== REMINDER + EXPORT (in settings) ====== */
.rem-card{padding:20px 22px;margin-bottom:22px}
.rem-top{display:flex;align-items:center;justify-content:space-between;gap:14px}
.rem-h{font-size:14.5px;font-weight:600;color:var(--ink)}
.rem-sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
.rem-note{font-size:11.5px;color:var(--ink-faint);margin-top:12px;line-height:1.5}
.toggle{flex:none;width:50px;height:28px;border-radius:16px;background:var(--line);border:1px solid var(--line);position:relative;transition:.18s}
.toggle .kn{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--ink-faint);transition:.18s}
.toggle.on{background:var(--sage-soft);border-color:var(--sage)}
.toggle.on .kn{left:24px;background:var(--sage)}
.exp-card{padding:20px 22px;margin-bottom:22px}
.exp-btns{display:flex;gap:10px;flex-wrap:wrap}
.exp-ta,.imp-ta{width:100%;margin-top:12px;font-family:var(--mono);font-size:11px;line-height:1.4;color:var(--ink-soft);resize:vertical}
.exp-div{height:1px;background:var(--line);margin:18px 0}

/* ====== ONBOARDING ====== */
.onb{position:fixed;inset:0;z-index:60;background:radial-gradient(900px 500px at 70% -10%,rgba(231,180,92,.14),transparent 60%),var(--night);display:grid;place-items:center;padding:24px;overflow:auto}
.onb[hidden]{display:none}
.onb-sheet{max-width:440px;width:100%;text-align:center;animation:fade .5s ease}
.onb-mark{display:flex;justify-content:center;margin-bottom:18px}
.onb-eye{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--dawn)}
.onb-h{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--ink);margin:10px 0 14px;line-height:1.1}
.onb-p{font-size:14.5px;color:var(--ink-soft);line-height:1.65;max-width:40ch;margin:0 auto 24px}
.onb-p em{color:var(--dawn);font-style:italic}
.onb-field{text-align:left;margin-bottom:14px}
.onb-field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:7px}
.onb-field .inp{width:100%}
.onb-sign{width:100%;justify-content:center;font-size:15px;padding:15px;margin-top:8px}
.onb-skip{margin-top:14px;font-size:12.5px;color:var(--ink-faint);cursor:pointer}
.onb-skip:hover{color:var(--ink-soft)}

/* ===== nav groups ===== */
.nav-group{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);padding:16px 14px 6px;opacity:.75}

/* ===== Bugun: consti moon strip ===== */
.consti{display:flex;gap:18px;align-items:center;background:linear-gradient(135deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:14px}
.consti-moon{flex:0 0 auto;filter:drop-shadow(0 0 14px var(--dawn-glow))}
.consti-info{flex:1;min-width:0}
.consti-eye{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dawn);margin-bottom:8px}
.consti-nums{display:flex;align-items:flex-end;gap:16px;margin-bottom:8px}
.cn{display:flex;flex-direction:column;line-height:1}
.cn b{font-family:var(--serif);font-size:34px;font-weight:600;color:var(--ink)}
.cn span{font-size:11px;color:var(--ink-faint);margin-top:4px;letter-spacing:.02em}
.cn-div{width:1px;align-self:stretch;background:var(--line-2);margin:4px 0}
.consti-line{font-size:12.5px;color:var(--ink-soft);line-height:1.5}
.consti-line b{color:var(--dawn);font-weight:600}

/* ===== day complete banners ===== */
.bugun-done,.done-banner{background:linear-gradient(135deg,rgba(231,180,92,.14),rgba(124,154,138,.10));border:1px solid var(--gold-line);border-radius:var(--r-sm);padding:13px 16px;color:var(--dawn);font-size:13.5px;font-weight:600;margin-bottom:14px;text-align:center;animation:fade .4s ease}
.done-banner{display:none;margin:0 0 14px}
.done-banner.show{display:block}

/* ===== per-habit streak ===== */
.hstreak{display:inline}
.flame{display:inline-flex;align-items:center;gap:1px;font-size:11px;font-family:var(--mono);color:var(--dawn);background:rgba(231,180,92,.12);border:1px solid var(--gold-line);border-radius:20px;padding:1px 7px;margin-left:8px;vertical-align:middle;font-weight:600}

/* ===== why notes ===== */
.why-show{font-size:12.5px;color:var(--sage);margin-top:5px;line-height:1.5}
.why-i{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-right:6px}
.why-btn{flex:0 0 auto;background:transparent;border:1px solid var(--line-2);color:var(--ink-faint);font-family:var(--mono);font-size:10px;letter-spacing:.08em;border-radius:7px;padding:5px 9px;cursor:pointer;transition:.15s;align-self:center}
.why-btn:hover{border-color:var(--dawn);color:var(--dawn)}
.why-edit{display:flex;gap:8px;align-items:center;padding:10px 14px 14px;flex-wrap:wrap}
.why-edit .inp{flex:1;min-width:160px}

/* ===== Maqsadlar ===== */
.goal-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:22px}
.goal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;transition:.2s}
.goal.done{border-color:var(--gold-line);background:linear-gradient(135deg,var(--surface),rgba(231,180,92,.06))}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.goal-h{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink);line-height:1.25}
.g-check{color:var(--dawn);margin-right:7px}
.goal-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:8px 0 12px;font-size:11.5px;color:var(--ink-faint)}
.g-stage{font-family:var(--mono);font-size:10px;letter-spacing:.06em;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--ink-soft)}
.g-auto{color:var(--sage);font-family:var(--mono);font-size:10px;letter-spacing:.04em}
.g-dot{color:var(--line-2)}

/* ===== weekly review ===== */

.wk-stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;text-align:center}

<script>
"use strict";
/* ============================================================= STORAGE ===== */
/* Backends, in priority order:
   1) window.storage  — Claude.ai artifact storage (only inside Claude)
   2) localStorage    — normal browsers incl. GitHub Pages (persists on device)
   3) in-memory Map   — last resort (lost on reload) */
const mem = new Map();
const hasWS = (()=>{ try{ return !!(typeof window!=="undefined" && window.storage && window.storage.get); }catch(e){ return false; } })();
const hasLS = (()=>{ try{ const t="__momin_t"; localStorage.setItem(t,"1"); localStorage.removeItem(t); return true; }catch(e){ return false; } })();
const Store = {
  async get(k){
    if(hasWS){ try{ const r = await window.storage.get(k); if(r) return r.value; }catch(e){} }
    if(hasLS){ try{ const v = localStorage.getItem(k); if(v!==null) return v; }catch(e){} }
    return mem.has(k) ? mem.get(k) : null;
  },
  async set(k,v){
    mem.set(k,v);
    if(hasLS){ try{ localStorage.setItem(k,v); }catch(e){} }
    if(hasWS){ try{ await window.storage.set(k,v); }catch(e){} }
    try{ fbPush(k,v); }catch(e){}
  },
  async del(k){
    mem.delete(k);
    if(hasLS){ try{ localStorage.removeItem(k); }catch(e){} }
    if(hasWS){ try{ await window.storage.delete(k); }catch(e){} }
  },
  async list(prefix){
    const keys = new Set();
    if(hasWS){ try{ const r = await window.storage.list(prefix); if(r&&r.keys) r.keys.forEach(x=>keys.add(x)); }catch(e){} }
    if(hasLS){ try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(prefix)===0) keys.add(k); } }catch(e){} }
    for(const k of mem.keys()){ if(k.indexOf(prefix)===0) keys.add(k); }
    return [...keys];
  }
};
const J  = s => { try{return JSON.parse(s);}catch(e){return null;} };

/* ============================================================= FIREBASE SYNC =
   Ixtiyoriy bulutli sinxron. Foydalanuvchi o'z Firebase loyihasi
   konfiguratsiyasini joylaydi → email bilan kiradi → barcha "momin:*"
   kalitlari Realtime Database'ga jonli sinxron bo'ladi (qurilmalararo).
   Konfiguratsiya bo'lmasa — bu blok hech narsa qilmaydi, ilova avvalgidek. */
const FB = { libs:null, app:null, auth:null, db:null, user:null, ready:false, connected:false, unsub:null, _applying:false };
function fbGetConfig(){ try{ const t=localStorage.getItem("momin_fbcfg"); return t?JSON.parse(t):null; }catch(e){ return null; } }
function fbSaveConfig(c){ try{ localStorage.setItem("momin_fbcfg", JSON.stringify(c)); }catch(e){} }
function fbClearConfig(){ try{ localStorage.removeItem("momin_fbcfg"); }catch(e){} }
function fbSetStatus(s){ S.fbStatus=s||""; const el=document.querySelector("#fbStatus"); if(el) el.textContent=S.fbStatus; }
function fbAuthErr(e){
  const c=(e&&e.code)||""; 
  if(c.includes("email-already-in-use")) return "Bu email allaqachon ro'yxatda — “Kirish”ni bosing.";
  if(c.includes("invalid-email")) return "Email noto'g'ri.";
  if(c.includes("weak-password")) return "Parol juda zaif (kamida 6 belgi).";
  if(c.includes("wrong-password")||c.includes("invalid-credential")) return "Email yoki parol noto'g'ri.";
  if(c.includes("user-not-found")) return "Bunday foydalanuvchi yo'q — “Ro'yxatdan o'tish”ni bosing.";
  if(c.includes("network")) return "Internet bilan aloqa yo'q.";
  return "Xato: "+((e&&e.message)||c||e);
}
async function fbLoad(){
  if(FB.libs) return FB.libs;
  const v="10.12.0", base="https://www.gstatic.com/firebasejs/"+v+"/";
  const [appM,authM,dbM]=await Promise.all([
    import(base+"firebase-app.js"),
    import(base+"firebase-auth.js"),
    import(base+"firebase-database.js")
  ]);
  FB.libs={appM,authM,dbM};
  return FB.libs;
}
async function fbInit(cfg){
  try{
    const {appM,authM,dbM}=await fbLoad();
    FB.app=appM.initializeApp(cfg);
    FB.auth=authM.getAuth(FB.app);
    FB.db=dbM.getDatabase(FB.app, cfg.databaseURL);
    FB.ready=true;
    authM.onAuthStateChanged(FB.auth, async (user)=>{
      FB.user=user||null;
      if(user){ fbSetStatus("Sinxron yoqilmoqda…"); await fbStartSync(); fbSetStatus(""); }
      else { fbStopSync(); }
      if(S.view==="sozlama" && typeof renderSozlama==="function") renderSozlama();
      updateSyncBadge();
    });
  }catch(e){ fbSetStatus("Firebase yuklanmadi: "+((e&&e.message)||e)); }
}
function fbPush(k,v){
  if(!FB.connected||!FB.user||FB._applying||!FB.libs) return;
  if(String(k).indexOf("momin:")!==0) return;
  try{ const {dbM}=FB.libs; dbM.set(dbM.ref(FB.db,"users/"+FB.user.uid+"/"+k), v); S.fbLastSync=Date.now(); updateSyncBadge(); }catch(e){}
}
async function reloadFromLocal(){ await loadAll(); HIST=null; if(typeof render==="function") render(); updateSyncBadge(); }
async function fbStartSync(){
  if(!FB.libs||!FB.user) return;
  persistCoreState(); // joriy seed/holatni mahalliy bazaga yozib qo'yamiz
  const {dbM}=FB.libs; const uid=FB.user.uid; const r=dbM.ref(FB.db,"users/"+uid);
  let remote=null;
  try{ const snap=await dbM.get(r); remote=snap.exists()?snap.val():null; }
  catch(e){ fbSetStatus("Bulutga ulanib bo'lmadi: "+((e&&e.message)||e)); return; }
  FB.connected=true;
  const localKeys=await Store.list("momin:");
  if(remote){
    FB._applying=true;
    for(const key in remote){ if(key.indexOf("momin:")===0) await Store.set(key, remote[key]); }
    FB._applying=false;
    const rk=new Set(Object.keys(remote));
    for(const k of localKeys){ if(!rk.has(k)){ const val=await Store.get(k); if(val!=null){ try{ dbM.set(dbM.ref(FB.db,"users/"+uid+"/"+k), val); }catch(e){} } } }
    await reloadFromLocal();
  } else {
    for(const k of localKeys){ const val=await Store.get(k); if(val!=null){ try{ dbM.set(dbM.ref(FB.db,"users/"+uid+"/"+k), val); }catch(e){} } }
  }
  // jonli tinglovchi — butun shoxni diff bilan qo'llaydi (o'z yozuvi takror render qilmaydi)
  FB.unsub = dbM.onValue(r, async (snap)=>{
    if(FB._applying) return;
    const val=snap.val(); if(!val) return;
    let changed=false; FB._applying=true;
    try{
      for(const key in val){ if(key.indexOf("momin:")!==0) continue;
        const cur=await Store.get(key);
        if(cur!==val[key]){ await Store.set(key, val[key]); changed=true; } }
    } finally { FB._applying=false; }
    if(changed) await reloadFromLocal();
  });
  S.fbLastSync=Date.now(); fbSetStatus(""); updateSyncBadge();
}
function fbStopSync(){ try{ if(FB.unsub) FB.unsub(); }catch(e){} FB.unsub=null; FB.connected=false; updateSyncBadge(); }
async function fbClearRemote(){ try{ if(FB.connected&&FB.user&&FB.libs){ const {dbM}=FB.libs; await dbM.remove(dbM.ref(FB.db,"users/"+FB.user.uid)); } }catch(e){} }
function updateSyncBadge(){
  const el=document.querySelector("#syncBadge"); if(!el) return;
  if(FB.connected&&FB.user){ el.textContent="☁ sinxron"; el.className="sync-badge on"; }
  else if(fbGetConfig()){ el.textContent="☁ ulanmagan"; el.className="sync-badge off"; }
  else { el.textContent=""; el.className="sync-badge"; }
}
function fbMaybeAutoConnect(){ const cfg=fbGetConfig(); if(cfg&&cfg.databaseURL){ fbInit(cfg); } }
/* UI handlers */
function fbParseCfg(txt){
  if(!txt) return null;
  const m = String(txt).match(/\{[\s\S]*\}/); const t = m ? m[0] : txt;
  let cfg=null;

function dayNumber(startISO){
  const s = new Date(startISO+"T00:00:00");
  const n = new Date(); n.setHours(0,0,0,0);

}

/* ---------- HISTORY (reads all saved days) ---------- */
let HIST = null; // {days:{date:dayObj}, fin:{date:[items]}, time:{date:[items]}}
async function loadHistory(){
  const out = {days:{}, fin:{}, time:{}};
  const dayKeys  = await Store.list("momin:day:");
  const finKeys  = await Store.list("momin:fin:");
  const timeKeys = await Store.list("momin:time:");
  for(const k of dayKeys){ const v=J(await Store.get(k)); if(v) out.days[k.slice(10)]=v; }
  for(const k of finKeys){ const v=J(await Store.get(k)); if(v&&v.items) out.fin[k.slice(10)]=v.items; }
  for(const k of timeKeys){ const v=J(await Store.get(k)); if(v&&v.items) out.time[k.slice(11)]=v.items; }
  // ensure today's in-memory state is reflected even if not yet flushed
  out.days[todayKey()] = S.day;
  if(S.fin&&S.fin.items) out.fin[todayKey()] = S.fin.items;
  if(S.time&&S.time.items) out.time[todayKey()] = S.time.items;
  HIST = out;
  return out;
}
// completion % for a stored day object (routine only)
function dayRoutinePct(dayObj){
  if(!dayObj||!dayObj.routine) return 0;
  const ids = S.routine.map(r=>r.id);
  if(!ids.length) return 0;
  const done = ids.filter(id=>dayObj.routine[id]).length;
  return Math.round(done/ids.length*100);
}
function dayWoke(dayObj){ return !!(dayObj && dayObj.woke); }
// streak of consecutive woke-days ending today or yesterday
function computeStreak(){
  if(!HIST) return {current:0, best:0, totalDays:0, wokeDays:0};
  const dates = Object.keys(HIST.days).sort();
  const set = new Set(dates.filter(d=>dayWoke(HIST.days[d])));
  // current
  let cur=0; let d=new Date(); d.setHours(0,0,0,0);
  if(!set.has(dKey(d))) d=addDays(d,-1); // allow streak to count up to yesterday if today not yet done
  while(set.has(dKey(d))){ cur++; d=addDays(d,-1); }
  // best
  let best=0, run=0, prev=null;
  for(const ds of [...set].sort()){
    const cd=parseDK(ds);
    if(prev && (cd-prev)===86400000) run++; else run=1;
    best=Math.max(best,run); prev=cd;
  }
  const active = dates.filter(dt=>{ const o=HIST.days[dt]; return dayWoke(o)||dayRoutinePct(o)>0 || (o&&(o.zikr||o.note||(o.refl&&(o.refl.a||o.refl.b||o.refl.c)))); });
  return {current:cur, best, totalDays:active.length, wokeDays:set.size};
}

/* ---------- inline SVG bar chart ---------- */
function barChart(bars, opts){
  opts=opts||{}; const W=opts.w||640, H=opts.h||150, pad=24, gap=opts.gap!=null?opts.gap:3;
  const max=Math.max(1, ...bars.map(b=>b.v));
  const n=bars.length, bw=(W-pad*0 - gap*(n-1))/n;
  let rects="", labels="";
  bars.forEach((b,i)=>{
    const h=Math.max(b.v>0?2:0, (b.v/max)*(H-26));
    const x=i*(bw+gap), y=(H-18)-h;
    rects+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2.5" fill="${b.c||'var(--dawn)'}" opacity="${b.o||0.9}"><title>${b.t||''}</title></rect>`;
    if(b.lab) labels+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-5}" text-anchor="middle" font-size="8.5" fill="var(--ink-faint)" font-family="var(--mono)">${b.lab}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">${rects}${labels}</svg>`;
}

/* ---------- ISO week + week dates ---------- */
function isoWeekKey(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3);
  const firstThu=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  const week=1+Math.round(((t-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);
  return t.getUTCFullYear()+"-W"+pad(week);
}
function weekDates(offset){
  const base=parseDK(todayKey()); const dow=(base.getDay()+6)%7;
  const mon=addDays(base, -dow + (offset||0)*7);
  return Array.from({length:7},(_,i)=>dKey(addDays(mon,i)));
}
/* ---------- per-habit streak ---------- */
function habitStreak(rid){
  if(!HIST) return 0;
  const done=k=>{ const o=HIST.days[k]; return !!(o&&o.routine&&o.routine[rid]); };
  let d=parseDK(todayKey());
  if(!done(dKey(d))) d=addDays(d,-1);
  let n=0; while(done(dKey(d))){ n++; d=addDays(d,-1); } return n;
}
/* ---------- weekly aggregate ---------- */
function weekAgg(offset){
  const dates=weekDates(offset); const today=todayKey();
  let woke=0,rtSum=0,rtDays=0,salah=0,journal=0,timeSec=0,kir=0,chq=0,zikr=0;
  dates.forEach(k=>{ if(k>today) return; const o=HIST.days[k];
    if(o){ if(dayWoke(o)) woke++; const p=dayRoutinePct(o); if(p>0){rtSum+=p;rtDays++;}
      salah+=SALAH.filter(x=>o.salah&&o.salah[x.id]).length;
      if(o.note||(o.refl&&(o.refl.a||o.refl.b||o.refl.c))) journal++; zikr+=o.zikr||0; }
    (HIST.time[k]||[]).forEach(it=>timeSec+=it.sec);
    (HIST.fin[k]||[]).forEach(it=>{ if(it.kind==='kirim') kir+=it.amount; else chq+=it.amount; });
  });
  return {woke, adher:rtDays?Math.round(rtSum/rtDays):0, salah, journal, timeSec, kir, chq, savings:kir-chq, zikr};
}

/* ---------- moon phase: 0=new(dark) .. 1=full(bright) ---------- */
function moonPhaseSVG(frac, size){
  frac=Math.max(0,Math.min(1,frac)); const r=size/2-1.5, cx=size/2, cy=size/2;
  const darkCx = cx - 2*r*frac;
  const id="mc"+size+"_"+Math.round(frac*1000);
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" aria-hidden="true">
    <defs><clipPath id="${id}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--dawn)"/>
    <circle cx="${darkCx}" cy="${cy}" r="${r}" fill="var(--night-2)" clip-path="url(#${id})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--gold-line)" stroke-width="1.2"/>
  </svg>`;
}

/* progress helpers */
const routinePct = ()=> S.routine.length ? Math.round(S.routine.filter(r=>S.day.routine[r.id]).length / S.routine.length * 100) : 0;
function stdTotals(){
  let done=0,all=0;
  S.standards.forEach(c=>c.items.forEach(i=>{all++; if(S.day.std[c.id+":"+i.id]) done++;}));
  return {done,all,pct:all?Math.round(done/all*100):0};
}
function catTotals(c){
  const done=c.items.filter(i=>S.day.std[c.id+":"+i.id]).length;
  return {done,all:c.items.length,pct:c.items.length?Math.round(done/c.items.length*100):0};
}

/* ============================================================= RING SVG ===== */
function ring(pct, size, sw, id){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="bg" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${sw}"/>
    <circle class="fg" ${id?`id="${id}"`:""} cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${sw}"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
}

/* ============================================================= DAWN SKY ===== */
function wakeMins(){
  const parts=String(S.settings.wake||"04:00").split(":");
  const h=parseInt(parts[0],10)||0, m=parseInt(parts[1],10)||0;
  return ((h*60+m)%1440+1440)%1440;
}
function sunProgress(){
  const d=new Date(); const mins=d.getHours()*60+d.getMinutes();
  let p=(mins-wakeMins())/(24*60); // uyg'onish vaqti = 0 ; to'liq sutka
  if(p<0) p+=1; if(p>1) p-=1;
  return p;
}
function phaseLabel(p){
  if(p<0.06) return "Tong sahari";
  if(p<0.30) return "Ertalab";
  if(p<0.52) return "Tushgacha";
  if(p<0.70) return "Tushdan keyin";
  if(p<0.84) return "Kechki payt";
  return "Tun";
}
function skySVG(){
  const W=800,H=240, cx=W/2, cy=H+30, rx=W*0.46, ry=H*0.74;
  const p=sunProgress(); const a=Math.PI*(1-p);
  const sx=cx+rx*Math.cos(a), sy=cy-ry*Math.sin(a);
  const horizon=H-46;
  const stars=[[90,40],[150,70],[230,38],[300,64],[360,30],[470,52],[560,36],[640,70],[700,44],[120,100],[680,96],[420,80]]
    .map(([x,y])=>`<circle cx="${x}" cy="${y}" r="${(Math.random()*0.9+0.5).toFixed(1)}" fill="#fff" opacity="${(0.15+Math.random()*0.35).toFixed(2)}"/>`).join("");
  // arc path (sun path)
  const lx=cx-rx, rxp=cx+rx;
  const lift = Math.max(0, Math.sin(a)); // 0..1 how high sun is -> light intensity
  return `<svg class="sky" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="skyg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#070b17"/>
        <stop offset="0.55" stop-color="#0c1326"/>
        <stop offset="1" stop-color="${lift>0.15?"#1a1c2e":"#0c1124"}"/>
      </linearGradient>
      <radialGradient id="glowg" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#ffd98c" stop-opacity="${(0.8*lift+0.2).toFixed(2)}"/>
        <stop offset="0.4" stop-color="#e7b45c" stop-opacity="${(0.5*lift+0.1).toFixed(2)}"/>
        <stop offset="1" stop-color="#e7b45c" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="horg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#3a2a14" stop-opacity="0.0"/>
        <stop offset="${(p*100).toFixed(0)}%" stop-color="#e7b45c" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#5e688a" stop-opacity="0.0"/>
      </linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#skyg)"/>
    <g opacity="${(1-lift*0.9).toFixed(2)}">${stars}</g>
    <path d="M${lx} ${cy-0} A ${rx} ${ry} 0 0 1 ${rxp} ${cy}" fill="none" stroke="var(--line)" stroke-width="1" stroke-dasharray="3 7" opacity="0.5"/>
    <ellipse cx="${sx}" cy="${sy}" rx="60" ry="60" fill="url(#glowg)" class="sun-glow"/>
    <circle cx="${sx}" cy="${sy}" r="11" fill="#ffdf9e"/>
    <circle cx="${sx}" cy="${sy}" r="11" fill="none" stroke="#fff3d6" stroke-opacity="0.6"/>
    <rect x="0" y="${horizon}" width="${W}" height="3" fill="url(#horg)"/>
    <rect x="0" y="${horizon+3}" width="${W}" height="${H-horizon}" fill="#06090f" opacity="0.6"/>
  </svg>`;
}

function makeRemind(){
  const R=S.reframes, W=S.wisdom, tot=R.length+W.length;
  if(!tot){
    return `<div class="remind"><div class="lbl">Bugungi eslatma · O'zimga so'z</div>
      <div class="one faint">Hozircha so'z yo'q. “Yo'l xaritasi” bo'limidan o'zingga eslatma qo'sh.</div></div>`;
  }
  let i = ((S.remindIdx % tot) + tot) % tot;
  let inner;
  if(i < R.length){
    const r = R[i];
    inner = `<div class="swap">
        <div class="neg">${r.from}</div>
        <div><span class="arrow">→</span> <span class="pos">${r.to}</span></div>
      </div>`;
  } else {
    inner = `<div class="one">“${W[i-R.length]}”</div>`;
  }
  return `<div class="remind">
      <button class="btn btn-ghost next" data-act="nextRemind" style="padding:7px 12px">Keyingisi →</button>

/* ============================================================= IBODAT ======= */
const escd = v => String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function prettyDK(k){ const d=parseDK(k); return `${d.getDate()}-${UZ_MON[d.getMonth()]}`; }

function renderIbodat(){
  const sal = SALAH.map(p=>{
    const on=!!S.day.salah[p.id];
    return `<button class="pray ${on?'on':''}" data-act="prayer" data-id="${p.id}"><span class="pray-ic">${on?'✓':''}</span><span class="pray-n">${p.name}</span></button>`;
  }).join("");
  const salDone = SALAH.filter(p=>S.day.salah[p.id]).length;
  const totalAyah = S.surah.reduce((a,s)=>a+(s.ayah||0),0);
  const doneAyah  = S.surah.reduce((a,s)=>a+(s.ok?(s.ayah||0):Math.min(s.done||0,s.ayah||0)),0);
  const memo = S.surah.filter(s=>s.ok).length;
  const suPct = totalAyah?Math.round(doneAyah/totalAyah*100):0;
  const surahRows = S.surah.map(s=>{
    const pct = s.ok?100:(s.ayah?Math.round(Math.min(s.done||0,s.ayah)/s.ayah*100):0);
    const days = (s.ok && s.rev) ? Math.floor((Date.now()-new Date(s.rev).getTime())/86400000) : null;
    const due = s.ok && (s.rev==null || days>=7);
    const revBlock = s.ok ? `<div class="su-rev">
        <span class="su-rev-t ${due?'due':''}">${s.rev==null?'takror kutilmoqda':(days===0?'bugun takrorlandi':days+' kun oldin'+(due?' — takror vaqti':''))}</span>
        <button class="su-rev-btn ${due?'due':''}" data-act="reviewSurah" data-id="${s.id}">Takrorladim</button>
      </div>` : "";
    return `<div class="su ${s.ok?'ok':''} ${due?'due':''}">
      <button class="su-check" data-act="surahOk" data-id="${s.id}" title="Yodlandi">${s.ok?'✓':''}</button>
      <div class="su-body">
        <div class="su-top"><span class="su-name">${escd(s.name)}</span><span class="su-meta">${s.ok?('takror ×'+(s.revs||0)):((s.done||0)+' / '+s.ayah+' oyat')}</span></div>
        <div class="su-bar"><i style="width:${pct}%"></i></div>
        ${revBlock}
      </div>
      ${s.ok?'':`<div class="su-ctrl"><button class="su-mini" data-act="surahMinus" data-id="${s.id}">−</button><button class="su-mini" data-act="surahPlus" data-id="${s.id}">+</button></div>`}
      <button class="row-del" data-act="delSurah" data-id="${s.id}" title="O'chirish">×</button>
    </div>`;
  }).join("") || `<div class="empty"><div class="serif">Reja bo'sh</div><div>Quyidan sura qo'sh.</div></div>`;
  const dueCount = S.surah.filter(s=>s.ok && (s.rev==null || Math.floor((Date.now()-new Date(s.rev).getTime())/86400000)>=7)).length;

  $("#v-ibodat").innerHTML = `
    <div class="eyebrow">Ibodat · Diniy amal</div>
    <h1 class="page-h">Ibodat</h1>
    <p class="page-sub">Axloq — bosh, iymon — tana. Kunlik namoz, zikr va Qur'on yodlash shu tananing yuragi.</p>

    <div class="sec-head"><h2>Bugungi namozlar</h2><div class="pc"><b>${salDone}</b>/5</div></div>
    <div class="pray-row">${sal}</div>

    <div class="zikr-card">
      <div class="zikr-lab">Zikr — “La ilaha illalloh”</div>
      <div class="zikr-num" id="zikrNum">${S.day.zikr||0}</div>
      <div class="zikr-btns">
        <button class="zikr-tap" data-act="zikrTap">Tasbeh +1</button>
        <button class="zikr-reset" data-act="zikrReset">Nolla</button>
      </div>
    </div>

    <div class="sec-head"><h2>Qur'on yodlash</h2><div class="pc"><b>${memo}</b> sura · ${suPct}%${dueCount?` · <span class="due-badge">${dueCount} takror</span>`:''}</div></div>
    <div class="su-wrap">${surahRows}</div>
    <div class="add-panel two">
      <div class="ap-hint">Yangi sura qo'shish</div>
      <input class="inp" id="addSuName" placeholder="Sura nomi">
      <input class="inp" id="addSuAyah" inputmode="numeric" placeholder="Oyat" style="max-width:110px">
      <button class="btn btn-gold" data-act="addSurah">+ Qo'shish</button>
    </div>`;
}
function togglePrayer(id){ S.day.salah[id]=!S.day.salah[id]; saveDay(); renderIbodat(); }
function zikrTap(){ S.day.zikr=(S.day.zikr||0)+1; saveDay(); const n=$("#zikrNum"); if(n) n.textContent=S.day.zikr; }
function zikrReset(){ S.day.zikr=0; saveDay(); renderIbodat(); }
function addSurah(){ const name=($("#addSuName").value||"").trim(); if(!name) return; const ayah=parseInt(($("#addSuAyah").value||"0").replace(/[^\d]/g,""),10)||1; S.surah.push({id:uid(),name,ayah,done:0,ok:false,rev:null,revs:0}); saveSurah(); renderIbodat(); }
function surahPlus(id){ const s=S.surah.find(x=>x.id===id); if(s){ const was=s.ok; s.done=Math.min((s.done||0)+1, s.ayah); if(s.done>=s.ayah) s.ok=true; saveSurah(); renderIbodat(); if(s.ok&&!was) celebrate("surah-"+s.id, escd(s.name)+" yodlandi ✓", "Yana bir sura qalbingga ko'chdi. Endi takrorlab tur."); } }
function surahMinus(id){ const s=S.surah.find(x=>x.id===id); if(s){ s.done=Math.max((s.done||0)-1,0); s.ok=false; saveSurah(); renderIbodat(); } }
function surahOk(id){ const s=S.surah.find(x=>x.id===id); if(s){ const was=s.ok; s.ok=!s.ok; if(s.ok){ s.done=s.ayah; if(s.rev==null) s.rev=null; } saveSurah(); renderIbodat(); if(s.ok&&!was) celebrate("surah-"+s.id, escd(s.name)+" yodlandi ✓", "Yana bir sura qalbingga ko'chdi. Endi takrorlab tur."); } }
function reviewSurah(id){ const s=S.surah.find(x=>x.id===id); if(s){ s.rev=new Date().toISOString().slice(0,10); s.revs=(s.revs||0)+1; saveSurah(); renderIbodat(); toast("🔁 "+escd(s.name)+" — takror belgilandi"); } }
function delSurah(id){ S.surah=S.surah.filter(x=>x.id!==id); saveSurah(); renderIbodat(); }

/* ============================================================= MAQSADLAR ==== */
const AUTO_LABEL = {sura:"avto · yodlangan suralar", jamgarma:"avto · jamg'arma"};
function renderMaqsad(){
  const goals=S.goals||[];
  const rows = goals.map(g=>{
    const cur=goalCur(g), pct=goalPct(g), dl=daysLeft(g.deadline), done=pct>=100;
    const dlTxt = dl==null ? "" : (dl<0 ? `<span class="g-late">${-dl} kun o'tib ketdi</span>` : (dl===0?`<span class="g-soon">bugun</span>`:`<span class="${dl<=14?'g-soon':''}">${dl} kun qoldi</span>`));
    const auto = g.auto?`<span class="g-auto">${AUTO_LABEL[g.auto]||'avto'}</span>`:"";
    const ctrl = g.auto ? "" : `<div class="g-ctrl"><button class="su-mini" data-act="goalDec" data-id="${g.id}">−</button><button class="su-mini" data-act="goalInc" data-id="${g.id}">+</button></div>`;
    return `<div class="goal ${done?'done':''}">
      <div class="goal-top">
        <div class="goal-h">${done?'<span class="g-check">✓</span>':''}${escd(g.title)}</div>
        <button class="row-del" data-act="delGoal" data-id="${g.id}" title="O'chirish">×</button>
      </div>
      <div class="goal-meta">${g.stage?`<span class="g-stage">${escd(g.stage)} yosh</span>`:''}${auto}${dlTxt?`<span class="g-dot">·</span>${dlTxt}`:''}</div>
      <div class="goal-bar"><i style="width:${pct}%"></i></div>
      <div class="goal-foot">
        <span class="goal-num">${fmtSum(cur)} <span class="muted2">/ ${fmtSum(g.target)} ${escd(g.unit||'')}</span></span>
        <span class="goal-pct">${pct}%</span>
        ${ctrl}
      </div>
    </div>`;
  }).join("") || `<div class="empty"><div class="serif">Hali maqsad yo'q</div><div>Quyidan ulkan, muddatli maqsad qo'sh.</div></div>`;

  $("#v-maqsad").innerHTML = `
    <div class="eyebrow">Maqsadlar · Muddatli</div>
    <h1 class="page-h">Maqsadlar</h1>
    <p class="page-sub">Kunlik amal — g'isht; maqsad — bino. Har bir maqsad ulkan, lekin muddatli bo'lsin.</p>
    <div class="goal-wrap">${rows}</div>
    <div class="add-panel goal-add">
      <div class="ap-hint">Yangi maqsad</div>
      <input class="inp" id="goalTitle" placeholder="Maqsad (masalan: 10 kitob o'qish)">
      <div class="goal-add-row">
        <input class="inp" id="goalTarget" inputmode="numeric" placeholder="Nishon (son)" style="flex:1">
        <input class="inp" id="goalUnit" placeholder="birlik" style="max-width:110px">
        <input class="inp" id="goalDeadline" type="date" style="max-width:170px">
      </div>
      <button class="btn btn-gold" data-act="addGoal">+ Maqsad qo'shish</button>
    </div>
    <p class="muted" style="font-size:12px;margin-top:14px">“Yodlangan suralar” va “jamg'arma” maqsadlari o'zi yangilanadi — Ibodat va Moliya bilan bog'liq.</p>`;
}
function addGoal(){
  const title=($("#goalTitle").value||"").trim(); if(!title) return;
  const target=parseInt(($("#goalTarget").value||"0").replace(/[^\d]/g,""),10)||100;
  const unit=($("#goalUnit").value||"").trim();
  const deadline=$("#goalDeadline").value||"";
  S.goals.push({id:uid(), title, auto:null, target, cur:0, unit, deadline, stage:""});
  saveGoals(); renderMaqsad();
}
function goalInc(id){ const g=S.goals.find(x=>x.id===id); if(g&&!g.auto){ g.cur=Math.min((g.cur||0)+1, g.target); saveGoals(); checkGoalDone(g); renderMaqsad(); } }
function goalDec(id){ const g=S.goals.find(x=>x.id===id); if(g&&!g.auto){ g.cur=Math.max((g.cur||0)-1,0); saveGoals(); renderMaqsad(); } }
function delGoal(id){ S.goals=S.goals.filter(x=>x.id!==id); saveGoals(); renderMaqsad(); }
function checkGoalDone(g){ if(goalPct(g)>=100) celebrate("goal-"+g.id, "Maqsadga yetding! 🎯", escd(g.title)+" — bajarildi."); }

    <h1 class="page-h">Kundalik</h1>

    <div class="card jr">
      <div class="jr-date">Bugun — ${prettyDate()}</div>

function saveRefl(){
  S.day.refl={a:($("#jrA").value||'').trim(), b:($("#jrB").value||'').trim(), c:($("#jrC").value||'').trim()};
  S.day.note=($("#jrNote").value||'').trim();
  saveDay(); HIST=null;
  const s=$("#jrSaved"); if(s) s.textContent="Saqlandi ✓";
}
async function fillJournalPast(){
  if(!HIST) await loadHistory();
  const dates=Object.keys(HIST.days).filter(d=>{ const o=HIST.days[d]; return d!==todayKey() && o && (o.note || (o.refl&&(o.refl.a||o.refl.b||o.refl.c))); }).sort().reverse();
  const box=$("#jrPast"), cnt=$("#jrCount");
  if(cnt) cnt.textContent = dates.length+" yozuv";
  if(!box) return;

let remindTimer=null;
function scheduleReminder(){
  if(remindTimer){ clearTimeout(remindTimer); remindTimer=null; }
  if(!S.settings.remind) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const now=new Date(); const parts=String(S.settings.wake||"04:00").split(":");
  const next=new Date(now.getFullYear(),now.getMonth(),now.getDate(),parseInt(parts[0])||0,parseInt(parts[1])||0,0,0);
  if(next<=now) next.setDate(next.getDate()+1);
  const ms=Math.min(next-now, 2147483647);
  remindTimer=setTimeout(()=>{
    try{ new Notification("Mo'min — Ahd vaqti", {body:(S.settings.wake||"04:00")+" — tur. Bugun ham 99%."}); }catch(e){}
    scheduleReminder();
  }, ms);
}
async function toggleReminder(){
  const msg=$("#remMsg");
  if(S.settings.remind){ S.settings.remind=false; saveSet(); if(remindTimer){clearTimeout(remindTimer);remindTimer=null;} renderSozlama(); return; }
  if(!("Notification" in window)){ if(msg) msg.textContent="Bu brauzer eslatmani qo'llab-quvvatlamaydi"; return; }
  let perm=Notification.permission;
  if(perm!=="granted"){ try{ perm=await Notification.requestPermission(); }catch(e){} }
  if(perm==="granted"){ S.settings.remind=true; saveSet(); scheduleReminder(); renderSozlama(); }
  else { if(msg) msg.textContent="Ruxsat berilmadi. Brauzer sozlamasidan ruxsat bering."; }
}

function setupPWA(){
  try{
    const mk=(sz)=>{ const c=document.createElement("canvas"); c.width=c.height=sz; const x=c.getContext("2d");
      x.fillStyle="#0A0F1E"; x.fillRect(0,0,sz,sz);
      const cx=sz*0.53, cy=sz*0.5, r=sz*0.3;
      x.fillStyle="#E7B45C"; x.beginPath(); x.arc(cx,cy,r,0,Math.PI*2); x.fill();
      x.fillStyle="#0A0F1E"; x.beginPath(); x.arc(cx+r*0.42,cy-r*0.2,r*0.92,0,Math.PI*2); x.fill();
      x.fillStyle="#E7B45C"; x.beginPath(); x.arc(cx+r*0.95,cy-r*0.62,r*0.12,0,Math.PI*2); x.fill();
      return c.toDataURL("image/png");
    };
    const i180=mk(180), i512=mk(512);
    const l=document.createElement("link"); l.rel="apple-touch-icon"; l.href=i180; document.head.appendChild(l);
    const man={name:"Mo'min — Kun tartibi", short_name:"Mo'min", display:"standalone", orientation:"portrait", background_color:"#0A0F1E", theme_color:"#0A0F1E", start_url:".", icons:[{src:i180,sizes:"180x180",type:"image/png",purpose:"any maskable"},{src:i512,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
    const blob=new Blob([JSON.stringify(man)],{type:"application/manifest+json"});
    const m=document.createElement("link"); m.rel="manifest"; m.href=URL.createObjectURL(blob); document.head.appendChild(m);
  }catch(e){}
}

    case "toggleCat": S.openCat = (S.openCat===el.dataset.id)?null:el.dataset.id; renderStandart(); break;

    case "nextRemind": { const tot=S.reframes.length+S.wisdom.length; if(tot) S.remindIdx=(S.remindIdx+1)%tot; renderBugun(); break; }
    case "addRoutine": addRoutine(); break;
    case "delRoutine": delRoutine(el.dataset.id); break;
    case "addStd": addStd(el.dataset.id); break;
    case "delStd": delStd(el.dataset.id); break;
    case "addCat": addCat(); break;
    case "addReframe": addReframe(); break;
    case "delReframe": delReframe(+el.dataset.idx); break;
    case "addWisdom": addWisdom(); break;
    case "delWisdom": delWisdom(+el.dataset.idx); break;
    case "saveSettings": saveSettings(); break;
    case "resetDefaults": resetDefaults(); break;
    case "prayer": togglePrayer(el.dataset.id); break;
    case "zikrTap": zikrTap(); break;
    case "zikrReset": zikrReset(); break;
    case "addSurah": addSurah(); break;
    case "surahPlus": surahPlus(el.dataset.id); break;
    case "surahMinus": surahMinus(el.dataset.id); break;
    case "surahOk": surahOk(el.dataset.id); break;
    case "delSurah": delSurah(el.dataset.id); break;
    case "saveRefl": saveRefl(); break;
    case "histDay": histDay(el.dataset.id); break;
    case "histPrev": histPrev(); break;
    case "histNext": histNext(); break;
    case "exportData": exportData(); break;
    case "copyExport": copyExport(); break;
    case "importData": importData(); break;
    case "toggleReminder": toggleReminder(); break;
    case "signAhd": signAhd(); break;
    case "skipOnb": skipOnb(); break;
    case "finKind": S.finKind=el.dataset.k; renderMoliya(); break;
    case "addFin": addFin(); break;
    case "delFin": delFin(+el.dataset.idx); break;
    case "swToggle": swToggle(); break;
    case "swSave": swSave(); break;
    case "swReset": swReset(); break;
    case "delTime": delTime(+el.dataset.idx); break;
    case "addGoal": addGoal(); break;
    case "goalInc": goalInc(el.dataset.id); break;
    case "goalDec": goalDec(el.dataset.id); break;
    case "delGoal": delGoal(el.dataset.id); break;
    case "editWhy": editWhy(el.dataset.id); break;
    case "saveWhy": saveWhy(el.dataset.id); break;
    case "cancelWhy": cancelWhy(); break;
    case "saveWeek": saveWeek(); break;
    case "reviewSurah": reviewSurah(el.dataset.id); break;
    case "celOk": celOk(); break;
    case "fbSaveCfg": fbSaveCfg(); break;
    case "fbSignIn": fbAuth("in"); break;
    case "fbSignUp": fbAuth("up"); break;
    case "fbSignOut": fbSignOut(); break;
    case "fbForget": fbForget(); break;
  }
});
/* keyboard toggle for check rows */
document.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    const inp=e.target.closest(".add-panel, .add-row");
    if(inp && e.target.tagName==="INPUT"){
      e.preventDefault();
      const btn=inp.querySelector("button[data-act]");
      if(btn) btn.click();
      return;
    }
  }
  if((e.key===" "||e.key==="Enter")){
    const el=e.target.closest("[data-act='toggleR'],[data-act='toggleS']");
    if(el){ e.preventDefault(); el.click(); }
  }
});

function toggleRoutine(id){
  S.day.routine[id]=!S.day.routine[id];
  if(id==="wake"&&S.day.routine[id]) S.day.woke=true;
  saveDay();
  const rp=routinePct();
  // update in place for snappiness
  const row=document.querySelector(`[data-act='toggleR'][data-id='${id}']`);
  if(row){ row.classList.toggle("done", S.day.routine[id]); row.setAttribute("aria-checked", S.day.routine[id]); }
  const pc=document.querySelector("#v-tartib .pc"); if(pc) pc.innerHTML=`<b>${rp}%</b> · ${S.routine.filter(r=>S.day.routine[r.id]).length}/${S.routine.length}`;
  const allDone = S.routine.length>0 && S.routine.every(r=>S.day.routine[r.id]);
  const db=$("#tartibDone"); if(db) db.classList.toggle("show", allDone);
  if(HIST){ HIST.days[todayKey()]=S.day; } // keep history live
  fillHabitStreaks();
  if(id==="wake") checkStreakMilestone();
}
function toggleStd(key){
  S.day.std[key]=!S.day.std[key]; saveDay();
  const row=document.querySelector(`[data-act='toggleS'][data-id='${key}']`);
  if(row){ row.classList.toggle("done", S.day.std[key]); row.setAttribute("aria-checked", S.day.std[key]); }
  // update category bar + counts + header
  const cid=key.split(":")[0]; const cat=S.standards.find(c=>c.id===cid); const ct=catTotals(cat);
  const head=document.querySelector(`[data-act='toggleCat'][data-id='${cid}']`);
  if(head){ const pr=head.querySelector(".std-prog"); pr.innerHTML=`<b>${ct.done}</b>/${ct.all}`;
    const bar=head.parentElement.querySelector(".std-bar i"); if(bar) bar.style.width=ct.pct+"%"; }
  const sp=stdTotals(); const pc=document.querySelector("#v-standart .pc"); if(pc) pc.innerHTML=`<b>${sp.pct}%</b> · ${sp.done}/${sp.all}`;
}

/* editable lists: add / delete */
function addRoutine(){
  const lab=($("#addRLab").value||"").trim(); if(!lab) return;
  const det=($("#addRDet").value||"").trim();
  const why=($("#addRWhy").value||"").trim();
  S.routine.push({id:uid(), lab, det, why});
  saveRoutine(); renderTartib();
  const el=$("#addRLab"); if(el) el.focus();
}
function delRoutine(id){
  S.routine=S.routine.filter(r=>r.id!==id);
  delete S.day.routine[id];
  saveRoutine(); saveDay(); renderTartib();
}
function addStd(cid){
  const el=$("#addS-"+cid); const t=((el&&el.value)||"").trim(); if(!t) return;
  const cat=S.standards.find(c=>c.id===cid); if(!cat) return;
  cat.items.push({id:uid(), t});
  S.openCat=cid;
  saveStandards(); renderStandart();
  const n=$("#addS-"+cid); if(n) n.focus();
}
function delStd(key){
  const cid=key.split(":")[0], iid=key.slice(cid.length+1);
  const cat=S.standards.find(c=>c.id===cid); if(cat) cat.items=cat.items.filter(i=>i.id!==iid);
  delete S.day.std[key];
  saveStandards(); saveDay(); renderStandart();
}
function addCat(){
  const name=($("#addCatName").value||"").trim(); if(!name) return;
  const id="c"+uid();
  S.standards.push({id, name, sub:"Mezon · Shaxsiy", icon:'<path d="M12 3l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 16.3 7.2 18.7l.9-5.4-3.9-3.8 5.4-.8z"/>', items:[]});
  S.openCat=id;
  saveStandards(); renderStandart();
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}
function addReframe(){
  const from=($("#addRfFrom").value||"").trim(), to=($("#addRfTo").value||"").trim();
  if(!from||!to) return;
  S.reframes.push({from,to}); saveReframes(); renderYol();
  const el=$("#addRfFrom"); if(el) el.focus();
}
function delReframe(idx){ S.reframes.splice(idx,1); saveReframes(); renderYol(); }
function addWisdom(){
  const w=($("#addWisdom").value||"").trim(); if(!w) return;
  S.wisdom.push(w); saveWisdom(); renderYol();
  const el=$("#addWisdom"); if(el) el.focus();
}
function delWisdom(idx){ S.wisdom.splice(idx,1); saveWisdom(); renderYol(); }

/* finance */
function addFin(){
  const amtEl=$("#finAmt"), noteEl=$("#finNote");
  let raw=(amtEl.value||"").replace(/[^\d]/g,"");
  const amount=parseInt(raw||"0",10);
  const note=(noteEl.value||"").trim();
  const it={kind:S.finKind, amount:isNaN(amount)?0:amount, note, t:new Date().toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"})};
  S.fin.items.unshift(it);
  if(it.kind==="kirim") S.totals.kirim+=it.amount; else S.totals.chiqim+=it.amount;
  saveFin(); saveTot(); renderMoliya();
  const a=$("#finAmt"); if(a) a.focus();
}
function delFin(idx){
  const it=S.fin.items[idx]; if(!it) return;
  if(it.kind==="kirim") S.totals.kirim-=it.amount; else S.totals.chiqim-=it.amount;
  S.fin.items.splice(idx,1); saveFin(); saveTot(); renderMoliya();
}

/* stopwatch */
function swToggle(){
  if(SW.running){ SW.base=swElapsed(); SW.running=false; if(SW.raf){cancelAnimationFrame(SW.raf);SW.raf=null;} }
  else { SW.start=performance.now(); SW.running=true; tickSW(); }
  const b=$("#swBtn"); if(b) b.textContent=SW.running?"To'xtatish":"Boshlash";
  const t=$("#swTime"); if(t) t.classList.toggle("run",SW.running);
}
function swSave(){
  const sec=Math.round(swElapsed()/1000); if(sec<1) return;
  const label=($("#swLabel").value||"").trim();
  S.time.items.unshift({label, sec, t:new Date().toLocaleTimeString("uz-UZ",{hour:"2-digit",minute:"2-digit"})});
  saveTime();
  SW={running:false,base:0,start:0,raf:null};
  renderVaqt();
}
function swReset(){ if(SW.raf){cancelAnimationFrame(SW.raf);SW.raf=null;} SW={running:false,base:0,start:0,raf:null}; renderVaqt(); }
function delTime(idx){ S.time.items.splice(idx,1); saveTime(); renderVaqt(); }

function saveSettings(){
  S.settings.name=($("#setName").value||"Mo'min").trim();
  S.settings.wake=$("#setWake").value||"04:00";

  const ai=ahdInfo();
  $("#navDay").innerHTML = ai.started ? `Ahd: <b>${ai.n}</b>-kun` : `Ahd: <b>${ai.n}</b> kun qoldi`;
}
function resetDefaults(){
  if(!confirm("Kun tartibi, standartlar va so'zlar boshlang'ich holatga qaytadi. Davom etamizmi?")) return;
  S.routine=clone(ROUTINE_SEED); S.standards=clone(STANDARDS_SEED);
  S.reframes=clone(REFRAMES_SEED); S.wisdom=clone(WISDOM_SEED);
  S.openCat=null;
  saveRoutine(); saveStandards(); saveReframes(); saveWisdom();
  renderSozlama();
}
