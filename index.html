html[data-theme="light"] .ai-chip{background:rgba(20,28,52,.045);border-color:rgba(20,28,52,.12)}
html[data-theme="light"] .ai-key{background:rgba(20,28,52,.035);border-color:rgba(20,28,52,.1)}

/* ======================================================================
   🕌 UZBEK NAQSH + LIQUID GLASS  ·  Kitob / Hadis / Oyat / Ilhom
   ====================================================================== */
.naqsh-mini{width:18px;height:18px;vertical-align:-3px;color:var(--dawn);opacity:.92;flex:none}
.naqsh-div{display:flex;align-items:center;gap:14px;margin:2px 0 16px;color:var(--dawn)}
.naqsh-div .nd-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(231,180,92,.45),transparent)}
.naqsh-div .nd-orn{width:66px;height:22px;opacity:.85;flex:none}

.naqsh-list{display:flex;flex-direction:column;gap:12px;margin:10px 0 18px}
.naqsh-card{position:relative;padding:16px 42px 16px 18px;border-radius:18px;
  background:linear-gradient(160deg,rgba(255,255,255,.075),rgba(255,255,255,.022));
  border:1px solid rgba(255,255,255,.1);
  -webkit-backdrop-filter:blur(16px) saturate(1.3);backdrop-filter:blur(16px) saturate(1.3);
  box-shadow:0 18px 40px -28px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.13)}
.naqsh-card .nc-orn{position:absolute;top:13px;right:40px;opacity:.38}
.naqsh-card .nc-text{font-size:15px;line-height:1.6;color:var(--ink)}
.naqsh-card .ar-text{font-size:16px;line-height:1.72}
.naqsh-card .nc-ref{margin-top:8px;font-size:12.5px;color:var(--dawn);font-family:var(--mono);letter-spacing:.02em}
.naqsh-card .nc-quote{position:absolute;top:2px;left:13px;font-family:var(--serif);font-size:50px;line-height:1;color:rgba(231,180,92,.32)}
.book-card{padding-left:32px;border-left:3px solid rgba(231,180,92,.55)}
.hadith-card{border-left:3px solid rgba(123,154,138,.6)}
.ayah-card{border-left:3px solid rgba(47,168,184,.6)}
.nc-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--ink-faint);font-size:16px;line-height:1;cursor:pointer;transition:.15s}
.nc-del:hover{background:rgba(231,90,90,.22);color:#ff9b9b}
.add-card .set-dh{display:flex;align-items:center;gap:7px}
.add-card textarea.inp{resize:vertical;min-height:54px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Bugun ilhom strip */
.ilhom-wrap{margin-top:16px}
.il-title{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
.ilhom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px}
.ilhom{position:relative;border-radius:18px;padding:14px 15px;min-height:120px;overflow:hidden;
  background:linear-gradient(160deg,rgba(255,255,255,.085),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.1);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);backdrop-filter:blur(18px) saturate(1.3);
  box-shadow:0 18px 44px -30px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.14)}
.il-ayah{border-top:2px solid rgba(47,168,184,.5)}
.il-hadith{border-top:2px solid rgba(123,154,138,.5)}
.il-book{border-top:2px solid rgba(231,180,92,.5)}
.il-head{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dawn);margin-bottom:9px}
.il-head .naqsh-mini{width:15px;height:15px}
.il-head span{flex:1}
.il-next{background:transparent;border:none;color:var(--ink-faint);cursor:pointer;font-size:14px;line-height:1;padding:2px}
.il-next:hover{color:var(--dawn)}
.il-body .il-text{font-size:13.5px;line-height:1.55;color:var(--ink)}
.il-ayah .il-body .il-text{font-size:14.5px;line-height:1.65}
.il-body .il-ref{margin-top:7px;font-size:11px;color:var(--dawn);font-family:var(--mono);opacity:.85}
.il-empty{font-size:12.5px;color:var(--ink-faint);cursor:pointer;line-height:1.5}
.il-empty:hover{color:var(--dawn)}
.fadeSwap{animation:fadeSwap .5s ease}
@keyframes fadeSwap{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:860px){ .ilhom-grid{grid-template-columns:1fr 1fr} .ilhom{min-height:0} }

/* light mode for new cards */
html[data-theme="light"] .naqsh-card,html[data-theme="light"] .ilhom{background:linear-gradient(160deg,rgba(255,255,255,.82),rgba(255,255,255,.52));border-color:rgba(20,28,52,.1);box-shadow:0 18px 40px -30px rgba(60,50,30,.4), inset 0 1px 0 rgba(255,255,255,.7)}
html[data-theme="light"] .nc-del{background:rgba(20,28,52,.05)}

/* ---- liquid-glass polish on all cards ---- */
.card{background:linear-gradient(162deg,rgba(255,255,255,.07),rgba(255,255,255,.018)),var(--surface);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);backdrop-filter:blur(18px) saturate(1.3);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.12)}
html[data-theme="light"] .card{background:linear-gradient(162deg,rgba(255,255,255,.6),rgba(255,255,255,.3)),var(--surface)}

/* ---- remove unnecessary Bugun animations ---- */
#v-bugun .consti::before{animation:none}
#v-bugun .consti-moon::before{animation:none}
#v-bugun .consti-moon::after{animation:none}
#v-bugun .btn-gold::before{display:none}

/* ---- collection extras ---- */
.nc-link{color:var(--dawn);text-decoration:none;border-bottom:1px solid rgba(231,180,92,.3)}
.nc-link:hover{border-bottom-color:var(--dawn)}
.nc-badge{display:inline-block;padding:2px 9px;border-radius:999px;background:rgba(231,180,92,.14);color:var(--dawn);font-size:11px;font-family:var(--mono)}
.poem-text{white-space:pre-line;font-family:var(--serif);font-size:16px;line-height:1.7}

/* ---- 12 languages ---- */
.lang-tabs{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px;margin:8px 0 8px}
.lang-tab{display:flex;flex-direction:column;align-items:flex-start;gap:1px;padding:10px 12px;border-radius:14px;cursor:pointer;text-align:left;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--ink);transition:.15s}
.lang-tab:hover{border-color:rgba(231,180,92,.4)}
.lang-tab.on{background:rgba(231,180,92,.14);border-color:var(--dawn)}
.lt-flag{font-size:18px}
.lt-name{font-weight:600;font-size:13.5px}
.lt-meta{font-size:10.5px;color:var(--ink-faint);font-family:var(--mono)}
.lang-native{font-family:var(--serif);color:var(--ink-soft);font-weight:400;font-size:15px;margin-left:5px}
.word-list{display:flex;flex-direction:column;gap:8px;margin:8px 0 16px}
.word-row{position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:12px 40px 12px 14px;border-radius:14px;
  background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.wr-w{font-weight:600;font-size:16px;color:var(--ink)}
.wr-arrow{color:var(--dawn);opacity:.7}
.wr-t{color:var(--ink-soft);font-size:15px}

/* ---- kun tarixi ---- */
.hist-list{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.hist-row{display:grid;grid-template-columns:58px 1fr;gap:12px;padding:12px 14px;border-radius:14px;
  background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09)}
.hist-year{font-family:var(--mono);font-weight:700;color:var(--dawn);font-size:15px}
.hist-text{font-size:13.5px;line-height:1.55;color:var(--ink)}

html[data-theme="light"] .lang-tab{background:rgba(20,28,52,.045);border-color:rgba(20,28,52,.1)}
html[data-theme="light"] .word-row,html[data-theme="light"] .hist-row{background:linear-gradient(160deg,rgba(255,255,255,.7),rgba(255,255,255,.45));border-color:rgba(20,28,52,.1)}

/* ======================================================================
   🗂️ INTERVAL TAKROR (SM-2)  ·  📊 TAHLILLAR
   ====================================================================== */
.sr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0 16px}
.sr-stat{text-align:center;padding:14px 8px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.sr-stat b{display:block;font-family:var(--serif);font-size:26px;color:var(--ink)}
.sr-stat span{font-size:11px;color:var(--ink-faint)}
.sr-stat.due b{color:var(--dawn)}
.sr-start{width:100%;justify-content:center;font-size:16px;padding:15px}
.sr-done-note{text-align:center;padding:16px;border-radius:14px;background:rgba(124,154,138,.14);border:1px solid rgba(124,154,138,.3);color:var(--ink-soft)}
.sr-item .sr-it-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sr-item .sr-due{font-size:11px;color:var(--ink-faint);font-family:var(--mono)}
.sr-item .sr-it-back{margin-top:6px;font-size:13px;color:var(--ink-soft);padding-top:6px;border-top:1px dashed rgba(255,255,255,.12)}
.sr-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:var(--ink-soft);font-size:14px}
.sr-card{position:relative;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 22px;border-radius:22px;margin-bottom:16px;
  background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.12);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:0 30px 70px -40px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.14)}
.sr-deck{position:absolute;top:14px;left:16px;font-size:11px;font-family:var(--mono);color:var(--dawn);padding:3px 10px;border-radius:999px;background:rgba(231,180,92,.14)}
.sr-front{font-family:var(--serif);font-size:23px;line-height:1.4;color:var(--ink)}
.sr-hint{margin-top:14px;font-size:12px;color:var(--ink-faint);font-style:italic}
.sr-sep{width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(231,180,92,.4),transparent);margin:18px 0}
.sr-back{font-size:18px;line-height:1.5;color:var(--ink-soft)}
.sr-reveal{width:100%;justify-content:center;padding:15px;font-size:16px}
.sr-rate{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sr-btn{display:flex;flex-direction:column;gap:2px;align-items:center;padding:12px 4px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--ink);cursor:pointer;transition:.15s}
.sr-btn b{font-size:14px}.sr-btn span{font-size:10.5px;color:var(--ink-faint);font-family:var(--mono)}
.sr-btn:active{transform:scale(.95)}
.sr-btn.again{border-color:rgba(224,90,74,.5)}.sr-btn.again:hover{background:rgba(224,90,74,.14)}
.sr-btn.hard{border-color:rgba(224,169,74,.5)}.sr-btn.hard:hover{background:rgba(224,169,74,.14)}
.sr-btn.good{border-color:rgba(124,154,138,.5)}.sr-btn.good:hover{background:rgba(124,154,138,.14)}
.sr-btn.easy{border-color:rgba(91,179,214,.5)}.sr-btn.easy:hover{background:rgba(91,179,214,.14)}

.an-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:6px 0 16px;padding:16px;border-radius:18px;
  background:linear-gradient(160deg,rgba(231,180,92,.1),rgba(255,255,255,.02));border:1px solid rgba(231,180,92,.2)}
.an-h-cell{text-align:center}
.an-h-cell b{display:block;font-family:var(--serif);font-size:30px;color:var(--ink)}
.an-h-cell span{font-size:10.5px;color:var(--ink-soft)}
.an-two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.an-two .an-card{display:flex;align-items:center;gap:14px;padding:14px}
.an-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0 6px}
.mini-stat{text-align:center;padding:14px 6px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.mini-stat b{display:block;font-family:var(--serif);font-size:22px;color:var(--ink);word-break:break-word}
.mini-stat span{font-size:10.5px;color:var(--ink-faint)}
.mini-stat.due b{color:var(--dawn)}.mini-stat.pos b{color:#7CB398}.mini-stat.neg b{color:#E0857A}
.an-goals{display:flex;flex-direction:column;gap:12px}
.an-goal{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09)}
.ag-top{display:flex;justify-content:space-between;font-size:14px;color:var(--ink);margin-bottom:8px}
.ag-sub{margin-top:6px;font-size:11.5px;color:var(--ink-faint);font-family:var(--mono)}
.tb{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.tb.sm{height:6px}
.tb i{display:block;height:100%;border-radius:99px;background:var(--dawn)}
.an-langs{display:flex;flex-direction:column;gap:8px}
.an-lang{display:grid;grid-template-columns:118px 1fr 30px;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
.an-lang b{text-align:right;color:var(--ink);font-family:var(--mono)}
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
.kb-cell{text-align:center;padding:12px 6px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
.kb-ic{font-size:20px}.kb-v{font-family:var(--serif);font-size:20px;color:var(--ink);margin-top:2px}.kb-n{font-size:10px;color:var(--ink-faint)}
html[data-theme="light"] .sr-stat,html[data-theme="light"] .mini-stat,html[data-theme="light"] .kb-cell,html[data-theme="light"] .sr-btn,html[data-theme="light"] .an-goal{background:rgba(20,28,52,.045);border-color:rgba(20,28,52,.1)}
@media(max-width:860px){ .an-two{grid-template-columns:1fr} .an-grid4{grid-template-columns:1fr 1fr} .sr-stats{grid-template-columns:1fr 1fr} .an-hero{grid-template-columns:1fr 1fr} .an-lang{grid-template-columns:96px 1fr 26px} .sr-rate{gap:6px} .sr-btn{padding:10px 2px} }

/* ---- list search + show more ---- */
.list-search{position:relative;margin:0 0 12px}
.list-search .inp{padding-left:34px;padding-right:36px}
.list-search .ls-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:16px;pointer-events:none}
.ls-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;border-radius:50%;background:rgba(255,255,255,.08);color:var(--ink-faint);cursor:pointer;font-size:15px;line-height:1}
.ls-clear:hover{color:var(--ink)}
.list-more{width:100%;justify-content:center;margin:2px 0 14px;font-size:13px}
.list-more-wrap{display:flex;gap:8px;margin:2px 0 14px}
.list-more-wrap .list-more{margin:0}
html[data-theme="light"] .ls-clear{background:rgba(20,28,52,.06)}

/* ======================================================================
   🕌 NAQSH QATLAMI — butun platforma bo'ylab o'zbek girih bezaklari
   ====================================================================== */
*{-webkit-tap-highlight-color:transparent}
button,[data-go],[data-act]{touch-action:manipulation}
.nc-text,.il-text,.nc-ref,.il-ref,.wr-w,.wr-t,.hist-text,.sr-front,.sr-back{overflow-wrap:anywhere}

/* girih plitka — juda nozik fon to'qimasi */
.naqsh-tile{position:absolute;inset:0;pointer-events:none;opacity:.045;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96' viewBox='0 0 96 96' fill='none' stroke='%23E7B45C' stroke-width='1'><g transform='translate(48 48)'><rect x='-17' y='-17' width='34' height='34'/><rect x='-17' y='-17' width='34' height='34' transform='rotate(45)'/><circle r='5'/></g><circle cx='0' cy='0' r='3'/><circle cx='96' cy='0' r='3'/><circle cx='0' cy='96' r='3'/><circle cx='96' cy='96' r='3'/></svg>")}
html[data-theme="light"] .naqsh-tile{opacity:.07}

/* burchak naqshlari — barcha shisha kartalarda */
.card,.naqsh-card,.ilhom,.sr-card{position:relative}
.card::after,.naqsh-card::after,.ilhom::after,.sr-card::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:.3;background:
  url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none' stroke='%23E7B45C' stroke-width='1.6'><path d='M2 34V12Q2 2 12 2h22'/><path d='M9 34V16Q9 9 16 9h18'/><rect x='16' y='16' width='10' height='10' transform='rotate(45 21 21)'/></svg>") 5px 5px/26px no-repeat,
  url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none' stroke='%23E7B45C' stroke-width='1.6'><g transform='rotate(180 24 24)'><path d='M2 34V12Q2 2 12 2h22'/><path d='M9 34V16Q9 9 16 9h18'/><rect x='16' y='16' width='10' height='10' transform='rotate(45 21 21)'/></g></svg>") calc(100% - 5px) calc(100% - 5px)/26px no-repeat}
html[data-theme="light"] .card::after,html[data-theme="light"] .naqsh-card::after,html[data-theme="light"] .ilhom::after,html[data-theme="light"] .sr-card::after{opacity:.42}

/* eyebrow oldida 8 qirrali yulduz */
.eyebrow::before{content:"";width:11px;height:11px;flex:none;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E7B45C' stroke-width='2.2'><rect x='6.5' y='6.5' width='11' height='11'/><rect x='6.5' y='6.5' width='11' height='11' transform='rotate(45 12 12)'/></svg>") center/contain no-repeat}

/* brend ostida naqsh chizig'i */
.brand{position:relative}
.brand::after{content:"";position:absolute;left:2px;right:14px;bottom:-4px;height:9px;opacity:.35;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='10' viewBox='0 0 18 10' fill='none' stroke='%23E7B45C' stroke-width='1.2'><rect x='5.5' y='1.5' width='7' height='7' transform='rotate(45 9 5)'/></svg>") repeat-x left center/auto 9px}

/* liquid-glass qirra sayqali + desktop hover */
.card,.naqsh-card,.ilhom,.sr-card,.word-row,.hist-row{border-top-color:rgba(255,255,255,.2)}
@media(hover:hover){
  .naqsh-card,.ilhom{transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease}
  .naqsh-card:hover,.ilhom:hover{transform:translateY(-2px);border-color:rgba(231,180,92,.35)}
}

/* ======================================================================
   📱 MOBIL — yangi pastki panel (5 tugma + Menyu) va LITE rejim
   ====================================================================== */
.nav .nav-more{display:none}
@media(max-width:860px){
  .inp,textarea.inp,select.inp{font-size:16px}
  .nav{justify-content:space-around;gap:2px;overflow:visible;padding:6px 6px calc(env(safe-area-inset-bottom,0px) + 6px);-webkit-backdrop-filter:none;backdrop-filter:none;background:rgba(9,13,26,.97)}
  .nav .navlink{display:none;flex:1 1 0;min-width:0;max-width:none;flex-direction:column;align-items:center;gap:3px;font-size:10px;padding:7px 2px;border-radius:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nav .navlink svg{width:21px;height:21px;flex:none}
  .nav .navlink[data-go="bugun"],.nav .navlink[data-go="tartib"],.nav .navlink[data-go="ibodat"],.nav .navlink[data-go="ai"],.nav .nav-more{display:flex}

  /* LITE: og'ir effektlarni o'chirish — silliq ishlash uchun */
  .aurora{animation:none!important;opacity:.42;filter:blur(44px)}
  .stars{animation:none!important}
  .stars2,.shooting,.grain{display:none!important}
  .naqsh-tile{opacity:.035}
  .cityline{opacity:.12}
  .consti::before,.login-card::before,.login-crest .uz-orn,.consti-moon::before,.consti-moon::after{animation:none!important}
  .btn-gold::before{display:none!important}
  .card,.naqsh-card,.ilhom,.sr-card,.word-row,.hist-row,.lang-tab,.sr-stat,.mini-stat,.kb-cell,.an-goal,.sr-btn,.ai-bub,.ai-key,.stat,.goal,.streak-card,.wk-card,.an-card,.consti{-webkit-backdrop-filter:none!important;backdrop-filter:none!important}
  .view.on{animation-duration:.26s}
}

/* ======================================================================
   ☰ MENYU VARAG'I — barcha bo'limlar, shisha + girih
   ====================================================================== */

.pa-head{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dawn);margin-bottom:10px}
.pa-ar{font-family:'Amiri','Fraunces',serif;font-size:24px;line-height:2;color:#F2E7CB;direction:rtl;text-align:right}
.pa-tr{margin-top:8px;font-size:13px;font-style:italic;line-height:1.55;color:var(--dawn)}
.pa-uz{margin-top:10px;font-size:14px;line-height:1.6;color:var(--ink)}
.pa-ref{margin-top:8px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint)}
html[data-theme="light"] .pin-ayah{background:rgba(47,168,184,.1)}

/* ---- Iffat ---- */
.fab-shield{background:rgba(20,32,28,.94);color:#8FBFA5;border-color:rgba(124,179,152,.4);box-shadow:0 12px 26px -12px rgba(0,0,0,.8);font-size:20px}
.pure-card{padding:18px;margin-bottom:14px;background:linear-gradient(160deg,rgba(124,179,152,.1),rgba(255,255,255,.02));border:1px solid rgba(124,179,152,.3)}
.pure-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
.pure-n{font-family:var(--serif);font-size:40px;line-height:1;color:#8FBFA5}
.pure-lab{font-size:12px;color:var(--ink-soft);font-family:var(--mono);letter-spacing:.06em}
.pure-best{font-size:12px;color:var(--ink-faint);font-family:var(--mono)} .pure-best b{color:var(--ink-soft)}
.pure-q{font-size:14px;color:var(--ink);margin-bottom:10px}
.pure-btns{display:flex;gap:9px}
.pure-b{flex:1;padding:13px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--ink);font-size:14px;font-family:var(--sans);cursor:pointer;transition:.15s}
.pure-b:active{transform:scale(.97)}
.pure-b.ok.on{border-color:#7CB398;background:rgba(124,179,152,.22);color:#B7E0C7}
.pure-b.bad.on{border-color:#E0857A;background:rgba(224,133,122,.18);color:#F0B7AE}
.pure-fall{margin-top:10px;padding:11px 13px;border-radius:12px;background:rgba(231,180,92,.08);border:1px solid rgba(231,180,92,.3);font-size:12.5px;line-height:1.55;color:var(--ink-soft)}
.iffat-verse{cursor:pointer;border-left:3px solid rgba(47,168,184,.5)}
.dua-list{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
.dua-card{padding:13px 15px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09)}
.dua-uz{margin-top:7px;font-size:12.5px;color:var(--ink-soft)}
.dua-tr{margin-top:6px;font-size:12px;font-style:italic;color:var(--dawn)}
.tawba-card{border-left:3px solid rgba(124,179,152,.5)}
.tw-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.tw-row{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:11px;background:rgba(124,179,152,.07);border:1px solid rgba(124,179,152,.2);font-size:12.5px}
.tw-d{font-family:var(--mono);font-size:10.5px;color:#8FBFA5;flex:none}
.tw-t{flex:1;color:var(--ink)}
.bn-iffat{border-color:rgba(124,179,152,.45);background:rgba(124,179,152,.1)}
.weak-card{border:1px solid rgba(124,179,152,.4)}
.weak-lead{font-family:var(--serif);font-size:17px;line-height:1.5;color:#F2E7CB;margin-bottom:14px}
.weak-ayah{font-family:'Amiri',serif;font-size:22px;line-height:2;color:#F2E7CB;direction:rtl;text-align:right;margin-bottom:8px}
.weak-uz{font-size:13px;color:var(--ink);margin-bottom:14px}
.weak-tr{font-size:12.5px;font-style:italic;color:var(--dawn);margin-bottom:8px}
.weak-dua{padding:12px 14px;border-radius:13px;background:rgba(47,168,184,.1);border:1px solid rgba(47,168,184,.28);margin-bottom:14px}
.weak-dua span{display:block;margin-top:6px;font-size:12px;color:var(--ink-soft)}
.weak-steps{margin-bottom:6px}
.ws-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#8FBFA5;margin-bottom:8px}
.ws-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13.5px;color:var(--ink)}
.ws-row b{flex:none;width:22px;height:22px;border-radius:50%;background:rgba(124,179,152,.2);color:#8FBFA5;display:flex;align-items:center;justify-content:center;font-size:12px}
html[data-theme="light"] .pure-card{background:rgba(124,179,152,.14)}
html[data-theme="light"] .tw-row,html[data-theme="light"] .dua-card{background:rgba(255,255,255,.6);border-color:rgba(20,28,52,.1)}

/* ---- 🏆 G'alaba xonasi ---- */
.win-hero{display:flex;flex-direction:column;align-items:center;gap:3px;padding:20px;margin-bottom:14px;border-radius:18px;background:linear-gradient(160deg,rgba(231,180,92,.14),rgba(255,255,255,.02));border:1px solid rgba(231,180,92,.32)}
.win-big{font-family:var(--serif);font-size:48px;line-height:1;color:var(--dawn)}
.win-lab{font-size:12px;font-family:var(--mono);letter-spacing:.08em;color:var(--ink-soft)}
.win-streak{margin-top:6px;font-size:12px;color:var(--ink-soft)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{padding:6px 11px;border-radius:999px;border:1px solid rgba(231,180,92,.3);background:rgba(231,180,92,.07);color:var(--dawn);font-size:11.5px;font-family:var(--sans);cursor:pointer;transition:.12s}
.chip:active{transform:scale(.94)}
.win-list{display:flex;flex-direction:column;gap:6px}
.win-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:12px;background:rgba(231,180,92,.06);border:1px solid rgba(231,180,92,.18);font-size:13px}
.win-d{font-family:var(--mono);font-size:10px;color:var(--dawn);flex:none}
.win-t{flex:1;color:var(--ink)}
.bn-win{border-color:rgba(231,180,92,.45);background:rgba(231,180,92,.1)}

/* ---- ⭐ Muvaffaqiyat burchagi ---- */
.ach-stat{display:flex;flex-direction:column;align-items:center;gap:2px;padding:16px;margin-bottom:14px;border-radius:16px;background:rgba(47,168,184,.08);border:1px solid rgba(47,168,184,.25)}
.as-n{font-family:var(--serif);font-size:36px;color:#5AC8DA;line-height:1}
.as-l{font-size:12px;color:var(--ink-soft);font-family:var(--mono)}
.achv-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:560px){ .achv-grid{grid-template-columns:1fr} }
.achv-card{position:relative;padding:13px 14px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.1)}
.achv-card.auto{background:rgba(47,168,184,.07);border-color:rgba(47,168,184,.22)}
.achv-d{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint)}
.achv-auto{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:#5AC8DA;text-transform:uppercase}
.achv-t{margin-top:5px;font-size:13.5px;line-height:1.4;color:var(--ink);padding-right:16px}

/* ---- 🌱 Orzular ---- */
.dream-stat{display:flex;gap:10px;margin-bottom:14px}
.dream-stat>div{flex:1;text-align:center;padding:12px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);font-size:12.5px;color:var(--ink-soft)}
.dream-stat b{display:block;font-family:var(--serif);font-size:24px;color:var(--ink)}
.dream-list{display:flex;flex-direction:column;gap:8px}
.dream-list.done{opacity:.85}
.dream-card{position:relative;padding:13px 15px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.1)}
.dream-card.st-yetdim{background:rgba(124,179,152,.1);border-color:rgba(124,179,152,.3)}
.dream-card.st-harakat{border-color:rgba(224,133,122,.3)}
.dream-card.st-yaqin{border-color:rgba(90,200,218,.3)}
.dream-state{border:none;background:rgba(255,255,255,.08);color:var(--ink);font-size:11px;padding:4px 10px;border-radius:999px;cursor:pointer;font-family:var(--sans);margin-bottom:8px}
.dream-t{font-size:14.5px;line-height:1.4;color:var(--ink);padding-right:18px}
.dream-card.st-yetdim .dream-t{text-decoration:line-through;color:var(--ink-soft)}
.dream-meta{margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
html[data-theme="light"] .win-row,html[data-theme="light"] .achv-card,html[data-theme="light"] .dream-card{background:rgba(255,255,255,.6);border-color:rgba(20,28,52,.1)}
/* ═══════════════════════════════════════════════════════════════════════════
   ⟣ AURORA GLASS — haqiqiy suyuq shisha · rangli aurora shisha ichidan ko'rinadi
   JS o'zgarmaydi · desktopda to'liq shisha · mobil opaque+tez · yorug' rejim moslashadi
   ═══════════════════════════════════════════════════════════════════════════ */
:root{
  --night:#05060E;
  --night-2:#090C18;
  --surface:#111629;
  --surface-2:#171E36;
  --ink:#F6F2E8;
  --ink-soft:#AEB6CE;
  --ink-faint:#616B8C;
  --dawn:#F2C879;
  --dawn-deep:#D69E47;
  --rose:#F0916B;
  --violet:#9B7DE8;
  --teal:#4FD1C5;
  --blue:#6D8CF5;
  --dawn-glow:rgba(242,200,121,.32);
  --line:rgba(246,242,232,.11);
  --line-2:rgba(246,242,232,.055);
  --gold-line:rgba(242,200,121,.4);
  --r:24px; --r-sm:16px;
  --grad-warm:linear-gradient(120deg,#FBE3AE 0%,#F2C879 40%,#F0916B 100%);
  --grad-title:linear-gradient(110deg,#FDEECF 0%,#F2C879 46%,#F0916B 78%,#9B7DE8 100%);
  --glass:rgba(17,22,41,.46);
  --glass-2:rgba(23,30,54,.5);
  --shadow:0 2px 8px -2px rgba(0,0,0,.5), 0 24px 50px -22px rgba(0,0,0,.7), 0 60px 100px -60px rgba(0,0,0,.85);
}

/* ── Jonli rangli AURORA (yorqin, aniq harakatlanadi) ── */
body{background:var(--night)}
body::before{
  content:"";position:fixed;inset:-30%;z-index:0;pointer-events:none;
  background:
    radial-gradient(38% 34% at 82% 4%,  rgba(242,200,121,.42), transparent 62%),
    radial-gradient(40% 36% at 8% 10%,  rgba(155,125,232,.40), transparent 62%),
    radial-gradient(44% 40% at 66% 96%, rgba(79,209,197,.30),  transparent 64%),
    radial-gradient(38% 36% at 20% 82%, rgba(240,145,107,.32), transparent 62%),
    radial-gradient(36% 34% at 96% 66%, rgba(109,140,245,.28), transparent 62%);
  filter:blur(56px) saturate(1.35);
  animation:aur2 28s ease-in-out infinite alternate;
}
@keyframes aur2{
  0%{transform:translate3d(0,0,0) scale(1) rotate(0deg)}
  50%{transform:translate3d(-3%,2%,0) scale(1.12) rotate(2deg)}
  100%{transform:translate3d(3%,-1.5%,0) scale(1.06) rotate(-1.5deg)}
}
@media(prefers-reduced-motion:reduce){ body::before{animation:none} }
@media(max-width:860px){ body::before{ animation:none; filter:blur(44px) saturate(1.25); inset:-15% } }
#app{position:relative;z-index:1}

/* ── HAQIQIY SUYUQ SHISHA — aurora shisha ichidan ko'rinib turadi (desktop) ── */
@media(min-width:861px){
  .card,.naqsh-card,.ilhom,.sr-card,.exp-card,.add-card{
    background:linear-gradient(158deg, rgba(255,255,255,.07), rgba(255,255,255,.02) 52%), var(--glass);
    -webkit-backdrop-filter:blur(26px) saturate(1.7) brightness(1.06);
    backdrop-filter:blur(26px) saturate(1.7) brightness(1.06);
    border:1px solid rgba(255,255,255,.13);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.18), inset 0 0 30px rgba(255,255,255,.02), var(--shadow);
  }
  .card{border-radius:var(--r)}
  .naqsh-card,.ilhom,.sr-card,.exp-card,.add-card{border-radius:var(--r-sm)}
  /* jonli chekka nur */
  .card{position:relative;isolation:isolate}
  @media(prefers-reduced-motion:no-preference){
    .card::before{
      content:"";position:absolute;inset:-2px;border-radius:inherit;z-index:-1;pointer-events:none;
      background:conic-gradient(from 0deg,
        rgba(242,200,121,0), rgba(242,200,121,.6) 12%, rgba(240,145,107,.45) 28%,
        rgba(155,125,232,.5) 48%, rgba(79,209,197,.45) 68%, rgba(242,200,121,0) 84%);
      filter:blur(12px);opacity:.25;animation:cardOrbit 12s linear infinite;transition:opacity .3s ease;
    }
    .card:hover::before{opacity:.6}
    @keyframes cardOrbit{to{transform:rotate(360deg)}}
  }
  .card:hover{transform:translateY(-3px);transition:transform .25s cubic-bezier(.2,.8,.3,1)}
}
/* mobil: opaque, o'qilishi aniq, tez */
@media(max-width:860px){
  .card,.naqsh-card,.ilhom,.sr-card,.exp-card,.add-card{
    background:linear-gradient(158deg, rgba(255,255,255,.05), rgba(255,255,255,.012) 50%), var(--surface);
    border:1px solid var(--line);border-top-color:rgba(255,255,255,.14);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 16px 34px -18px rgba(0,0,0,.6);
  }
  .card{border-radius:var(--r)} .naqsh-card,.ilhom,.sr-card,.exp-card,.add-card{border-radius:var(--r-sm)}
}
/* yorug' rejim */
html[data-theme="light"] .card,html[data-theme="light"] .naqsh-card,html[data-theme="light"] .ilhom,html[data-theme="light"] .sr-card,html[data-theme="light"] .exp-card,html[data-theme="light"] .add-card{
  background:linear-gradient(158deg,rgba(255,255,255,.92),rgba(255,255,255,.72)) !important;
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 22px 48px -26px rgba(120,90,20,.28) !important;
}
html[data-theme="light"] body::before{filter:blur(56px) saturate(1.05);opacity:.7}

/* ── Katta oqar gradient tipografiya ── */
.page-h{
  font-family:var(--serif);font-weight:600;font-size:clamp(34px,6vw,54px);letter-spacing:-.032em;line-height:.98;
  background:var(--grad-title);background-size:230% auto;-webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;animation:txtFlow 9s ease-in-out infinite;
}
html[data-theme="light"] .page-h{background:linear-gradient(110deg,#A8690F,#C88A38 46%,#C0563A 78%,#7A5FD0);-webkit-background-clip:text;background-clip:text}
@keyframes txtFlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.eyebrow{font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--dawn);opacity:.95}
.page-sub{font-size:15px;line-height:1.62;color:var(--ink-soft);max-width:64ch}
.sec-head h2{font-family:var(--serif);font-weight:560;letter-spacing:-.015em}

/* ── HERO — shishasimon, suzuvchi, gradient soat, sheen ── */
.hero{
  border-radius:calc(var(--r) + 4px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 0 0 1px rgba(242,200,121,.18), 0 50px 110px -50px rgba(242,200,121,.5), 0 0 100px -34px rgba(155,125,232,.45);
}
@media(prefers-reduced-motion:no-preference){ .hero{animation:heroFloat 10s ease-in-out infinite} @keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}} }
.hero::after{content:"";position:absolute;top:0;left:-65%;width:46%;height:100%;pointer-events:none;z-index:3;background:linear-gradient(105deg,transparent,rgba(255,255,255,.16) 48%,transparent);transform:skewX(-16deg);animation:heroSheen 8s ease-in-out infinite}
@keyframes heroSheen{0%{left:-65%}28%{left:135%}100%{left:135%}}
.clock{background:var(--grad-warm);background-size:230% auto;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;font-weight:700;font-size:clamp(32px,6.2vw,50px);animation:txtFlow 6.5s ease-in-out infinite}
.clock .sec{-webkit-text-fill-color:var(--dawn);color:var(--dawn)}
.bism .ar{color:var(--dawn)}

/* ── Tugmalar — nur beruvchi shisha ── */
.btn{border-radius:var(--r-sm);font-weight:600;letter-spacing:-.01em;padding:13px 22px;transition:transform .15s cubic-bezier(.2,.8,.3,1), box-shadow .22s ease, filter .2s ease}
.btn-gold{background:var(--grad-warm);color:#241802;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.5), 0 14px 32px -10px var(--dawn-glow), 0 0 0 1px rgba(242,200,121,.22)}
.btn-gold:hover{filter:brightness(1.05);transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.55), 0 20px 44px -10px var(--dawn-glow), 0 0 30px -6px var(--dawn-glow)}
.btn-gold:active{transform:translateY(0) scale(.99)}
.btn-ghost{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));color:var(--ink-soft);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.btn-ghost:hover{color:var(--ink);border-color:var(--gold-line);background:linear-gradient(180deg,rgba(242,200,121,.12),rgba(242,200,121,.03));box-shadow:0 0 24px -8px var(--dawn-glow)}
.btn.sm{padding:8px 14px;font-size:12px;border-radius:12px}

/* ── Inputlar — shisha ── */
.inp{background:linear-gradient(180deg,rgba(0,0,0,.16),rgba(0,0,0,.05)),rgba(9,12,24,.5);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;color:var(--ink);font-size:14px;box-shadow:inset 0 1px 2px rgba(0,0,0,.3);transition:border-color .16s, box-shadow .16s}
.inp::placeholder{color:var(--ink-faint)}
.inp:focus{outline:none;border-color:var(--gold-line);box-shadow:inset 0 1px 2px rgba(0,0,0,.24), 0 0 0 3px rgba(242,200,121,.16)}
html[data-theme="light"] .inp{background:#FFFDF8;box-shadow:inset 0 1px 2px rgba(120,90,20,.08)}

/* ── Sidebar — muzli shisha, nur beruvchi faol holat (desktop) ── */
@media(min-width:861px){
  .nav{background:linear-gradient(180deg,rgba(9,12,24,.72),rgba(9,12,24,.32));-webkit-backdrop-filter:blur(24px) saturate(1.3);backdrop-filter:blur(24px) saturate(1.3);border-right:1px solid var(--line);padding:24px 16px}
  .navlink{position:relative;border-radius:14px;padding:11px 15px;font-weight:600;letter-spacing:-.01em;color:var(--ink-soft);transition:background .18s ease, color .18s ease, transform .12s ease}
  .navlink svg{transition:color .18s ease}
  .navlink:hover{background:rgba(255,255,255,.055);color:var(--ink);transform:translateX(2px)}
  .navlink:hover svg{color:var(--dawn)}
  .navlink.on{background:linear-gradient(90deg,rgba(242,200,121,.2),rgba(155,125,232,.07));color:#fff}
  .navlink.on svg{color:var(--dawn)}
  .navlink.on::before{content:"";position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:4px;height:26px;border-radius:0 4px 4px 0;background:var(--grad-warm)}
  @media(prefers-reduced-motion:no-preference){ .navlink.on::before{animation:navPulse 2.6s ease-in-out infinite} @keyframes navPulse{0%,100%{box-shadow:0 0 12px var(--dawn-glow)}50%{box-shadow:0 0 26px var(--dawn-glow),0 0 8px var(--dawn)}} }
  html[data-theme="light"] .nav{background:linear-gradient(180deg,rgba(255,255,255,.88),rgba(255,255,255,.5))}
  html[data-theme="light"] .navlink.on{color:#2B2418;background:linear-gradient(90deg,rgba(242,200,121,.26),rgba(155,125,232,.1))}
}
@media(max-width:860px){
  .nav .navlink.on{position:relative;color:var(--dawn)}
  .nav .navlink.on svg{color:var(--dawn)}
  .nav .navlink.on::after{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);width:18px;height:3px;border-radius:3px;background:var(--grad-warm);box-shadow:0 0 10px var(--dawn-glow)}
  .view.on{animation:mobRise .42s cubic-bezier(.2,.8,.25,1) both !important}
  @keyframes mobRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
}

/* ── Nozik detallar ── */
::selection{background:rgba(242,200,121,.28);color:var(--ink)}
*::-webkit-scrollbar{width:11px;height:11px}
*::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--line),var(--line-2));border-radius:7px;border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:var(--gold-line);background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}
.pc b,.pc strong{color:var(--dawn)}

/* ═══════════════════════════════════════════════════════════════════════════
   ⟢ COMIC + RGB — Comic Sans shrift · aylanuvchi RGB chegara · harakatli yozuv
   ═══════════════════════════════════════════════════════════════════════════ */
:root{
  --sans:"Comic Sans MS","Comic Sans","Chalkboard SE","Comic Neue",system-ui,sans-serif;
  --serif:"Comic Sans MS","Comic Sans","Chalkboard SE","Comic Neue",cursive;
}
body{font-family:var(--sans)}
.page-h,.brand-tx h1,.sec-head h2,.serif,.hero .clock,h1,h2,h3{font-family:var(--serif)}

/* ── Aylanuvchi RGB kamalak chegara (barcha kartalar) ── */
@property --rgbdeg{ syntax:"<angle>"; inherits:false; initial-value:0deg; }
.card,.naqsh-card,.ilhom,.sr-card,.exp-card,.add-card,.hero,.stat,.streak-card,.an-card,.consti{position:relative;isolation:isolate}
.card::before,.naqsh-card::before,.ilhom::before,.sr-card::before,.exp-card::before,.add-card::before,.hero::before,.stat::before,.streak-card::before,.an-card::before,.consti::after{
  content:"";position:absolute;inset:0;border-radius:inherit;padding:2px;z-index:2;pointer-events:none;
  background:conic-gradient(from var(--rgbdeg),
    #ff2d55, #ff9500, #ffcc00, #34c759, #00c7be, #0a84ff, #5e5ce6, #bf5af2, #ff2d55);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
          mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  filter:saturate(1.05) drop-shadow(0 0 5px rgba(140,160,255,.28));opacity:.7;
  animation:rgbSpin 7s linear infinite;
}
@keyframes rgbSpin{ to{--rgbdeg:360deg} }
/* girih burchaklarni xira qilamiz — RGB chegara asosiy bo'lsin */
.card::after,.naqsh-card::after,.ilhom::after,.sr-card::after{opacity:.12}
@media(prefers-reduced-motion:reduce){
  .card::before,.naqsh-card::before,.ilhom::before,.sr-card::before,.exp-card::before,.add-card::before,.hero::before,.stat::before,.streak-card::before,.an-card::before,.consti::after{animation:none}
}

/* ── Yana ko'proq harakatlanuvchi yozuvlar ── */
.clock-d{animation:softShim 6s ease-in-out infinite}
@keyframes softShim{0%,100%{opacity:.8}50%{opacity:1}}
.page-sub,.set-dh{animation:txtDrift 10s ease-in-out infinite}
@keyframes txtDrift{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
.rank-chip b,.nc-ref,.pc{animation:softShim 7s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){ .clock-d,.page-sub,.set-dh,.rank-chip b,.nc-ref,.pc{animation:none} }

/* ── Butun ilova bo'ylab suzuvchi "Alhamdulillah" (4 ta har xil yo'l) ── */
.hamd-float{
  position:fixed;left:0;top:0;z-index:2;pointer-events:none;user-select:none;white-space:nowrap;
  font-family:'Amiri',serif;font-weight:700;font-size:clamp(32px,7vw,72px);
  color:rgba(242,200,121,.075);text-shadow:0 0 34px rgba(242,200,121,.09);
  animation:hamdSwim 68s ease-in-out infinite;
}
.hamd-float.b{animation:hamdSwim2 84s ease-in-out infinite;animation-delay:-28s;font-size:clamp(26px,5.5vw,56px);color:rgba(155,125,232,.065);text-shadow:0 0 34px rgba(155,125,232,.09)}
.hamd-float.c{animation:hamdSwim3 76s ease-in-out infinite;animation-delay:-46s;font-size:clamp(24px,5vw,50px);color:rgba(79,209,197,.06);text-shadow:0 0 34px rgba(79,209,197,.08)}
.hamd-float.d{animation:hamdSwim 96s ease-in-out infinite;animation-delay:-64s;font-size:clamp(22px,4.5vw,44px);color:rgba(240,145,107,.055);text-shadow:0 0 34px rgba(240,145,107,.08)}
@keyframes hamdSwim{
  0%{transform:translate(-18vw,72vh) rotate(-6deg);opacity:0}
  12%{opacity:1}
  50%{transform:translate(50vw,26vh) rotate(5deg);opacity:1}
  88%{opacity:1}
  100%{transform:translate(116vw,60vh) rotate(-4deg);opacity:0}
}
@keyframes hamdSwim2{
  0%{transform:translate(112vw,14vh) rotate(6deg);opacity:0}
  14%{opacity:1}
  50%{transform:translate(38vw,66vh) rotate(-5deg);opacity:1}
  86%{opacity:1}
  100%{transform:translate(-20vw,30vh) rotate(4deg);opacity:0}
}
@keyframes hamdSwim3{
  0%{transform:translate(30vw,-14vh) rotate(-4deg);opacity:0}
  16%{opacity:1}
  50%{transform:translate(64vw,54vh) rotate(6deg);opacity:1}
  84%{opacity:1}
  100%{transform:translate(20vw,116vh) rotate(-5deg);opacity:0}
}
@media(prefers-reduced-motion:reduce){ .hamd-float{display:none} }

<script>
"use strict";
/* ============================================================= STORAGE ===== */
/* Backends, in priority order:
   1) window.storage  — Claude.ai artifact storage (only inside Claude)
   2) localStorage    — normal browsers incl. GitHub Pages (persists on device)
   3) in-memory Map   — last resort (lost on reload) */
const mem = new Map();
const hasWS = (()=>{ try{ return !!(typeof window!=="undefined" && window.storage && window.storage.get); }catch(e){ return false; } })();
const hasLS = (()=>{ try{ const t="__momin_t"; localStorage.setItem(t,"1"); localStorage.removeItem(t); return true; }catch(e){ return false; } })();
let _quotaWarned=false;
const Store = {
  async get(k){
    if(hasWS){ try{ const r = await window.storage.get(k); if(r) return r.value; }catch(e){} }
    if(hasLS){ try{ const v = localStorage.getItem(k); if(v!==null) return v; }catch(e){} }
    return mem.has(k) ? mem.get(k) : null;
  },
  async set(k,v){
    mem.set(k,v);
    if(hasLS){ try{ localStorage.setItem(k,v); }catch(e){
      if(e && (e.name==="QuotaExceededError" || /quota|exceeded/i.test(String(e.message||e))) && !_quotaWarned){
        _quotaWarned=true;
        if(typeof toast==="function") toast("⚠️ Qurilma xotirasi to'ldi. Sozlamalardan eksport qilib, keraksizlarni o'chiring.");
      }
    } }
    if(hasWS){ try{ await window.storage.set(k,v); }catch(e){} }
    try{ fbPush(k,v); }catch(e){}
  },
  async del(k){
    mem.delete(k);
    if(hasLS){ try{ localStorage.removeItem(k); }catch(e){} }
    if(hasWS){ try{ await window.storage.delete(k); }catch(e){} }
  },
  async list(prefix){
    const keys = new Set();
    if(hasWS){ try{ const r = await window.storage.list(prefix); if(r&&r.keys) r.keys.forEach(x=>keys.add(x)); }catch(e){} }
    if(hasLS){ try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(prefix)===0) keys.add(k); } }catch(e){} }
    for(const k of mem.keys()){ if(k.indexOf(prefix)===0) keys.add(k); }
    return [...keys];
  },
  usage(){
    let bytes=0, count=0;
    if(hasLS){ try{ for(let i=0;i<localStorage.length;i++){ const key=localStorage.key(i); if(key&&key.indexOf("momin")===0){ bytes+=key.length+(localStorage.getItem(key)||"").length; count++; } } }catch(e){} }
    if(!count){ for(const [key,val] of mem){ if(String(key).indexOf("momin")===0){ bytes+=String(key).length+String(val).length; count++; } } }
    return {bytes, count};
  }
};
const J  = s => { try{return JSON.parse(s);}catch(e){return null;} };

/* ============================================================= FIREBASE SYNC =
   Ixtiyoriy bulutli sinxron. Foydalanuvchi o'z Firebase loyihasi
   konfiguratsiyasini joylaydi → email bilan kiradi → barcha "momin:*"
   kalitlari Realtime Database'ga jonli sinxron bo'ladi (qurilmalararo).
   Konfiguratsiya bo'lmasa — bu blok hech narsa qilmaydi, ilova avvalgidek. */
const FB = { libs:null, app:null, auth:null, db:null, user:null, ready:false, connected:false, unsub:null, _applying:false };
function fbGetConfig(){ try{ const t=localStorage.getItem("momin_fbcfg"); return t?JSON.parse(t):null; }catch(e){ return null; } }
function fbSaveConfig(c){ try{ localStorage.setItem("momin_fbcfg", JSON.stringify(c)); }catch(e){} }
function fbClearConfig(){ try{ localStorage.removeItem("momin_fbcfg"); }catch(e){} }
function fbSetStatus(s){ S.fbStatus=s||""; ["#fbStatus","#loginStatus"].forEach(sel=>{ const el=document.querySelector(sel); if(el) el.textContent=S.fbStatus; }); }
function fbAuthErr(e){
  const c=(e&&e.code)||""; 
  if(c.includes("email-already-in-use")) return "Bu email allaqachon ro'yxatda — “Kirish”ni bosing.";
  if(c.includes("invalid-email")) return "Email noto'g'ri.";
  if(c.includes("weak-password")) return "Parol juda zaif (kamida 6 belgi).";
  if(c.includes("wrong-password")||c.includes("invalid-credential")) return "Email yoki parol noto'g'ri.";
  if(c.includes("user-not-found")) return "Bunday foydalanuvchi yo'q — “Ro'yxatdan o'tish”ni bosing.";
  if(c.includes("network")) return "Internet bilan aloqa yo'q.";
  return "Xato: "+((e&&e.message)||c||e);
}
async function fbLoad(){
  if(FB.libs) return FB.libs;
  const v="10.12.0", base="https://www.gstatic.com/firebasejs/"+v+"/";
  const [appM,authM,dbM]=await Promise.all([
    import(base+"firebase-app.js"),
    import(base+"firebase-auth.js"),
    import(base+"firebase-database.js")
  ]);
  FB.libs={appM,authM,dbM};
  return FB.libs;
}
async function fbInit(cfg){
  try{
    const {appM,authM,dbM}=await fbLoad();
    FB.app=appM.initializeApp(cfg);
    FB.auth=authM.getAuth(FB.app);
    FB.db=dbM.getDatabase(FB.app, cfg.databaseURL);
    FB.ready=true;
    authM.onAuthStateChanged(FB.auth, async (user)=>{
      FB.user=user||null;
      if(user){ fbSetStatus("Sinxron yoqilmoqda…"); await fbStartSync(); fbSetStatus(""); closeLogin(); try{ fbDailySnapshot(); }catch(e){} }
      else { fbStopSync(); }
      if(S.view==="sozlama" && typeof renderSozlama==="function") renderSozlama();
      updateSyncBadge();
    });
  }catch(e){ fbSetStatus("Firebase yuklanmadi: "+((e&&e.message)||e)); }
}
function fbPush(k,v){
  if(!FB.connected||!FB.user||FB._applying||!FB.libs) return;
  if(String(k).indexOf("momin:")!==0) return;
  try{ const {dbM}=FB.libs; dbM.set(dbM.ref(FB.db,"users/"+FB.user.uid+"/"+k), v); S.fbLastSync=Date.now(); updateSyncBadge(); }catch(e){}
}
async function reloadFromLocal(){ await loadAll(); HIST=null; if(typeof render==="function") render(); updateSyncBadge(); }
async function fbStartSync(){
  if(!FB.libs||!FB.user) return;
  persistCoreState(); // joriy seed/holatni mahalliy bazaga yozib qo'yamiz
  const {dbM}=FB.libs; const uid=FB.user.uid; const r=dbM.ref(FB.db,"users/"+uid);
  let remote=null;
  try{ const snap=await dbM.get(r); remote=snap.exists()?snap.val():null; }
  catch(e){ fbSetStatus("Bulutga ulanib bo'lmadi: "+((e&&e.message)||e)); return; }
  FB.connected=true;
  const localKeys=await Store.list("momin:");
  if(remote){
    FB._applying=true;
    for(const key in remote){ if(key.indexOf("momin:")===0) await Store.set(key, remote[key]); }
    FB._applying=false;
    const rk=new Set(Object.keys(remote));
    for(const k of localKeys){ if(!rk.has(k)){ const val=await Store.get(k); if(val!=null){ try{ dbM.set(dbM.ref(FB.db,"users/"+uid+"/"+k), val); }catch(e){} } } }
    await reloadFromLocal();
  } else {
    for(const k of localKeys){ const val=await Store.get(k); if(val!=null){ try{ dbM.set(dbM.ref(FB.db,"users/"+uid+"/"+k), val); }catch(e){} } }
  }
  // jonli tinglovchi — butun shoxni diff bilan qo'llaydi (o'z yozuvi takror render qilmaydi)
  FB.unsub = dbM.onValue(r, async (snap)=>{
    if(FB._applying) return;
    const val=snap.val(); if(!val) return;
    let changed=false; FB._applying=true;
    try{
      for(const key in val){ if(key.indexOf("momin:")!==0) continue;
        const cur=await Store.get(key);
        if(cur!==val[key]){ await Store.set(key, val[key]); changed=true; } }
    } finally { FB._applying=false; }
    if(changed) await reloadFromLocal();
  });
  S.fbLastSync=Date.now(); fbSetStatus(""); updateSyncBadge();
}
function fbStopSync(){ try{ if(FB.unsub) FB.unsub(); }catch(e){} FB.unsub=null; FB.connected=false; updateSyncBadge(); }
async function fbClearRemote(){ try{ if(FB.connected&&FB.user&&FB.libs){ const {dbM}=FB.libs; await dbM.remove(dbM.ref(FB.db,"users/"+FB.user.uid)); } }catch(e){} }
function updateSyncBadge(){
  const el=document.querySelector("#syncBadge"); if(!el) return;
  if(FB.connected&&FB.user){ el.textContent="☁ sinxron"; el.className="sync-badge on"; }
  else if(fbGetConfig()){ el.textContent="☁ ulanmagan"; el.className="sync-badge off"; }
  else { el.textContent=""; el.className="sync-badge"; }
}
function fbMaybeAutoConnect(){ const cfg=fbGetConfig(); if(cfg&&cfg.databaseURL){ fbInit(cfg); } }
/* UI handlers */
function fbParseCfg(txt){
  if(!txt) return null;
  const m = String(txt).match(/\{[\s\S]*\}/); const t = m ? m[0] : txt;
  let cfg=null;
  try{ cfg=JSON.parse(t); }catch(e){ try{ cfg=(new Function("return ("+t+")"))(); }catch(e2){ cfg=null; } }
  return cfg;
}
function fbSaveCfg(){
  const txt=((document.querySelector("#fbConfig")||{}).value||"").trim();
  const dbUrl=((document.querySelector("#fbDbUrl")||{}).value||"").trim();
  if(!txt){ fbSetStatus("Konfiguratsiya bo'sh."); return; }
  const cfg=fbParseCfg(txt);
  if(!cfg||!cfg.apiKey||!cfg.projectId){ fbSetStatus("Config o'qilmadi — faqat { ... } qismini joylang (ichida apiKey va projectId bo'lsin)."); return; }
  if(!cfg.databaseURL && dbUrl) cfg.databaseURL = dbUrl;
  if(!cfg.databaseURL){ fbSetStatus("Database manzili yo'q — pastdagi maydonga RTDB sahifasi tepasidagi https://...firebasedatabase.app manzilini joylang."); return; }
  cfg.databaseURL = cfg.databaseURL.trim().replace(/\/+$/,"");
  fbSaveConfig(cfg); fbSetStatus("Saqlandi ✓ Endi email va parol bilan “Ro'yxatdan o'tish”."); fbInit(cfg); renderSozlama();
}
async function fbAuth(mode){
  if(!FB.ready){ const cfg=fbGetConfig(); if(cfg) await fbInit(cfg); }
  if(!FB.ready){ fbSetStatus("Avval konfiguratsiyani saqlang."); return; }
  const email=((document.querySelector("#fbEmail")||{}).value||"").trim();
  const pw=((document.querySelector("#fbPass")||{}).value||"");
  if(!email||pw.length<6){ fbSetStatus("Email va kamida 6 belgili parol kiriting."); return; }
  try{ const {authM}=FB.libs;
    if(mode==="up") await authM.createUserWithEmailAndPassword(FB.auth,email,pw);
    else await authM.signInWithEmailAndPassword(FB.auth,email,pw);
    fbSetStatus("");
  }catch(e){ fbSetStatus(fbAuthErr(e)); }
}
async function fbSignOut(){ try{ const {authM}=FB.libs; await authM.signOut(FB.auth); }catch(e){} fbSetStatus("Chiqildi."); renderSozlama(); }
function fbForget(){ fbClearConfig(); try{ if(FB.libs&&FB.auth){ FB.libs.authM.signOut(FB.auth); } }catch(e){} FB.ready=false; FB.connected=false; fbSetStatus("Konfiguratsiya o'chirildi."); renderSozlama(); }

/* ============================================================= THEME ======== */
function getTheme(){ try{ return localStorage.getItem("momin_theme")||"dark"; }catch(e){ return "dark"; } }
function applyTheme(mode){
  mode = mode || getTheme();
  try{ localStorage.setItem("momin_theme", mode); }catch(e){}
  let t = mode;
  if(mode==="auto"){ t = (typeof window!=="undefined" && window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark"; }
  try{ const el=document.documentElement; if(el){ if(t==="light") el.setAttribute("data-theme","light"); else el.removeAttribute("data-theme"); } }catch(e){}
  try{ const m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute("content", t==="light"?"#F4EFE4":"#0A0F1E"); }catch(e){}
  return t;
}
function setTheme(mode){ applyTheme(mode); if(S.view==="sozlama" && typeof renderSozlama==="function") renderSozlama(); if(S.view==="bugun" && typeof renderBugun==="function") renderBugun(); }
function initThemeWatch(){
  try{ if(typeof window!=="undefined" && window.matchMedia){
    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", ()=>{ if(getTheme()==="auto") applyTheme("auto"); });
  } }catch(e){}
}

function uzSkyline(){
  const R=(s)=>{ const x=Math.sin((s+1)*12.9898)*43758.5453; return x-Math.floor(x); };
  let stars="";
  for(let i=0;i<48;i++){ stars+=`<circle cx="${(R(i)*1200).toFixed(0)}" cy="${(R(i+50)*420).toFixed(0)}" r="${(R(i+99)*1.2+0.3).toFixed(1)}" fill="#fff" opacity="${(R(i+150)*0.6+0.22).toFixed(2)}"/>`; }
  for(let i=0;i<7;i++){ stars+=`<circle cx="${(R(i+7)*1180+10).toFixed(0)}" cy="${(R(i+33)*340+10).toFixed(0)}" r="1.3" fill="#F2C879" opacity="0.85"/>`; }
  const dome=(cx,baseY,r,peakY)=>`<path d="M ${cx-r} ${baseY} C ${cx-r} ${(baseY-r*0.92).toFixed(0)}, ${(cx-r*0.5).toFixed(0)} ${(peakY+r*0.28).toFixed(0)}, ${cx} ${peakY} C ${(cx+r*0.5).toFixed(0)} ${(peakY+r*0.28).toFixed(0)}, ${cx+r} ${(baseY-r*0.92).toFixed(0)}, ${cx+r} ${baseY} Z" fill="url(#domeG)"/>`;
  const fin=(cx,peakY,h)=>`<rect x="${cx-1.5}" y="${peakY-h}" width="3" height="${h}" fill="#E7B45C"/><circle cx="${cx}" cy="${(peakY-h-2)}" r="3.2" fill="#E7B45C"/>`;
  const portal=(x,w,baseY,topY)=>{ const x2=x+w,cx=x+w/2,n1=x+w*0.2,n2=x2-w*0.2,nt=topY+w*0.16,sp=baseY-w*0.45; return `<rect x="${x}" y="${topY}" width="${w}" height="${(baseY-topY).toFixed(0)}" rx="3" fill="url(#bldgG)"/><path d="M ${n1.toFixed(0)} ${baseY} L ${n1.toFixed(0)} ${sp.toFixed(0)} Q ${n1.toFixed(0)} ${nt.toFixed(0)} ${cx} ${nt.toFixed(0)} Q ${n2.toFixed(0)} ${nt.toFixed(0)} ${n2.toFixed(0)} ${sp.toFixed(0)} L ${n2.toFixed(0)} ${baseY} Z" fill="#0A1124" opacity=".82"/>`; };
  const minaret=(cx,baseY,topY,wb,wt)=>{ let b=""; for(let y=topY+18;y<baseY-10;y+=27){ b+=`<rect x="${(cx-wb/2-1).toFixed(0)}" y="${y}" width="${(wb+2).toFixed(0)}" height="4" fill="#2FA8B8" opacity=".5"/>`; } return `<path d="M ${(cx-wb/2).toFixed(0)} ${baseY} L ${(cx-wt/2).toFixed(0)} ${topY} L ${(cx+wt/2).toFixed(0)} ${topY} L ${(cx+wb/2).toFixed(0)} ${baseY} Z" fill="url(#bldgG)"/>${b}`; };
  const baseY=760;
  const bukhara = minaret(185,baseY,250,46,30)
    + `<path d="M150 214 q35 -30 70 0 Z" fill="url(#bldgG)"/><rect x="150" y="214" width="70" height="40" rx="4" fill="url(#bldgG)"/>`
    + dome(185,214,20,178) + fin(185,178,12);
  const leftMad = dome(372,486,40,410) + fin(372,410,12) + portal(312,150,baseY,470);
  let ribs=""; for(const dx of [-58,-30,0,30,58]){ ribs+=`<path d="M ${640+dx*0.5} 262 Q ${640+dx} 188 ${(640+dx*0.18).toFixed(0)} 130" stroke="#1C7E8C" stroke-width="2.5" fill="none" opacity=".5"/>`; }
  const hero = minaret(528,baseY,262,26,18) + minaret(752,baseY,262,26,18) + portal(520,240,baseY,300)
    + `<rect x="572" y="262" width="136" height="46" fill="url(#bldgG)"/>` + dome(640,266,96,118) + ribs + fin(640,118,18);
  const rightMad = dome(908,486,40,410) + fin(908,410,12) + portal(848,150,baseY,470);
  let khB=""; for(let y=502;y<752;y+=30){ khB+=`<rect x="1034" y="${y}" width="92" height="7" fill="#E7B45C" opacity=".48"/>`; }
  const khiva = `<path d="M1030 760 L1044 486 L1116 486 L1130 760 Z" fill="url(#turqG)"/>${khB}<path d="M1044 486 q36 -26 72 0 Z" fill="url(#turqG)"/><rect x="1076" y="458" width="8" height="16" fill="#E7B45C"/>`;
  let fg=`<rect x="0" y="724" width="1200" height="40" fill="#0A1022"/>`;
  for(const sx of [90,470,690,990,1162]){ fg+=dome(sx,726,22,690); }
  return uzSkyline._c || (uzSkyline._c = `<svg class="uz-skyline" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg"><defs>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#060B1A"/><stop offset="0.5" stop-color="#0B1430"/><stop offset="0.82" stop-color="#13244A"/><stop offset="1" stop-color="#1B2A52"/></linearGradient>
    <radialGradient id="glowG" cx="0.5" cy="1" r="0.7"><stop offset="0" stop-color="#E7B45C" stop-opacity="0.42"/><stop offset="0.45" stop-color="#C2802E" stop-opacity="0.15"/><stop offset="1" stop-color="#C2802E" stop-opacity="0"/></radialGradient>
    <linearGradient id="bldgG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#D8B26A"/><stop offset="0.5" stop-color="#A6803F"/><stop offset="1" stop-color="#6E5026"/></linearGradient>
    <linearGradient id="domeG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46C8D6"/><stop offset="0.55" stop-color="#2A9FB0"/><stop offset="1" stop-color="#1C7384"/></linearGradient>
    <linearGradient id="turqG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3FB9C8"/><stop offset="1" stop-color="#1E7A8A"/></linearGradient>
    </defs>
    <rect width="1200" height="760" fill="url(#skyG)"/>${stars}
    <g><circle cx="980" cy="148" r="44" fill="#F3E2B0"/><circle cx="1001" cy="137" r="42" fill="#0B1430"/></g>
    <rect x="0" y="430" width="1200" height="330" fill="url(#glowG)"/>
    ${bukhara}${leftMad}${hero}${rightMad}${khiva}${fg}</svg>`);
}

function buildMenuHTML(){
  let out="", cur=null, buf=[];
  const flush=()=>{ if(buf.length){ out+=`<div class="ms-group">${cur?`<div class="ms-lab">${escd(cur)}</div>`:""}<div class="ms-grid">${buf.join("")}</div></div>`; buf=[]; } };
  let nodes=[];
  try{ nodes=[...document.querySelectorAll(".nav .nav-group, .nav .navlink")]; }catch(e){}
  if(!nodes.length){ try{ nodes=[...document.querySelectorAll(".navlink")]; }catch(e){} }
  nodes.forEach(n=>{
    const cl=n.classList;
    if(cl && cl.contains && cl.contains("nav-group")){ flush(); cur=(n.textContent||"").trim(); }
    else if(n.dataset && n.dataset.go){
      const sv=(n.querySelector && n.querySelector("svg")) || null;
      const ic=(sv && sv.outerHTML) ? sv.outerHTML : "";
      const lab=(n.textContent||"").trim();
      buf.push(`<button class="ms-item ${S.view===n.dataset.go?'on':''}" data-go="${n.dataset.go}">${ic}<span>${escd(lab)}</span></button>`);
    }
  });
  flush();
  return out || `<div class="empty" style="margin-top:20px"><div class="serif">Bo'limlar</div></div>`;
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function scheduleSaveDay(){ if(typeof setTimeout!=="function"){ saveDay(); return; } if(_sdT) clearTimeout(_sdT); _sdT=setTimeout(function(){ _sdT=null; saveDay(); },400); }

function hijriParts(dt){ try{ const f=new Intl.DateTimeFormat("en-u-ca-islamic-umalqura",{day:"numeric",month:"numeric",year:"numeric"}); const p={}; f.formatToParts(dt||new Date()).forEach(x=>p[x.type]=x.value); if(!p.month) return null; return {d:+p.day,m:+p.month,y:+p.year}; }catch(e){ return null; } }

/* ---- NAMOZ VAQTLARI (Toshkent) ---- */
let PRAY=null, prayLoading=false;
const PRAY_ORDER=[["Bomdod","Fajr"],["Quyosh","Sunrise"],["Peshin","Dhuhr"],["Asr","Asr"],["Shom","Maghrib"],["Xufton","Isha"]];
async function prayFetch(force){
  const key="momin:pray:"+todayKey();
  if(!force){ try{ const c=J(await Store.get(key)); if(c&&c.Fajr){ PRAY=c; paintPray(); return; } }catch(e){} }
  if(prayLoading) return; prayLoading=true; paintPray();
  try{
    const d=new Date();
    const url="https://api.aladhan.com/v1/timings/"+pad(d.getDate())+"-"+pad(d.getMonth()+1)+"-"+d.getFullYear()+"?latitude=41.2995&longitude=69.2401&method=3&school=1";
    const r=await fetch(url);
    if(r&&r.ok){ const j=await r.json(); const t=j&&j.data&&j.data.timings;
      if(t&&t.Fajr){ PRAY={Fajr:t.Fajr,Sunrise:t.Sunrise,Dhuhr:t.Dhuhr,Asr:t.Asr,Maghrib:t.Maghrib,Isha:t.Isha}; Store.set(key,JSON.stringify(PRAY)); } }
  }catch(e){}
  prayLoading=false; paintPray();
}
function prayNext(){ if(!PRAY) return null; const now=new Date(); const cur=now.getHours()*60+now.getMinutes();
  for(const pr of PRAY_ORDER){ const uz=pr[0],k=pr[1]; if(k==="Sunrise") continue; const s=String(PRAY[k]||""); const h=+s.slice(0,2), m=+s.slice(3,5); if(isFinite(h)&&h*60+m>cur) return {uz:uz,t:s.slice(0,5),min:h*60+m-cur}; }
  return {uz:"Bomdod",t:String(PRAY.Fajr||"").slice(0,5),min:null,tomorrow:true};
}
function prayInnerHTML(compact){
  if(!PRAY) return prayLoading? `<span class="muted" style="font-size:12px">Namoz vaqtlari yuklanmoqda…</span>` : `<button class="btn btn-ghost sm" data-act="prayRefresh">🕌 Namoz vaqtlarini yuklash</button>`;
  const nx=prayNext();
  const cells=PRAY_ORDER.map(pr=>`<span class="pr-c ${nx&&nx.uz===pr[0]?'nx':''}"><i>${pr[0]}</i><b>${escd(String(PRAY[pr[1]]||"").slice(0,5))}</b></span>`).join("");
  const head= nx? `<span class="pr-next">Keyingi: <b>${escd(nx.uz)} ${escd(nx.t)}</b>${nx.min!=null?` · ${nx.min>=60?Math.floor(nx.min/60)+" soat ":""}${nx.min%60} daqiqa`:" (ertaga)"}</span>` : "";
  return (compact?head:"")+`<div class="pr-row">${cells}</div>`+(compact?"":head);
}
function paintPray(){ ["#prayStrip","#prayCard"].forEach(function(sel,i){ const el=document.querySelector(sel); if(el) el.innerHTML=prayInnerHTML(i===0); }); }

function khatmInfo(){ const k=S.khatm; if(!k||!k.start||!k.days) return null;
  const dayN=Math.floor((parseDK(todayKey())-parseDK(k.start))/86400000)+1;
  const per=Math.ceil(604/k.days); const from=(dayN-1)*per+1, to=Math.min(604,dayN*per);
  const doneCnt=Object.keys(k.done||{}).length;
  return {dayN:dayN, days:k.days, per:per, from:from, to:to, doneCnt:doneCnt, todayDone:!!(k.done&&k.done[todayKey()]), finished:(dayN>k.days)||doneCnt>=k.days, pct:Math.min(100,Math.round(doneCnt/k.days*100))}; }

const QIBLA_BRG=(function(){ const r=Math.PI/180, f1=41.2995*r, f2=21.4225*r, dl=(39.8262-69.2401)*r;
  const y=Math.sin(dl)*Math.cos(f2), x=Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl);
  return (Math.atan2(y,x)*180/Math.PI+360)%360; })();
let qiblaHandler=null;
function qiblaOpen(){ openSheet("qiblaSheet", `<div class="sheet-card" style="text-align:center">

    <p class="muted" style="font-size:12px;margin:8px 0 12px">Toshkentdan qibla ≈ <b>${Math.round(QIBLA_BRG)}°</b> (janubi-g'arb). Jonli kompas uchun:</p>
    <button class="btn btn-gold" data-act="qiblaPerm">🧭 Kompasni yoqish</button>
    <p class="muted" style="font-size:10.5px;margin-top:10px">Aniqlik telefon sensoriga bog'liq; metall va magnitdan uzoq tuting.</p>
  </div>`); }
function qiblaPerm(){
  function attach(){ qiblaHandler=function(e){ let h=null; if(typeof e.webkitCompassHeading==="number") h=e.webkitCompassHeading; else if(typeof e.alpha==="number") h=360-e.alpha; if(h==null) return; const a=$("#qArrow"); if(a&&a.style) a.style.transform="rotate("+((((QIBLA_BRG-h)%360)+360)%360).toFixed(0)+"deg)"; };
    try{ window.addEventListener("deviceorientationabsolute",qiblaHandler,true); window.addEventListener("deviceorientation",qiblaHandler,true); toast("Kompas yoqildi — telefonni tekis tuting"); }catch(e){ toast("Kompas mavjud emas"); } }
  try{ if(typeof DeviceOrientationEvent!=="undefined" && DeviceOrientationEvent.requestPermission){ DeviceOrientationEvent.requestPermission().then(function(s){ if(s==="granted") attach(); else toast("Ruxsat berilmadi"); }).catch(function(){ toast("Ruxsat berilmadi"); }); } else attach(); }catch(e){ attach(); } }
function qiblaClose(){ try{ if(qiblaHandler){ window.removeEventListener("deviceorientationabsolute",qiblaHandler,true); window.removeEventListener("deviceorientation",qiblaHandler,true); qiblaHandler=null; } }catch(e){} closeSheet("qiblaSheet"); }

function qcParseLine(dest, line){
  const parts=line.split("|").map(function(s){return s.trim();});
  const dash= parts.length<2 ? line.split(/\s[-—–]\s/).map(function(s){return s.trim();}) : null;
  function P(i){ return (parts.length>1? parts[i] : (dash&&dash.length>1? dash[i] : (i===0? line.trim():""))) || ""; }
  switch(dest){
    case "tillar": { const w=P(0), tr=P(1); if(!w||!tr) return 0; S.langwords.push({id:uid(),lang:S.langTab||"english",word:w,tr:tr}); return 1; }
    case "sr": { const f=P(0), b=P(1); if(!f||!b) return 0; S.cards.push({id:uid(),front:f,back:b,deck:P(2)||"Umumiy",ef:2.5,interval:0,reps:0,due:null,lapses:0}); return 1; }

    case "hadis": { if(!P(0)) return 0; S.hadith.push({id:uid(),text:P(0),source:P(1)}); return 1; }
    case "ayah": { if(!P(0)) return 0; S.ayahs.push({id:uid(),text:P(0),ref:P(1)}); return 1; }
    default: { const cfg=COLL_CFG[dest]; if(!cfg||!P(0)) return 0; const o={id:uid(), at:todayKey()}; cfg.fields.forEach(function(f,i){ o[f.k]=P(i); }); S.coll[dest].push(o); return 1; }

function qcSave(){ const ta=$("#qcText"); const txt=((ta&&ta.value)||"").trim(); if(!txt) return;

  if(dest==="kundalik"){ S.day.note=(S.day.note? S.day.note+"\n":"")+txt; saveDay(); toast("Kundalikka yozildi ✓"); qcClose(); if(S.view==="kundalik") renderKundalik(); return; }
  const lines= QC.mode==="bulk" ? txt.split(/\n+/) : [txt.replace(/\n+/g," ")];
  let n=0; lines.forEach(function(l){ l=l.trim(); if(l) n+=qcParseLine(dest,l); });

async function shareCard(text, ref){
  try{
    if(!document.createElement) return false;
    const cv=document.createElement("canvas"); if(!cv||!cv.getContext){ toast("Bu qurilmada rasm chizib bo'lmadi"); return false; }
    const W=1080,H=1350; cv.width=W; cv.height=H; const x=cv.getContext("2d");
    const g=x.createLinearGradient(0,0,0,H); g.addColorStop(0,"#0B1224"); g.addColorStop(1,"#101A38");
    x.fillStyle=g; x.fillRect(0,0,W,H);
    x.strokeStyle="rgba(231,180,92,.07)"; x.lineWidth=2;
    for(let ty=110;ty<H;ty+=250) for(let tx=110;tx<W;tx+=250){ x.save(); x.translate(tx,ty); x.strokeRect(-34,-34,68,68); x.rotate(Math.PI/4); x.strokeRect(-34,-34,68,68); x.restore(); }
    x.lineCap="round";
    function corner(cx2,cy2,sx,sy){ x.save(); x.translate(cx2,cy2); x.scale(sx,sy);
      x.strokeStyle="rgba(231,180,92,.85)"; x.lineWidth=5;
      x.beginPath(); x.moveTo(0,130); x.lineTo(0,28); x.quadraticCurveTo(0,0,28,0); x.lineTo(130,0); x.stroke();
      x.beginPath(); x.moveTo(28,130); x.lineTo(28,48); x.quadraticCurveTo(28,28,48,28); x.lineTo(130,28); x.stroke();
      x.save(); x.translate(68,68); x.rotate(Math.PI/4); x.strokeRect(-17,-17,34,34); x.restore(); x.restore(); }
    corner(70,70,1,1); corner(W-70,H-70,-1,-1);
    x.strokeStyle="rgba(231,180,92,.9)"; x.lineWidth=3;
    x.beginPath(); x.moveTo(W/2-150,205); x.lineTo(W/2+150,205); x.stroke();
    x.save(); x.translate(W/2,205); x.rotate(Math.PI/4); x.fillStyle="#E7B45C"; x.fillRect(-11,-11,22,22); x.restore();
    const t=String(text||"").trim(); const ar=isArabic(t);
    x.fillStyle="#F2E7CB"; x.textAlign="center"; try{ x.direction=ar?"rtl":"ltr"; }catch(e){}
    const size= t.length>260?38 : t.length>160?46 : t.length>80?54 : 62;
    x.font=size+"px Georgia, 'Times New Roman', serif";
    const maxW=W-220, words=t.split(/\s+/), lines=[]; let line="";
    for(const w of words){ const tst=line? line+" "+w : w; if(x.measureText(tst).width>maxW && line){ lines.push(line); line=w; } else line=tst; }
    if(line) lines.push(line);
    const shown=lines.slice(0,12); const lh=size*1.5;
    let y=Math.max(320, H/2 - (shown.length-1)*lh/2);
    shown.forEach(function(L){ x.fillText(L, W/2, y); y+=lh; });
    try{ x.direction="ltr"; }catch(e){}
    if(ref){ x.fillStyle="#E7B45C"; x.font="600 30px 'Space Grotesk', Arial, sans-serif"; x.fillText("— "+String(ref), W/2, Math.min(H-200, y+26)); }
    x.fillStyle="rgba(236,230,212,.8)"; x.font="27px 'Space Grotesk', Arial, sans-serif";
    x.fillText("Mo'min · kun tartibi  🌙", W/2, H-96);
    const blob=await new Promise(function(res){ try{ cv.toBlob(res,"image/png"); }catch(e){ res(null); } });
    if(!blob){ toast("Rasm hosil bo'lmadi"); return false; }
    const file=new File([blob],"momin-karta.png",{type:"image/png"});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:"Mo'min"}); }
    else{ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="momin-karta.png"; document.body.appendChild(a); a.click(); a.remove(); if(typeof setTimeout==="function") setTimeout(function(){ try{URL.revokeObjectURL(a.href);}catch(e){} },4000); }
    toast("📤 Naqshli karta tayyor"); return true;
  }catch(e){ try{ toast("Ulashib bo'lmadi"); }catch(_){} return false; }
}

function drawHeatmap(){ try{ const cv=$("#hmCv"); if(!cv||!cv.getContext||!HIST) return;
    const cell=8,gap=2,cols=53,rows=7; cv.width=cols*(cell+gap)+gap; cv.height=rows*(cell+gap)+gap;

      const X=gap+c*(cell+gap), Y=gap+r*(cell+gap);

function kafDone(d){ if(!S.kaf||!S.kaf[d]) return; S.kaf[d].done=true; S.kaf[d].at=todayKey(); saveKaf(); buzz([30,40,60]); toast("Kaffora qabul bo'lsin 🤲"); renderBugun(); }
function kafToggle(){ S.settings.kaffora=!kafOn(); saveSet(); if(S.view==="sozlama") renderSozlama(); }
function kafBannersHTML(){ if(!kafOn()) return ""; kafScan(); const K=S.kaf||{};
  const pend=Object.keys(K).filter(d=>!K[d].done).sort().reverse().slice(0,2);

/* =================================================== MEGA G: BUZILISHLAR ==== */
function saveViol(){ Store.set("momin:viol", JSON.stringify(S.viol||[])); }
function stdTitle(key){ try{ for(const c of S.standards){ for(const i of c.items){ if(c.id+":"+i.id===key) return i.t; } } }catch(e){} return key; }
function violFor(key){ return (S.viol||[]).filter(v=>v.key===key); }
function violDayHas(dk){ return (S.viol||[]).some(v=>v.date===dk); }
function violCleanDays(key){ const vs=violFor(key); if(!vs.length) return -1;
  let last=vs[0].date; vs.forEach(v=>{ if(v.date>last) last=v.date; });
  return Math.max(0, Math.floor((parseDK(todayKey())-parseDK(last))/86400000)); }
function violAdd(key, date, note){ date=date||todayKey();
  if(date>todayKey()){ toast("Kelajak kunni belgilab bo'lmaydi"); return false; }
  S.viol=S.viol||[]; S.viol.push({id:uid(), date:date, key:key, t:stdTitle(key), note:(note||"").trim()});
  saveViol(); buzz([50,40,50]);
  try{ if(kafOn()){ S.kaf=S.kaf||{}; if(!S.kaf[date]){ S.kaf[date]={pct:null, r:"std", t:null, done:false}; saveKaf(); } } }catch(e){}
  toast("⚠ Belgilandi: "+clip(stdTitle(key),42));
  if(S.view==="standart") renderStandart(); else if(S.view==="bugun") renderBugun();
  return true; }
function violQuick(key){ const tk=todayKey();
  if((S.viol||[]).some(v=>v.key===key&&v.date===tk)){ toast("Bugun bu standart allaqachon belgilangan"); return; }
  violAdd(key, tk, ""); }
function violDel(id){ S.viol=(S.viol||[]).filter(v=>v.id!==id); saveViol(); renderStandart(); }
function violAddForm(){ const k=($("#vlStd")||{}).value; const d=(($("#vlDate")||{}).value||"").trim()||todayKey();
  const n=($("#vlNote")||{}).value||""; if(!k){ toast("Standartni tanlang"); return; }
  if(violAdd(k,d,n)){ const ne=$("#vlNote"); if(ne) ne.value=""; } }
function violTop(n){ const m={}; (S.viol||[]).forEach(v=>{ m[v.key]=m[v.key]||{t:v.t,c:0}; m[v.key].c++; });
  return Object.keys(m).map(k=>m[k]).sort((a,b)=>b.c-a.c).slice(0,n||3); }
function violTopHTML(){ const top=violTop(3); if(!top.length) return "";
  return `<div class="sec-head"><h2>Eng ko'p buziladiganlar</h2><div class="pc">keyingi fokusga nomzod</div></div>
    <div class="corr-wrap">${top.map(x=>`<div class="corr-row"><span>⚠ ${escd(clip(x.t,60))}</span><div class="cb no" style="grid-template-columns:1fr 60px"><i style="width:${Math.min(100,x.c*12)}%"></i><b>${x.c} marta</b></div></div>`).join("")}</div>`; }
function violLogHTML(){ const V=S.viol||[]; const wk=wkKey(0);

  const opts=S.standards.map(c=>`<optgroup label="${escq(c.name)}">`+c.items.map(i=>`<option value="${c.id}:${i.id}">${escd(clip(i.t,48))}</option>`).join("")+`</optgroup>`).join("");
  return `<div class="card exp-card viol-card"><div class="set-dh">⚠ Buzilishlar jurnali <span class="pc" style="margin-left:auto">bu hafta: <b>${wkC}</b> · jami: ${V.length}</span></div>

    <div class="row2" style="margin-top:8px"><input class="inp" id="vlNote" placeholder="Izoh (ixtiyoriy — nima bo'ldi?)"><button class="btn btn-ghost" data-act="violAddForm">⚠ Belgilash</button></div>
  </div>`; }

/* =================================================== MEGA H: QAZO+RELOAD+SPLASH */
function saveQazo(){ Store.set("momin:qazo", JSON.stringify(S.qazo||{c:{},paid:0,sc:{}})); }
function qazoTotal(){ const c=(S.qazo&&S.qazo.c)||{}; return SALAH.reduce((s,p)=>s+(c[p.id]||0),0); }
function qazoScan(){ try{ if(!HIST) return; S.qazo=S.qazo||{c:{},paid:0,sc:{}}; S.qazo.sc=S.qazo.sc||{}; let ch=false;
    for(let i=1;i<=7;i++){ const d=dKey(addDays(parseDK(todayKey()),-i)); const o=HIST.days[d];
      if(!o||S.qazo.sc[d]) continue;
      SALAH.forEach(p=>{ if(!((o.salah||{})[p.id])){ S.qazo.c[p.id]=(S.qazo.c[p.id]||0)+1; ch=true; } });
      S.qazo.sc[d]=1; ch=true; }
    for(const d in S.qazo.sc){ if((parseDK(todayKey())-parseDK(d))/86400000>60) delete S.qazo.sc[d]; }
    if(ch) saveQazo();
  }catch(e){} }
function qazoYesterdayMissed(){ try{ if(!HIST) return []; const y=dKey(addDays(parseDK(todayKey()),-1)); const o=HIST.days[y];
    if(!o) return []; return SALAH.filter(p=>!((o.salah||{})[p.id])).map(p=>p.name); }catch(e){ return []; } }
function qazoPay(id){ S.qazo=S.qazo||{c:{},paid:0,sc:{}}; if(!(S.qazo.c[id]>0)) return;
  S.qazo.c[id]--; S.qazo.paid=(S.qazo.paid||0)+1; saveQazo(); buzz([20,30,40]); toast("Qabul bo'lsin 🤲"); renderIbodat(); }
function qazoInc(id){ S.qazo=S.qazo||{c:{},paid:0,sc:{}}; S.qazo.c[id]=(S.qazo.c[id]||0)+1; saveQazo(); renderIbodat(); }
function qazoBulk(){ const n=parseInt((($("#qzN")||{}).value||""),10); const p=($("#qzP")||{}).value;
  if(!isFinite(n)||n<1||!p){ toast("Sonini kiriting"); return; }
  S.qazo=S.qazo||{c:{},paid:0,sc:{}}; S.qazo.c[p]=(S.qazo.c[p]||0)+n; saveQazo(); toast("+"+n+" qazo yozildi"); renderIbodat(); }
function qazoHTML(){ qazoScan(); const q=S.qazo||{c:{},paid:0}; const tot=qazoTotal();
  const rows=SALAH.map(p=>{ const c=(q.c||{})[p.id]||0;
    return `<div class="qz-row ${c?'has':''}"><span class="qz-name">${p.name}</span><b class="qz-cnt">${c}</b>
      <span class="qz-btns">${c?`<button class="btn btn-gold sm" data-act="qazoPay" data-id="${p.id}">−1 O'qidim</button>`:`<span class="nc-badge">✓ toza</span>`}<button class="qz-plus" data-act="qazoInc" data-id="${p.id}" title="+1 qazo">+</button></span></div>`; }).join("");
  const opts=SALAH.map(p=>`<option value="${p.id}">${p.name}</option>`).join("");
  return `<div class="card exp-card qazo-card"><div class="set-dh">🧮 Qazo hisobi <span class="pc" style="margin-left:auto">${tot?`qarz: <b>${tot}</b>`:"qarz yo'q ✦"}${q.paid?` · qoplangan: ${q.paid}`:""}</span></div>
    <p class="muted" style="font-size:11.5px;margin:4px 0 8px">Kecha belgilanmagan namozlar ertasiga avtomatik qazoga yoziladi. Eski qarzlaringizni quyidan qo'shing; har o'qiganingizda «−1» bosing.</p>
    <div class="qz-list">${rows}</div>
    <div class="row2" style="margin-top:10px"><input class="inp" id="qzN" inputmode="numeric" placeholder="Soni (masalan 30)"><select class="inp" id="qzP">${opts}</select></div>
    <button class="btn btn-ghost sm" data-act="qazoBulk" style="margin-top:8px">+ Eski qazoni qo'shish</button>
  </div>`; }

/* ---- RELOAD / UPDATE ---- */
async function dataReload(){ try{ flushSaves(); }catch(e){}
  toast("Yangilanmoqda…");
  try{ HIST=null; PRAY=null; await loadAll(); render(); try{ prayFetch(); }catch(e){}
    toast("✓ Ma'lumotlar qayta yuklandi"); }catch(e){ toast("Yangilashda xato"); } }
async function appUpdate(){ toast("Yangi versiya olinmoqda…");
  try{ if(navigator.serviceWorker&&navigator.serviceWorker.getRegistration){ const r=await navigator.serviceWorker.getRegistration(); if(r&&r.update) await r.update(); } }catch(e){}
  try{ if(typeof caches!=="undefined"&&caches.keys){ const ks=await caches.keys(); for(const k of ks){ if(String(k).indexOf("momin")===0) await caches.delete(k); } } }catch(e){}
  try{ location.reload(); }catch(e){} }

function splashHide(){ const s=$("#splash"); if(!s) return;
  try{ s.setAttribute("data-out","1"); }catch(e){}
  try{ if(s.classList) s.classList.add("out"); }catch(e){}
  if(typeof setTimeout==="function") setTimeout(function(){ try{ s.setAttribute("hidden",""); }catch(e){} },750);
}

function pureStreak(){ try{ const g=(S.iffat&&S.iffat.gaze)||{}; let cur=0; let d=new Date(); d.setHours(0,0,0,0);
    // bugun belgilanmagan bo'lsa kechadan hisoblaymiz
    if(g[dKey(d)]!=="ok" && g[dKey(d)]!=="bad") d=addDays(d,-1);
    while(g[dKey(d)]==="ok"){ cur++; d=addDays(d,-1); } return cur; }catch(e){ return 0; } }
function pureBest(){ try{ const g=(S.iffat&&S.iffat.gaze)||{}; const days=Object.keys(g).filter(k=>g[k]==="ok").sort(); let best=0,run=0,prev=null;
    for(const ds of days){ const cd=parseDK(ds); if(prev&&(cd-prev)===86400000) run++; else run=1; best=Math.max(best,run); prev=cd; } return best; }catch(e){ return 0; } }
function gazeMark(v){ S.iffat=S.iffat||iffatDefault(); S.iffat.gaze=S.iffat.gaze||{}; const t=todayKey();
  if(S.iffat.gaze[t]===v) delete S.iffat.gaze[t]; else S.iffat.gaze[t]=v;
  // yiqilgan kun buzilishlar jurnaliga + kaffora (tizim bilan bog'lanadi)
  if(v==="bad" && S.iffat.gaze[t]==="bad"){ try{ if(kafOn()){ S.kaf=S.kaf||{}; if(!S.kaf[t]) S.kaf[t]={pct:null,r:"iffat",t:null,done:false}; saveKaf(); } }catch(e){} }
